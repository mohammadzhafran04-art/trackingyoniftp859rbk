<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - CYBER TACTICAL DASHBOARD</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff0055;
            --bg-dark: #010808;
            --panel-bg: rgba(2, 12, 12, 0.96);
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark);
            color: var(--neon); overflow: hidden; height: 100vh;
        }

        .crt-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; z-index: 10000; pointer-events: none;
        }

        .header {
            height: 55px; background: #001010; border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }

        .container {
            display: grid; grid-template-columns: 320px 1fr 320px;
            height: calc(100vh - 57px);
        }

        .panel {
            background: var(--panel-bg); border-right: 1px solid var(--border);
            padding: 15px; overflow-y: auto; display: flex; flex-direction: column;
        }

        #map { height: 100%; background: #000; filter: brightness(0.9) contrast(1.1) saturate(0.2) hue-rotate(140deg) invert(0.95); }

        .unit-card {
            background: rgba(0, 242, 255, 0.03); border: 1px solid var(--border);
            margin-bottom: 12px; padding: 12px; cursor: pointer; transition: 0.3s;
            clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%);
        }

        .unit-card.active { background: rgba(0, 242, 255, 0.15); border-color: var(--neon); }
        .unit-card.sos { border-color: var(--danger); background: rgba(255, 0, 85, 0.1); animation: pulse-red 1s infinite; }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0px var(--danger); } 50% { box-shadow: 0 0 10px var(--danger); } 100% { box-shadow: 0 0 0px var(--danger); } }

        .cmd-input {
            width: 100%; background: #000; border: 1px solid var(--neon);
            color: var(--neon); padding: 10px; font-family: 'Share Tech Mono';
            margin-top: 10px; box-sizing: border-box;
        }

        .cmd-btn {
            width: 100%; background: var(--neon); color: #000; border: none;
            padding: 10px; margin-top: 5px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
        }

        #logs { font-size: 10px; height: 120px; overflow-y: auto; font-family: monospace; color: rgba(0, 242, 255, 0.5); border-top: 1px solid var(--border); padding-top: 10px; }
    </style>
</head>
<body>

<div class="crt-effect"></div>

<div class="header">
    <div style="font-family:'Orbitron'; font-weight:bold">859/RBK COMMAND CENTER</div>
    <div id="clock" style="font-family:'Share Tech Mono'">00:00:00</div>
</div>

<div class="container">
    <div class="panel">
        <input type="text" id="search" placeholder="FILTER CALLSIGN..." style="width:100%; background:rgba(0,0,0,0.5); border:1px solid var(--border); padding:10px; color:var(--neon); font-family:'Share Tech Mono'">
        <div id="listAnggota" style="margin-top:15px"></div>
    </div>

    <div id="map"></div>

    <div class="panel" style="border-right:none; border-left:1px solid var(--border)">
        <div id="detailBox">
            <div style="text-align:center; padding-top:100px; opacity:0.3">SELECT TARGET FOR UPLINK</div>
        </div>
        <div style="margin-top:auto">
            <div id="logs"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // Inisialisasi Peta
    const map = L.map('map', {zoomControl: false}).setView([-2.5489, 118.0149], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const HQ_COORD = [-2.5489, 118.0149];
    let markers = {}, paths = {}, allData = {}, selectedId = null;

    // Fungsi Log
    function addLog(msg) {
        const l = document.getElementById('logs');
        l.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
    }

    // Fungsi Kirim Perintah (Didaftarkan ke window agar bisa dipanggil HTML)
    window.sendCommand = (nama) => {
        const cmdText = document.getElementById("cmdInput").value;
        if(!cmdText) return;
        
        update(ref(db, `live/${nama}`), { command: cmdText })
        .then(() => {
            addLog(`CMD_SENT TO ${nama}: ${cmdText}`);
            document.getElementById("cmdInput").value = "";
        });
    };

    // Kalkulasi Jarak
    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * R).toFixed(0);
    }

    function render() {
        const list = document.getElementById("listAnggota");
        const keyword = document.getElementById("search").value.toLowerCase();
        list.innerHTML = "";

        Object.keys(allData).forEach(nama => {
            const data = allData[nama];
            if(!data.lat || !data.lon) return;

            const isOnline = (Date.now() - (data.waktu || 0)) < 40000;
            const dist = getDist(HQ_COORD[0], HQ_COORD[1], data.lat, data.lon);

            // Update Marker & Breadcrumbs
            if (!markers[nama]) {
                markers[nama] = L.circleMarker([data.lat, data.lon], {radius: 8, color: '#fff', weight: 2, fillOpacity: 1, fillColor: '#00f2ff'}).addTo(map);
                paths[nama] = L.polyline([[data.lat, data.lon]], {color: '#00f2ff', weight: 1, opacity: 0.5, dashArray: '5, 10'}).addTo(map);
            } else {
                markers[nama].setLatLng([data.lat, data.lon]);
                markers[nama].setStyle({fillColor: data.status === "DANGER_SOS" ? "#ff0055" : (isOnline ? "#00f2ff" : "#444")});
                
                let p = paths[nama].getLatLngs();
                if(p.length > 15) p.shift();
                p.push([data.lat, data.lon]);
                paths[nama].setLatLngs(p);
            }

            // Create Card
            if(nama.toLowerCase().includes(keyword)) {
                const item = document.createElement("div");
                item.className = `unit-card ${selectedId === nama ? 'active' : ''} ${data.status === 'DANGER_SOS' ? 'sos' : ''}`;
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <b>${nama.toUpperCase()}</b>
                        <span>${isOnline ? '●' : '○'}</span>
                    </div>
                    <div style="font-size:10px; margin-top:5px; opacity:0.7">
                        SPD: ${data.speed || 0} KM/H | DST: ${dist}M
                    </div>
                `;
                item.onclick = () => {
                    selectedId = nama;
                    map.flyTo([data.lat, data.lon], 16);
                    showDetail(nama, data, dist);
                    render();
                };
                list.appendChild(item);
            }
        });
    }

    function showDetail(nama, data, dist) {
        document.getElementById("detailBox").innerHTML = `
            <div style="border:1px solid var(--neon); padding:15px; background:rgba(0,242,255,0.05); clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);">
                <div style="font-family:Orbitron; font-size:18px">${nama}</div>
                <div style="font-size:11px; margin-top:10px">
                    STATUS: ${data.status || 'ACTIVE'}<br>
                    BATTERY: ${data.battery || '--'}<br>
                    DISTANCE: ${dist}M
                </div>
                
                <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:10px">
                    <label style="font-size:10px; color:var(--neon)">SEND REMOTE COMMAND</label>
                    <input type="text" id="cmdInput" class="cmd-input" placeholder="Type message...">
                    <button class="cmd-btn" onclick="sendCommand('${nama}')">EXECUTE</button>
                </div>
            </div>
        `;
    }

    // Listener Real-time
    onValue(ref(db, "live"), snap => {
        const val = snap.val();
        if(val) {
            allData = val;
            render();
            // Refresh detail box if someone is selected
            if(selectedId && allData[selectedId]) {
                const d = allData[selectedId];
                showDetail(selectedId, d, getDist(HQ_COORD[0], HQ_COORD[1], d.lat, d.lon));
            }
        }
    });

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);
</script>

</body>
</html>
