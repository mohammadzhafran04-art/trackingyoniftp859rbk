<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMAND | YONIF 859/RBK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #000800; --danger: #ff003c; --accent: #00e5ff; --panel: rgba(0, 20, 0, 0.9); }
        body, html { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--neon); height: 100vh; overflow: hidden; text-transform: uppercase; }
        .main-ui { display: grid; grid-template-columns: 320px 1fr 320px; grid-template-rows: 60px 1fr; height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box; }
        header { grid-column: span 3; background: var(--panel); border: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; clip-path: polygon(0 0, 100% 0, 99% 100%, 1% 100%); }
        .side-panel { background: var(--panel); border: 1px solid rgba(0,255,65,0.2); padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        #map { background: #000; border: 1px solid var(--neon); z-index: 1; }
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.2); }
        .unit-card { background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.1); padding: 12px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; }
        .unit-card:hover { border-color: var(--neon); background: rgba(0,255,65,0.1); }
        .unit-card.sos { border-color: var(--danger); animation: danger-pulse 1s infinite; background: rgba(255,0,60,0.1); }
        @keyframes danger-pulse { 0%, 100% { box-shadow: 0 0 5px var(--danger); } 50% { box-shadow: 0 0 20px var(--danger); } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: var(--neon); box-shadow: 0 0 8px var(--neon); }
        .offline { background: #444; }
        .input-cmd { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; box-sizing: border-box; font-family: 'Share Tech Mono'; margin-bottom: 10px; }
        .btn-cmd { background: var(--neon); color: #000; font-family: 'Orbitron'; font-weight: bold; padding: 12px; border: none; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-cmd:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }
        .log-area { font-size: 11px; font-family: 'Share Tech Mono'; color: var(--accent); height: 200px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid rgba(0,229,255,0.2); }
        #dashLoader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="dashLoader">
        <div style="font-family: 'Orbitron'; font-size: 24px; color: var(--neon); letter-spacing: 5px; text-align: center;">INITIALIZING HQ_COMMAND<br><span style="font-size: 12px; color: #fff;">YONIF 859/RBK</span></div>
        <div id="loadStatus" style="font-size: 10px; color: var(--accent); margin-top: 20px; font-family: 'Share Tech Mono';">ESTABLISHING SECURE_UPLINK...</div>
    </div>

<div class="main-ui">
    <header>
        <div style="font-family: 'Orbitron'; font-weight: bold; letter-spacing: 2px;"><span style="color:var(--danger)">HQ</span> COMMAND_DASHBOARD</div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 20px; color: #fff;">00:00:00</div>
        <button onclick="location.reload()" style="border: 1px solid var(--danger); background: transparent; color: var(--danger); padding: 5px 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px;">REBOOT_SESSION</button>
    </header>

    <aside class="side-panel">
        <div style="font-size: 12px; font-family: 'Orbitron'; border-bottom: 1px solid var(--neon); padding-bottom: 5px; color: var(--accent); margin-bottom: 10px;">[ ACTIVE_UNITS ]</div>
        <div id="unitList"></div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <div style="font-size: 12px; font-family: 'Orbitron'; border-bottom: 1px solid var(--neon); padding-bottom: 5px; color: var(--accent); margin-bottom: 10px;">[ GLOBAL_DIRECTIVE ]</div>
        <input type="text" id="cmdInput" class="input-cmd" placeholder="MASUKKAN PERINTAH...">
        <button class="btn-cmd" id="btnBroadcast">SEND BROADCAST</button>
        
        <div style="margin-top: 20px; font-size: 12px; font-family: 'Orbitron'; border-bottom: 1px solid var(--neon); padding-bottom: 5px; color: var(--accent); margin-bottom: 10px;">[ ENCRYPTED_LOG ]</div>
        <div id="sysLog" class="log-area"></div>
    </aside>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.appspot.com",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let map, markers = {};

    // 1. Inisialisasi Map (Pastikan Leaflet sudah dimuat)
    map = L.map('map', { zoomControl: false }).setView([-0.8194, 135.6846], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. Fungsi Log Terminal
    function addLog(msg) {
        const logArea = document.getElementById('sysLog');
        const time = new Date().toLocaleTimeString();
        logArea.innerHTML = `<div style="margin-bottom:4px;">> [${time}] ${msg}</div>` + logArea.innerHTML;
    }

    // 3. Broadcast Perintah (Ditempel ke tombol secara manual agar pasti jalan)
    document.getElementById('btnBroadcast').onclick = () => {
        const val = document.getElementById('cmdInput').value.trim().toUpperCase();
        if(val) {
            set(ref(db, "commands/global"), { 
                text: val, 
                waktu: Date.now() 
            }).then(() => {
                addLog(`BROADCAST_SENT: ${val}`);
                document.getElementById('cmdInput').value = "";
            }).catch(err => addLog(`ERR: ${err.message}`));
        }
    };

    // 4. Monitoring Real-time dari folder "live"
    onValue(ref(db, "live"), (snap) => {
        const data = snap.val();
        const list = document.getElementById('unitList');
        list.innerHTML = "";
        
        if(!data) {
            list.innerHTML = "<div style='color:#666'>NO ACTIVE UNITS</div>";
            return;
        }

        const now = Date.now();
        
        for(let id in data) {
            const unit = data[id];
            // Online jika update terakhir kurang dari 60 detik
            const isOnline = (now - unit.waktu) < 60000; 
            const pos = [unit.lat, unit.lon];

            // Update atau buat Marker
            if(markers[id]) {
                markers[id].setLatLng(pos);
                // Update warna marker jika SOS
                markers[id].setStyle({ 
                    fillColor: isOnline ? (unit.sos ? '#f00' : '#0f0') : '#444',
                    color: unit.sos ? '#f00' : '#fff'
                });
            } else {
                markers[id] = L.circleMarker(pos, {
                    radius: 10,
                    weight: 2,
                    color: '#fff',
                    fillColor: isOnline ? '#0f0' : '#444',
                    fillOpacity: 1
                }).addTo(map).bindTooltip(id, { permanent: false });
            }

            // Tambahkan Card di Sidebar
            const card = document.createElement('div');
            card.className = `unit-card ${unit.sos ? 'sos' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <span style="font-weight:bold">${id}</span>
                    <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                </div>
                <div style="font-size:10px; color:var(--accent); margin-top:5px;">
                    SPD: ${(unit.speed * 3.6).toFixed(1)} KM/H | ACC: ${Math.round(unit.accuracy)}M
                </div>
            `;
            card.onclick = () => {
                map.flyTo(pos, 16);
                addLog(`TRACKING_UNIT: ${id}`);
            };
            list.appendChild(card);
        }
    });

    // 5. Loader logic
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('dashLoader').style.opacity = '0';
            setTimeout(() => document.getElementById('dashLoader').style.display = 'none', 500);
            addLog("SYSTEM_READY");
        }, 1500);
    });

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

</script>
</body>
</html>
