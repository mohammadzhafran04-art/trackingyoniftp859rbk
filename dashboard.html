<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMAND | YONIF 859/RBK 2045</title>
    
    <script>
        // PROTEKSI AUTH
        if (localStorage.getItem("auth") !== "true") {
            window.location.replace("login.html");
            document.write('<style>body { display:none !important; }</style>');
            window.stop(); 
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.1);
            --bg: #000500;
            --danger: #ff003c;
            --panel: rgba(0, 15, 0, 0.9);
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--neon);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* Scanline CRT Effect */
        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 1000; pointer-events: none;
        }

        .cyber-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px), linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; opacity: 0.2;
        }

        .main-ui {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 70px 1fr;
            height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
        }

        header {
            grid-column: span 3;
            background: var(--panel);
            border: 1px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; backdrop-filter: blur(15px);
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
        }

        .side-panel {
            background: var(--panel);
            border: 1px solid var(--neon-dim);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; backdrop-filter: blur(20px);
        }

        #map { border: 1px solid var(--neon-dim); background: #000; z-index: 1; }

        .uplink-box {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--neon);
            padding: 15px; margin-top: auto;
        }

        .uplink-input {
            width: 100%; background: #000; border: 1px solid var(--neon-dim);
            color: var(--neon); font-family: 'Share Tech Mono';
            padding: 10px; box-sizing: border-box; margin-bottom: 10px; outline: none;
        }

        .btn-execute {
            width: 100%; padding: 10px; background: var(--neon); color: #000;
            border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            transition: 0.2s;
        }

        .btn-execute:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }

        .personnel-card {
            background: rgba(0, 255, 65, 0.03); border: 1px solid var(--neon-dim);
            padding: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.3s;
            position: relative;
        }

        .personnel-card:hover { background: rgba(0, 255, 65, 0.1); border-color: var(--neon); }
        
        .stat-val { font-family: 'Orbitron'; font-size: 28px; color: #fff; text-shadow: 0 0 10px var(--neon); }

        /* Filter Map agar terlihat Futuistik */
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.5); }
        
        .sos-active { animation: emergency-bg 0.5s infinite; }
        @keyframes emergency-bg { 
            0% { background: #000; } 
            50% { background: #300; } 
            100% { background: #000; } 
        }

        #missionLog::-webkit-scrollbar { width: 4px; }
        #missionLog::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>

<div class="cyber-grid"></div>

<div class="main-ui" id="dashboardContent">
    <header>
        <div style="font-family: 'Orbitron'; letter-spacing: 3px; display: flex; align-items: center; gap: 10px;">
            <div style="width:10px; height:10px; background:var(--neon); border-radius:50%; animation: pulse 1s infinite;"></div>
            NEURAL COMMAND <span style="color:white; opacity: 0.5;">V4.0</span>
        </div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 20px; color: var(--accent);">00:00:00</div>
        <button style="background:none; border: 1px solid var(--danger); color: var(--danger); padding: 5px 15px; cursor:pointer; font-family:'Orbitron'; font-size: 10px;" onclick="triggerLogout()">DISCONNECT</button>
    </header>

    <aside class="side-panel">
        <h3 style="font-size: 11px; font-family: 'Orbitron'; color: var(--accent); margin: 0;">UNIT STATUS</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="border: 1px solid var(--neon-dim); padding: 10px; text-align:center;">
                <small style="font-size: 9px; opacity: 0.7;">TOTAL UNITS</small>
                <div class="stat-val" id="totalUnit">0</div>
            </div>
            <div style="border: 1px solid var(--neon-dim); padding: 10px; text-align:center;">
                <small style="font-size: 9px; opacity: 0.7;">ACTIVE LINK</small>
                <div class="stat-val" style="color: var(--accent)" id="activeUnit">0</div>
            </div>
        </div>
        <div id="unitList" style="flex:1; margin-top: 10px; overflow-y: auto;">
            <div style="text-align:center; opacity:0.3; font-size:10px; padding:20px;">SCANNING NEURAL NET...</div>
        </div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <div style="font-family: 'Orbitron'; font-size: 11px; color: var(--accent);">MISSION_LOG.EXE</div>
        
        <div id="missionLog" style="flex:1; font-family: 'Share Tech Mono'; font-size: 11px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border: 1px solid var(--neon-dim); color: #88ff88;">
            <div>> SYSTEM INITIALIZED...</div>
            <div>> ENCRYPTION: AES-256 ACTIVE</div>
        </div>

        <div class="uplink-box">
            <div style="font-size: 9px; margin-bottom: 5px; letter-spacing: 1px;">DIRECTIVE UPLINK:</div>
            <input type="text" id="cmdInput" class="uplink-input" placeholder="Tulis instruksi..." onkeypress="if(event.key==='Enter') broadcastCommand()">
            <button class="btn-execute" onclick="broadcastCommand()">EXECUTE COMMAND</button>
        </div>
    </aside>
</div>

<audio id="sosAudio" src="https://www.soundjay.com/buttons/beep-01a.mp3" loop></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let markers = {};

    // LOGOUT FUNCTION
    window.triggerLogout = () => {
        if(confirm("TERMINATE SESSION?")) {
            localStorage.removeItem("auth");
            window.location.replace("login.html");
        }
    };

    // BROADCAST FUNCTION
    window.broadcastCommand = () => {
        const msgInput = document.getElementById('cmdInput');
        const msg = msgInput.value.trim();
        if(!msg) return;
        
        set(ref(db, "commands/global"), {
            text: msg.toUpperCase(),
            timestamp: Date.now(),
            sender: "COMMANDER"
        }).then(() => {
            addLog("BROADCAST: " + msg);
            msgInput.value = "";
        }).catch(err => {
            addLog("UPLINK ERROR: " + err.message);
        });
    };

    function addLog(msg) {
        const log = document.getElementById('missionLog');
        const time = new Date().toLocaleTimeString('id-ID');
        log.innerHTML += `<div style="margin-bottom:4px; border-left:1px solid var(--neon); padding-left:5px;"><span style="color:var(--accent)">[${time}]</span> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    // REALTIME TRACKING ENGINE
    onValue(ref(db, "live"), (snapshot) => {
        const data = snapshot.val();
        const listContainer = document.getElementById("unitList");
        
        if(!data) {
            listContainer.innerHTML = "<div style='opacity:0.3; text-align:center; padding:20px;'>NO UNITS DETECTED</div>";
            return;
        }

        listContainer.innerHTML = "";
        let total = 0, active = 0, anySOS = false;

        Object.keys(data).forEach(id => {
            const val = data[id];
            // Cek jika data diperbarui dalam 60 detik terakhir
            const isOnline = (Date.now() - (val.waktu || 0)) < 60000;
            const hasSOS = val.sos === true && isOnline;

            total++; 
            if(isOnline) active++;
            if(hasSOS) anySOS = true;

            if(val.latitude && val.longitude) {
                const color = hasSOS ? 'var(--danger)' : (isOnline ? 'var(--neon)' : '#555');
                const shadow = hasSOS ? '0 0 15px #ff003c' : '0 0 8px #00ff41';
                const iconHtml = `<div style="width:12px; height:12px; background:${color}; border:2px solid #fff; border-radius:50%; box-shadow:${shadow};"></div>`;
                
                if(!markers[id]) {
                    markers[id] = L.marker([val.latitude, val.longitude], {
                        icon: L.divIcon({ html: iconHtml, className: '', iconSize: [12,12] })
                    }).addTo(map);
                } else {
                    markers[id].setLatLng([val.latitude, val.longitude]);
                    markers[id].setIcon(L.divIcon({ html: iconHtml, className: '', iconSize: [12,12] }));
                }

                // UI Unit Card
                const card = document.createElement("div");
                card.className = "personnel-card";
                card.style.borderLeft = `3px solid ${color}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${id}</strong>
                        <span style="font-size:9px; color:${color}">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                    </div>
                    <div style="font-size:10px; opacity:0.6; margin-top:5px;">
                        SPD: ${val.speed || 0} km/h | ALT: ${val.altitude || 0}m
                    </div>
                `;
                card.onclick = () => {
                    map.flyTo([val.latitude, val.longitude], 17);
                    addLog("TRACKING FOCUS: " + id);
                };
                listContainer.appendChild(card);
            }
        });

        document.getElementById("totalUnit").innerText = total;
        document.getElementById("activeUnit").innerText = active;
        
        // SOS Global Handler
        const sosAudio = document.getElementById('sosAudio');
        if(anySOS) {
            document.body.classList.add('sos-active');
            if(sosAudio.paused) sosAudio.play().catch(e => console.log("Audio play deferred"));
        } else {
            document.body.classList.remove('sos-active');
            sosAudio.pause();
        }
    });

    // Clock Engine
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

    // Initial Map View
    map.setView([-2.5, 118], 5); // Default Indonesia
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

</script>
</body>
</html>
