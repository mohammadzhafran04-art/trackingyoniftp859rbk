<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMAND CENTER | YONIF 859/RBK</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.2);
            --bg: #010a01;
            --danger: #ff003c;
            --panel: rgba(2, 15, 2, 0.95);
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--neon);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* Perbaikan: Animasi SOS pada Body */
        body.sos-active {
            animation: screen-red-alert 0.5s infinite alternate;
        }
        @keyframes screen-red-alert {
            from { box-shadow: inset 0 0 0px transparent; }
            to { box-shadow: inset 0 0 100px rgba(255, 0, 60, 0.4); }
        }

        .grid-overlay {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; opacity: 0.1; z-index: 0;
        }

        .main-ui {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 80px 1fr;
            height: 100vh; gap: 15px; padding: 15px; box-sizing: border-box;
            position: relative; z-index: 1;
        }

        header {
            grid-column: span 3;
            background: var(--panel);
            border: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
            box-shadow: 0 0 20px var(--neon-dim);
        }

        .side-panel {
            background: var(--panel);
            border: 1px solid var(--neon);
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto; backdrop-filter: blur(10px);
        }

        #map { border: 1px solid var(--neon); background: #000; }

        /* Marker & Radar Styles */
        .custom-marker {
            width: 24px; height: 24px;
            background: var(--neon);
            border: 2px solid #fff; border-radius: 50%;
            box-shadow: 0 0 15px var(--neon);
            display: flex; align-items: center; justify-content: center;
            color: black; font-weight: bold; font-size: 9px;
        }
        .sos-marker {
            background: var(--danger) !important;
            animation: marker-pulse 0.6s infinite alternate;
        }
        @keyframes marker-pulse {
            from { transform: scale(1); box-shadow: 0 0 10px var(--danger); }
            to { transform: scale(1.4); box-shadow: 0 0 30px var(--danger); }
        }

        .personnel-card {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--neon-dim);
            padding: 15px; border-left: 4px solid var(--neon);
            transition: 0.3s; cursor: pointer;
        }
        .personnel-card.sos {
            border-left-color: var(--danger);
            background: rgba(255, 0, 60, 0.1);
            animation: card-flicker 1s infinite;
        }
        @keyframes card-flicker {
            50% { border-left-color: white; }
        }

        /* Speed Gauge */
        .speed-gauge {
            width: 100%; height: 10px; background: #111;
            margin-top: 10px; border-radius: 5px; overflow: hidden;
        }
        .speed-fill {
            height: 100%; background: linear-gradient(90deg, var(--neon), var(--accent));
            width: 0%; transition: 1s;
        }

        .stat-val { font-family: 'Orbitron'; font-size: 28px; color: white; }

        /* Leaflet Dark Filter */
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.9) contrast(1.2); }
    </style>
</head>
<body>

<div class="grid-overlay"></div>

<div class="main-ui">
    <header>
        <div style="font-family: 'Orbitron'; letter-spacing: 5px;">
            <span style="color: var(--accent)">●</span> BATTALION COMMAND CENTER
        </div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 24px;">00:00:00</div>
        <div style="font-family: 'Share Tech Mono'; font-size: 12px; text-align: right;">
            SECTOR: 859-RBK<br>STATUS: <span id="sysStatus" style="color:var(--neon)">ENCRYPTED</span>
        </div>
    </header>

    <aside class="side-panel">
        <div>
            <h3 style="font-size: 12px; margin-bottom: 10px; font-family: 'Orbitron'">OPERATIONAL FORCE</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="border:1px solid var(--neon); padding:10px; text-align:center">
                    <div class="stat-val" id="totalUnit">0</div>
                    <small>UNITS</small>
                </div>
                <div style="border:1px solid var(--neon); padding:10px; text-align:center">
                    <div class="stat-val" style="color: var(--accent)" id="activeUnit">0</div>
                    <small>LIVE</small>
                </div>
            </div>
        </div>

        <div id="unitList" style="flex:1"></div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <div style="font-family: 'Orbitron'; border-bottom: 2px solid var(--neon); padding-bottom:10px">TELEMETRY DATA</div>
        <div id="detailBox" style="font-family: 'Share Tech Mono'; font-size: 14px; margin-top:15px">
            <p style="opacity:0.5">SELECT UNIT ON MAP...</p>
        </div>

        <div id="sosAlertBox"></div>

        <div style="margin-top:auto">
            <h4 style="font-size:10px; color:var(--accent)">SATELLITE DOWNLINK</h4>
            <div style="font-size:10px; opacity:0.6; line-height:1.5">
                SAT: MIL-COM-7<br>
                POS: FIX-3D ACTIVE<br>
                BW: 124.5 kbps
            </div>
        </div>
    </aside>
</div>

<audio id="sosAudio" src="https://www.soundjay.com/buttons/beep-01a.mp3" loop></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markers = {};
    const sosAudio = document.getElementById('sosAudio');

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

    // FIX: Fungsi Pembersihan Marker
    function clearOldMarkers(currentData) {
        Object.keys(markers).forEach(id => {
            if (!currentData || !currentData[id]) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
        });
    }

    onValue(ref(db, "live"), (snapshot) => {
        const data = snapshot.val();
        const listContainer = document.getElementById("unitList");
        const sosAlertBox = document.getElementById("sosAlertBox");
        
        clearOldMarkers(data);

        if(!data) {
            listContainer.innerHTML = "<div style='opacity:0.3; text-align:center'>STANDBY...</div>";
            document.body.classList.remove('sos-active');
            sosAudio.pause();
            return;
        }

        listContainer.innerHTML = "";
        let total = 0, active = 0, anySOS = false;

        Object.keys(data).forEach(id => {
            const val = data[id];
            // FIX: Validasi Online (Data harus diupdate dalam 30 detik terakhir)
            const diff = Date.now() - (val.waktu || 0);
            const isOnline = diff < 30000; 
            const hasSOS = val.sos === true;
            
            total++;
            if(isOnline) active++;
            if(hasSOS && isOnline) anySOS = true;

            if(val.latitude && val.longitude) {
                // Update Marker
                const iconHtml = `<div class="custom-marker ${hasSOS && isOnline ? 'sos-marker' : ''}">${id.substring(0,2)}</div>`;
                const customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [24,24] });

                if(!markers[id]) {
                    markers[id] = L.marker([val.latitude, val.longitude], {icon: customIcon}).addTo(map);
                } else {
                    markers[id].setLatLng([val.latitude, val.longitude]);
                    markers[id].setIcon(customIcon);
                }

                // Add to List
                const card = document.createElement("div");
                card.className = `personnel-card ${hasSOS && isOnline ? 'sos' : ''}`;
                card.style.opacity = isOnline ? "1" : "0.4";
                
                const speedPct = Math.min((val.speed || 0) * 2, 100);

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <strong>${id}</strong>
                        <small style="color:${isOnline ? 'var(--neon)' : 'red'}">${isOnline ? 'ONLINE' : 'OFFLINE'}</small>
                    </div>
                    <div style="font-size:11px; margin-top:5px">SPD: ${val.speed || 0} KM/H | ACC: ${val.accuracy || 0}M</div>
                    <div class="speed-gauge"><div class="speed-fill" style="width:${speedPct}%"></div></div>
                `;

                card.onclick = () => {
                    map.flyTo([val.latitude, val.longitude], 16);
                    document.getElementById("detailBox").innerHTML = `
                        <div style="color:var(--accent)">ID: ${id}</div>
                        <div>LAT: ${val.latitude.toFixed(6)}</div>
                        <div>LON: ${val.longitude.toFixed(6)}</div>
                        <div>LAST: ${new Date(val.waktu).toLocaleTimeString()}</div>
                        <div style="margin-top:10px; border:1px solid var(--neon-dim); padding:5px">
                            SIGNAL: ${val.accuracy < 20 ? 'EXCELLENT' : 'WEAK'}<br>
                            STATUS: ${hasSOS ? 'EMERGENCY' : 'PATROL'}
                        </div>
                    `;
                };
                listContainer.appendChild(card);
            }
        });

        // Alarm Logic
        if(anySOS) {
            document.body.classList.add('sos-active');
            if(sosAudio.paused) sosAudio.play();
            sosAlertBox.innerHTML = `<div style="background:var(--danger); padding:10px; margin-top:10px; animation:marker-pulse 0.5s infinite">⚠️ IMMEDIATE SOS ALERT</div>`;
        } else {
            document.body.classList.remove('sos-active');
            sosAudio.pause();
            sosAlertBox.innerHTML = "";
        }

        document.getElementById("totalUnit").innerText = total;
        document.getElementById("activeUnit").innerText = active;
    });
</script>
</body>
</html>
