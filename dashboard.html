<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HQ COMMAND | YONIF 859 RBK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #000800; --danger: #ff003c; --accent: #00e5ff; }
        body, html { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--neon); height: 100vh; overflow: hidden; text-transform: uppercase; }
        .main-ui { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: 60px 1fr; height: 100vh; gap: 5px; padding: 5px; box-sizing: border-box; }
        header { grid-column: span 2; border: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(0,20,0,0.9); }
        .side-panel { border: 1px solid rgba(0,255,65,0.2); padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; background: rgba(0,20,0,0.9); }
        #map { border: 1px solid var(--neon); z-index: 1; filter: invert(100%) hue-rotate(180deg) brightness(0.6); }
        .unit-card { background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.1); padding: 10px; cursor: pointer; margin-bottom: 5px; }
        .unit-card.sos { border-color: var(--danger); animation: pulse 1s infinite; background: rgba(255,0,0,0.1); }
        .online { color: var(--neon); } .offline { color: #555; }
        @keyframes pulse { 0% { box-shadow: 0 0 0px var(--danger); } 50% { box-shadow: 0 0 15px var(--danger); } 100% { box-shadow: 0 0 0px var(--danger); } }
    </style>
</head>
<body>
    <div class="main-ui">
        <header>
            <div style="font-family: 'Orbitron'; font-weight: bold;">HQ_COMMAND_CENTER</div>
            <div id="clock">00:00:00</div>
        </header>
        <aside class="side-panel">
            <div style="font-family: 'Orbitron'; border-bottom: 1px solid var(--neon); padding-bottom: 5px;">ACTIVE_UNITS</div>
            <div id="unitList">MENUNGGU SIGNAL...</div>
        </aside>
        <div id="map"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const conf = { databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(conf);
        const db = getDatabase(app);

        const map = L.map('map', { zoomControl: false }).setView([-2.0, 118.0], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markers = {}, firstLock = false;

        onValue(ref(db, "live"), (snap) => {
            const data = snap.val();
            const list = document.getElementById('unitList');
            list.innerHTML = "";
            if(!data) return;

            for(let id in data) {
                const u = data[id];
                const pos = [u.lat, u.lon];
                const isOnline = (Date.now() - u.waktu) < 60000;

                // Auto Fokus ke unit pertama yang aktif
                if(!firstLock && isOnline) { map.flyTo(pos, 14); firstLock = true; }

                if(markers[id]) {
                    markers[id].setLatLng(pos);
                    markers[id].setStyle({ fillColor: isOnline ? (u.sos ? '#f00' : '#0f0') : '#444' });
                } else {
                    markers[id] = L.circleMarker(pos, { radius: 10, color: '#fff', fillColor: '#0f0', fillOpacity: 1 }).addTo(map).bindTooltip(id);
                }

                const card = document.createElement('div');
                card.className = `unit-card ${u.sos ? 'sos' : ''}`;
                card.innerHTML = `<strong>${id}</strong><br><small class="${isOnline?'online':'offline'}">${isOnline?'● ONLINE':'○ OFFLINE'}</small>`;
                card.onclick = () => map.flyTo(pos, 16);
                list.appendChild(card);
            }
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
