<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMAND | YONIF 859/RBK 2045</title>
    
    <script>
        if (localStorage.getItem("auth") !== "true") {
            window.location.replace("login.html");
            document.write('<style>body { display:none !important; }</style>');
            window.stop(); 
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.1);
            --bg: #000500;
            --danger: #ff003c;
            --panel: rgba(0, 15, 0, 0.85);
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg); color: var(--neon);
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* --- WOW FEATURE: NEURAL SCAN ANIMATION --- */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scan-effect {
            position: fixed; inset: 0; 
            background: linear-gradient(to bottom, transparent, var(--neon-dim), transparent);
            height: 100px; width: 100%; z-index: 1000; pointer-events: none;
            animation: scanline 4s linear infinite; opacity: 0.5;
        }

        /* --- CSS RESTORATION & UPGRADE --- */
        #loadingArea {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .progress-track { width: 300px; height: 4px; background: rgba(0,255,65,0.1); margin: 20px 0; }
        .progress-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 15px var(--neon); transition: width 0.2s; }

        .cyber-grid {
            position: fixed; inset: 0; z-index: -1; opacity: 0.2;
            background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px), linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .main-ui {
            display: grid; grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 70px 1fr; height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
        }

        header {
            grid-column: span 3; background: var(--panel); border: 1px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px;
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
        }

        .side-panel {
            background: var(--panel); border: 1px solid var(--neon-dim);
            padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
        }

        /* Personnel Card Fix */
        .personnel-card {
            background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon-dim);
            padding: 12px; cursor: pointer; transition: 0.3s; position: relative;
        }
        .personnel-card:hover { background: var(--neon-dim); border-color: var(--neon); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--neon); box-shadow: 0 0 8px var(--neon); }
        .offline { background: #555; }

        #map { border: 1px solid var(--neon-dim); background: #000; }
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.4); }

        .terminal-log {
            font-size: 11px; font-family: 'Share Tech Mono'; background: rgba(0,0,0,0.8);
            padding: 10px; height: 200px; overflow-y: auto; border: 1px solid var(--neon-dim);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="scan-effect"></div>
<div class="cyber-grid"></div>

<div id="loadingArea">
    <div style="font-family: 'Orbitron'; font-size: 18px; letter-spacing: 5px; color: var(--neon);">BOOTING NEURAL_OS</div>
    <div class="progress-track">
        <div id="progressFill" class="progress-fill"></div>
    </div>
    <div id="loadMsg" style="font-family: 'Share Tech Mono'; font-size: 10px; color: var(--accent);">MOUNTING SATELLITE INTERFACE...</div>
</div>

<div class="main-ui hidden" id="dashboardContent">
    <header>
        <div style="font-family: 'Orbitron'; letter-spacing: 2px;">
            <span style="color:var(--neon)">●</span> NEURAL COMMAND <span style="color:white; opacity:0.5">V4.2</span>
        </div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 20px; color: var(--accent);">00:00:00</div>
        <button onclick="triggerLogout()" style="background:transparent; border:1px solid var(--danger); color:var(--danger); font-family:'Orbitron'; padding:5px 15px; cursor:pointer;">DISCONNECT</button>
    </header>

    <aside class="side-panel">
        <h3 style="font-size: 11px; font-family: 'Orbitron'; color: var(--accent);">ACTIVE PERSONNEL</h3>
        <div id="unitList"></div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <h3 style="font-size: 11px; font-family: 'Orbitron'; color: var(--accent);">TACTICAL BROADCAST</h3>
        <input type="text" id="cmdInput" placeholder="TYPE DIRECTIVE..." style="background:black; border:1px solid var(--neon); color:var(--neon); padding:10px; font-family:'Share Tech Mono'; outline:none;">
        <button class="btn-command" onclick="broadcastCommand()" style="background:var(--neon-dim); border:1px solid var(--neon); color:var(--neon); padding:10px; cursor:pointer; font-family:'Orbitron';">EXECUTE COMMAND</button>
        
        <h3 style="font-size: 11px; font-family: 'Orbitron'; color: var(--accent); margin-top: 15px;">ENCRYPTED LOG</h3>
        <div class="terminal-log" id="sysLog">> LINK_ESTABLISHED...</div>
    </aside>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasedatabase.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let map, markers = {};

    // 1. SEQUENCE LOADING
    window.addEventListener('DOMContentLoaded', () => {
        let prog = 0;
        const bar = document.getElementById('progressFill');
        const loader = setInterval(() => {
            prog += Math.random() * 25;
            if(prog > 100) prog = 100;
            bar.style.width = prog + "%";
            if(prog === 100) {
                clearInterval(loader);
                setTimeout(initDashboard, 600);
            }
        }, 120);
    });

    function initDashboard() {
        document.getElementById('loadingArea').classList.add('hidden');
        document.getElementById('dashboardContent').classList.remove('hidden');
        
        map = L.map('map', { zoomControl: false }).setView([-6.2000, 106.8166], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        syncUnits();
    }

    // 2. SYNC & INTERACTIVITY (FIXED ZOOM & STATUS)
    function syncUnits() {
        onValue(ref(db, "live"), (snapshot) => {
            const data = snapshot.val();
            const listArea = document.getElementById('unitList');
            listArea.innerHTML = "";
            const now = Date.now();

            for(let id in data) {
                const unit = data[id];
                const isOnline = (now - unit.waktu) < 10000; // Online jika update < 10 detik

                // Update Map Markers
                if(!markers[id]) {
                    markers[id] = L.marker([unit.latitude, unit.longitude]).addTo(map);
                } else {
                    markers[id].setLatLng([unit.latitude, unit.longitude]);
                }
                
                // Color marker if SOS
                if(unit.sos) markers[id]._icon.style.filter = "hue-rotate(280deg) brightness(1.5)";

                // Update List with Click-to-Zoom
                const card = document.createElement('div');
                card.className = "personnel-card";
                card.onclick = () => focusUnit(unit.latitude, unit.longitude, id);
                card.innerHTML = `
                    <div style="font-family:'Orbitron'; font-size:13px;">
                        <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                        ${id} ${unit.sos ? '<span style="color:var(--danger); animation:blink 0.5s infinite"> [!]</span>' : ''}
                    </div>
                    <div style="font-size:10px; margin-top:5px; opacity:0.8; font-family:'Share Tech Mono'">
                        POS: ${unit.latitude.toFixed(4)}, ${unit.longitude.toFixed(4)}<br>
                        SPD: ${unit.speed} KM/H | ALT: ${unit.altitude}M
                    </div>
                `;
                listArea.appendChild(card);
            }
        });
    }

    // WOW FEATURE: TARGET LOCK FOCUS
    function focusUnit(lat, lon, id) {
        map.flyTo([lat, lon], 18, { duration: 1.5 });
        addLog(`LOCKING NEURAL LINK ON: ${id}...`);
        
        // Visual cue on marker
        markers[id].bindPopup(`<b style="color:black">TARGET: ${id}</b>`).openPopup();
        
        if(navigator.vibrate) navigator.vibrate(50);
    }

    window.broadcastCommand = () => {
        const text = document.getElementById('cmdInput').value.trim();
        if(!text) return;
        set(ref(db, "commands/global"), { text: text, timestamp: Date.now() })
            .then(() => {
                addLog("BROADCAST SENT: " + text);
                document.getElementById('cmdInput').value = "";
            });
    };

    function addLog(msg) {
        const log = document.getElementById('sysLog');
        log.innerHTML += `<br>> [${new Date().toLocaleTimeString()}] ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    window.triggerLogout = () => {
        localStorage.removeItem("auth");
        location.reload();
    };
</script>
</body>
</html>
