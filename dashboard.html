<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ COMMAND CENTER - 859/RBK</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff0055;
            --bg-dark: #020a0a;
            --panel-bg: rgba(5, 20, 20, 0.9);
            --border: rgba(0, 242, 255, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--neon);
            overflow: hidden;
            height: 100vh;
        }

        /* Scanline Overlay */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 9999;
            pointer-events: none;
        }

        .header {
            height: 60px;
            background: #051515;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            border-bottom: 2px solid var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            z-index: 1000;
        }

        .header h3 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            height: calc(100vh - 62px);
        }

        .panel {
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .panel-right { border-right: none; border-left: 1px solid var(--border); }

        #map {
            height: 100%;
            background: #000;
            /* Filter Peta Taktis */
            filter: brightness(0.8) contrast(1.2) saturate(0.2) hue-rotate(140deg) invert(0.9);
        }

        h4 {
            font-family: 'Orbitron', sans-serif;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: white;
        }

        .unit-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            margin-bottom: 10px;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .unit-item:hover, .unit-item.active {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon);
        }

        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px;
        }
        .online { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .offline { background: #555; }
        .danger-sos { background: var(--danger); animation: blink 0.5s infinite; }

        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; } }

        .stat-box {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 10px; text-align: center;
        }

        .stat-card b { display: block; font-size: 1.2rem; }

        .detail-row {
            display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,242,255,0.1); padding: 8px 0; font-size: 0.85rem;
        }

        .logout-btn {
            background: transparent; border: 1px solid var(--danger); color: var(--danger);
            padding: 5px 15px; cursor: pointer; font-family: 'Orbitron';
        }
    </style>
</head>
<body>

<div class="header">
    <h3>🛰 COMMAND CENTER YONIF 859/RBK</h3>
    <div style="display:flex; align-items:center; gap:20px">
        <div id="clock" style="font-family:'Share Tech Mono'; font-size:1.2rem">00:00:00</div>
        <button class="logout-btn" onclick="logout()">TERMINATE</button>
    </div>
</div>

<div class="container">
    <div class="panel">
        <h4>SQUAD STATUS</h4>
        <div class="stat-box">
            <div class="stat-card"><b id="count-total">0</b><small>UNITS</small></div>
            <div class="stat-card"><b id="count-online" style="color:var(--neon)">0</b><small>ACTIVE</small></div>
        </div>

        <h4>ACTIVE RADIOGRAM</h4>
        <input type="text" id="search" placeholder="SEARCH CALLSIGN..." 
               style="width:100%; background:black; border:1px solid var(--neon); padding:8px; color:var(--neon); margin-bottom:15px;">
        <div id="listAnggota"></div>
    </div>

    <div id="map"></div>

    <div class="panel panel-right">
        <h4>TARGET INTELLIGENCE</h4>
        <div id="detailBox" style="font-family:'Share Tech Mono'">
            <p style="opacity:0.5; text-align:center; margin-top:50px">[ NO TARGET SELECTED ]</p>
        </div>

        <h4 style="margin-top:50px">SYSTEM LOGS</h4>
        <div id="logs" style="font-size:0.7rem; color:rgba(0,242,255,0.5); font-family:monospace"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Init Map
    const map = L.map('map', {zoomControl: false}).setView([-2.5489, 118.0149], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let markers = {};
    let allData = {};
    let selectedId = null;

    // Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    function addLog(msg) {
        const l = document.getElementById('logs');
        l.innerHTML = `> ${msg}<br>` + l.innerHTML;
        if(l.childNodes.length > 20) l.lastChild.remove();
    }

    // Fungsi Render Utama
    function render() {
        const list = document.getElementById("listAnggota");
        const keyword = document.getElementById("search").value.toLowerCase();
        list.innerHTML = "";

        let total = 0, online = 0;

        Object.keys(allData).forEach(nama => {
            const data = allData[nama];
            
            // SINKRONISASI VARIABEL: Cek lat/latitude atau lon/longitude
            const lat = data.lat || data.latitude;
            const lon = data.lon || data.longitude;
            const waktu = data.waktu || 0;
            
            if(!lat || !lon) return;

            const isOnline = (Date.now() - waktu) < 30000; // 30 Detik aktif
            total++;
            if(isOnline) online++;

            if(!nama.toLowerCase().includes(keyword)) return;

            // Marker Logic
            if (!markers[nama]) {
                markers[nama] = L.circleMarker([lat, lon], {
                    radius: 9,
                    fillColor: data.status === "DANGER_SOS" ? "#ff0055" : "#00f2ff",
                    color: "#fff",
                    weight: 2,
                    fillOpacity: 0.8
                }).addTo(map).bindTooltip(nama);
                addLog(`NEW CONNECTION: ${nama}`);
            } else {
                markers[nama].setLatLng([lat, lon]);
                markers[nama].setStyle({
                    fillColor: data.status === "DANGER_SOS" ? "#ff0055" : (isOnline ? "#00f2ff" : "#555")
                });
            }

            // List Item UI
            const item = document.createElement("div");
            item.className = `unit-item ${selectedId === nama ? 'active' : ''}`;
            let statusClass = isOnline ? 'online' : 'offline';
            if(data.status === "DANGER_SOS") statusClass = 'danger-sos';

            item.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <b>${nama.toUpperCase()}</b>
                    <small>${data.speed || 0} KM/H</small>
                </div>
                <div style="font-size:0.75rem; margin-top:5px; opacity:0.8">
                    <span class="status-dot ${statusClass}"></span>
                    ${data.status === "DANGER_SOS" ? "EMERGENCY" : (isOnline ? "OPERATIONAL" : "LOST CONTACT")}
                </div>
            `;

            item.onclick = () => {
                selectedId = nama;
                map.flyTo([lat, lon], 16);
                showDetail(nama, data, isOnline);
                render();
            };
            list.appendChild(item);
        });

        document.getElementById("count-total").innerText = total;
        document.getElementById("count-online").innerText = online;
    }

    function showDetail(nama, data, isOnline) {
        const lat = data.lat || data.latitude;
        const lon = data.lon || data.longitude;
        
        document.getElementById("detailBox").innerHTML = `
            <div style="background:rgba(0,242,255,0.1); padding:15px; border:1px solid var(--neon); margin-bottom:15px">
                <h3 style="margin:0">${nama.toUpperCase()}</h3>
                <small>SIGNAL: ${isOnline ? 'ENCRYPTED' : 'OFFLINE'}</small>
            </div>
            <div class="detail-row"><span>COORDS</span><span>${lat.toFixed(6)},${lon.toFixed(6)}</span></div>
            <div class="detail-row"><span>SPEED</span><span>${data.speed || 0} KM/H</span></div>
            <div class="detail-row"><span>BATTERY</span><span>${data.battery || 'N/A'}</span></div>
            <div class="detail-row"><span>ACCURACY</span><span>±${Math.round(data.accuracy || 0)} M</span></div>
            <div class="detail-row"><span>LAST UPD</span><span>${data.last_update || '-'}</span></div>
            <div style="margin-top:15px; font-size:0.75rem; color:#fff; border:1px solid #333; padding:10px">
                LOC: ${data.alamat || 'Fetching address...'}
            </div>
        `;
    }

    // Listener Firebase
    onValue(ref(db, "live"), snap => {
        const val = snap.val();
        if(val) {
            allData = val;
            render();
        }
    });

    window.logout = () => {
        localStorage.removeItem("auth");
        window.location.href = "login.html";
    };

    document.getElementById("search").addEventListener("input", render);
</script>

</body>
</html>
