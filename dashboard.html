<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HQ Command Center | YONIF TP 859</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --bg: #020502;
            --panel: rgba(5, 15, 5, 0.9);
        }

        body {
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--neon);
            overflow: hidden;
        }

        .main-ui {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            height: 100vh;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Tactical Header */
        .top-bar {
            grid-column: span 3;
            background: var(--panel);
            border: 1px solid var(--neon);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .side-panel {
            background: var(--panel);
            border: 1px solid var(--neon);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        #map {
            border: 1px solid var(--neon);
            background: #000;
            filter: hue-rotate(90deg) brightness(0.8) contrast(1.2); /* Effect Night Vision */
        }

        /* Marker & List Styling */
        .personnel-card {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .personnel-card:hover {
            background: rgba(0, 255, 65, 0.2);
            border-color: var(--neon);
        }

        .status-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            float: right;
        }

        .online { background: var(--neon); color: black; }
        .offline { background: #ff003c; color: white; }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item {
            border: 1px solid var(--neon);
            padding: 10px;
            text-align: center;
        }

        .stat-val { font-size: 24px; font-weight: bold; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }

        .logout-btn {
            background: transparent;
            border: 1px solid #ff003c;
            color: #ff003c;
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>

<div class="main-ui">
    <div class="top-bar">
        <div>🛰 WAR ROOM: STRATEGIC MONITORING SYSTEM</div>
        <div id="clock">00:00:00</div>
        <button class="logout-btn" onclick="logout()">TERMINATE ACCESS</button>
    </div>

    <div class="side-panel">
        <section>
            <h3 style="margin-top:0">BATTALION STATS</h3>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-val" id="totalAnggota">0</div>
                    <div style="font-size:10px">TOTAL UNIT</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" style="color:#00ff88" id="onlineAnggota">0</div>
                    <div style="font-size:10px">ACTIVE</div>
                </div>
            </div>
        </section>

        <section>
            <h3>PERSONNEL LOCATOR</h3>
            <input type="text" id="searchNama" placeholder="SEARCH ID..." 
                   style="width:100%; background:black; border:1px solid var(--neon); color:var(--neon); padding:10px; box-sizing:border-box;">
            <div id="listAnggota" style="margin-top:15px"></div>
        </section>
    </div>

    <div id="map"></div>

    <div class="side-panel">
        <h3>UNIT INTELLIGENCE</h3>
        <div id="detailBox" style="font-size: 14px; line-height: 1.6;">
            SELECT UNIT FROM MAP OR LIST TO DEPLOY DATA...
        </div>
        
        <div style="margin-top: auto; font-size: 10px; opacity: 0.5;">
            ENCRYPTION: AES-256 ACTIVE<br>
            COORDINATE SYSTEM: WGS-84
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey:"AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain:"real-time-location-30d91.firebaseapp.com",
        databaseURL:"https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:"real-time-location-30d91",
        storageBucket:"real-time-location-30d91.firebasestorage.app",
        messagingSenderId:"1092565406651",
        appId:"1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const map = L.map('map', { zoomControl: false }).setView([-2, 118], 5);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markers = {};
    
    // Update Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    onValue(ref(db, "live"), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        const list = document.getElementById("listAnggota");
        list.innerHTML = "";
        let count = 0, active = 0;

        Object.keys(data).forEach(id => {
            const val = data[id];
            const isOnline = (Date.now() - val.waktu) < 30000;
            
            count++;
            if(isOnline) active++;

            // Update Map Marker
            if(!markers[id]) {
                markers[id] = L.circleMarker([val.latitude, val.longitude], {
                    radius: 8, color: isOnline ? '#00ff41' : '#ff003c', fillOpacity: 0.8
                }).addTo(map);
            } else {
                markers[id].setLatLng([val.latitude, val.longitude]);
                markers[id].setStyle({color: isOnline ? '#00ff41' : '#ff003c'});
            }

            // Update List
            const div = document.createElement("div");
            div.className = "personnel-card";
            div.innerHTML = `
                <span class="status-tag ${isOnline?'online':'offline'}">${isOnline?'ACT':'OFF'}</span>
                <strong>${id}</strong><br>
                <small>SPD: ${val.speed} KM/H</small>
            `;
            div.onclick = () => {
                map.flyTo([val.latitude, val.longitude], 15);
                document.getElementById("detailBox").innerHTML = `
                    <h2 style="color:white; margin:0">${id}</h2>
                    <hr border="1" color="#00ff41">
                    POSITION: ${val.latitude.toFixed(5)}, ${val.longitude.toFixed(5)}<br>
                    VELOCITY: ${val.speed} KM/H<br>
                    ACCURACY: ${val.accuracy} METERS<br>
                    LAST CONTACT: ${new Date(val.waktu).toLocaleTimeString()}
                `;
            };
            list.appendChild(div);
        });

        document.getElementById("totalAnggota").innerText = count;
        document.getElementById("onlineAnggota").innerText = active;
    });

    window.logout = () => { localStorage.clear(); location.href='login.html'; };
</script>
</body>
</html>
