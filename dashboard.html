<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Command Center | YONIF TP 859</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.2);
            --bg: #020502;
            --danger: #ff003c;
            --panel: rgba(2, 8, 2, 0.95);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--neon);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* Scanline CRT Effect */
        body::after {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .main-ui {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            grid-template-rows: 70px 1fr;
            height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
        }

        .top-bar {
            grid-column: span 3;
            background: var(--panel);
            border: 1px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-shadow: 0 0 15px var(--neon-dim);
        }

        .side-panel {
            background: var(--panel);
            border: 1px solid var(--neon);
            padding: 15px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; box-shadow: inset 0 0 10px var(--neon-dim);
        }

        #map {
            border: 1px solid var(--neon);
            background: #000; z-index: 1;
        }

        /* Animated Radar Marker */
        .radar-icon {
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(0, 255, 65, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 65, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }

        .personnel-card {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--neon-dim);
            padding: 10px; margin-bottom: 8px; cursor: pointer;
            transition: 0.2s; border-left: 3px solid var(--neon);
        }
        .personnel-card:hover { 
            background: var(--neon-dim); 
            transform: translateX(5px);
        }

        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; }
        .logout-btn {
            background: transparent; border: 1px solid var(--danger); color: var(--danger);
            padding: 5px 15px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 10px;
        }
        .logout-btn:hover { background: var(--danger); color: white; }

        /* Leaflet Dark Theme Hack */
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.9) contrast(1.1); }
    </style>
</head>
<body>

<div class="main-ui">
    <header class="top-bar">
        <div style="font-family: 'Orbitron'; letter-spacing: 3px;">🛰 BATTALION COMMAND CENTER</div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 20px;">00:00:00</div>
        <button class="logout-btn" onclick="window.location.href='index.html'">EXIT SYSTEM</button>
    </header>

    <aside class="side-panel">
        <section>
            <h3 style="font-size: 12px; border-bottom: 1px solid var(--neon); margin: 0 0 10px 0;">UNIT STATUS</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="border: 1px solid var(--neon); padding: 10px; text-align: center;">
                    <div class="stat-val" id="totalUnit">0</div>
                    <small>TOTAL</small>
                </div>
                <div style="border: 1px solid var(--neon); padding: 10px; text-align: center;">
                    <div class="stat-val" style="color: #00ff88" id="activeUnit">0</div>
                    <small>ONLINE</small>
                </div>
            </div>
        </section>

        <section>
            <h3 style="font-size: 12px; border-bottom: 1px solid var(--neon); margin: 15px 0 10px 0;">ACTIVE TRACKERS</h3>
            <div id="unitList"></div>
        </section>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <h3 style="font-size: 12px; border-bottom: 1px solid var(--neon); margin: 0 0 10px 0;">INTEL REPORT</h3>
        <div id="detailBox" style="font-size: 14px; line-height: 1.5;">
            <p style="opacity: 0.5;">SELECT UNIT FOR TELEMETRY...</p>
        </div>
        
        <div style="margin-top: auto; padding-top: 10px; border-top: 1px solid var(--neon); font-size: 10px; opacity: 0.6;">
            CONNECTION: SECURE<br>
            ENCRYPTION: RSA-4096<br>
            GPS: WGS-84 ACTIVE
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Map Setup
    const map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markers = {};

    // Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    // Global Function for Click
    window.focusUnit = (id, lat, lon) => {
        map.flyTo([lat, lon], 16);
        if(markers[id]) markers[id].openPopup();
    };

    // Firebase Sync
    onValue(ref(db, "live"), (snapshot) => {
        const data = snapshot.val();
        const listContainer = document.getElementById("unitList");
        if(!data) {
            listContainer.innerHTML = "NO DATA";
            return;
        }

        listContainer.innerHTML = "";
        let total = 0, active = 0;

        Object.keys(data).forEach(id => {
            const val = data[id];
            // Online if last update < 2 minutes
            const isOnline = (Date.now() - (val.waktu || 0)) < 120000;
            total++; if(isOnline) active++;

            if(val.latitude && val.longitude) {
                // Update Marker
                if(!markers[id]) {
                    markers[id] = L.marker([val.latitude, val.longitude]).addTo(map).bindPopup(`<b>${id}</b>`);
                } else {
                    markers[id].setLatLng([val.latitude, val.longitude]);
                }

                // Update List UI
                const card = document.createElement("div");
                card.className = "personnel-card";
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <strong>${id}</strong>
                        <span style="color:${isOnline?'#00ff41':'#ff003c'}">${isOnline?'ONLINE':'LOST'}</span>
                    </div>
                    <small>SPD: ${val.speed || 0} KM/H | ACC: ${Math.round(val.accuracy || 0)}M</small>
                `;
                card.onclick = () => {
                    window.focusUnit(id, val.latitude, val.longitude);
                    document.getElementById("detailBox").innerHTML = `
                        <h2 style="margin:0; color:white">${id}</h2>
                        <hr style="border:1px solid var(--neon)">
                        <p>COORDS: ${val.latitude.toFixed(5)}, ${val.longitude.toFixed(5)}</p>
                        <p>STATUS: ${isOnline?'ACTIVE':'SIGNAL LOST'}</p>
                        <p>LAST CONTACT: ${new Date(val.waktu).toLocaleTimeString()}</p>
                    `;
                };
                listContainer.appendChild(card);
            }
        });

        document.getElementById("totalUnit").innerText = total;
        document.getElementById("activeUnit").innerText = active;
    });
</script>
</body>
</html>
