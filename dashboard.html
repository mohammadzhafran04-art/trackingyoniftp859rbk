<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - CYBER TACTICAL DASHBOARD</title>
    
    <script>
        if (localStorage.getItem("auth") !== "true") {
            document.documentElement.style.display = 'none';
            window.location.href = "login.html";
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --warning: #ffcc00; --bg-dark: #010808; --panel-bg: rgba(2, 12, 12, 0.96); --border: rgba(0, 242, 255, 0.2); }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: var(--neon); overflow: hidden; height: 100vh; }
        
        /* CRT & UI EFFECTS */
        .crt-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 3px; z-index: 10000; pointer-events: none; }
        .header { height: 55px; background: #001010; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); z-index: 1000; }
        
        .container { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 57px); }
        .panel { background: var(--panel-bg); border-right: 1px solid var(--border); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        
        #map { height: 100%; background: #000; filter: brightness(0.9) contrast(1.1) saturate(0.2) hue-rotate(140deg) invert(0.95); }
        
        /* UNIT CARDS */
        .unit-card { background: rgba(0, 242, 255, 0.03); border: 1px solid var(--border); margin-bottom: 12px; padding: 12px; cursor: pointer; position: relative; clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%); transition: 0.3s; }
        .unit-card:hover { border-color: var(--neon); background: rgba(0, 242, 255, 0.08); }
        .unit-card.active { background: rgba(0, 242, 255, 0.15); border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .unit-card.sos { border-color: var(--danger); background: rgba(255, 0, 85, 0.2); animation: pulse-red 0.8s infinite; }
        
        /* BUTTONS */
        .logout-btn { background: linear-gradient(45deg, #ff0055, #880022); color: white; border: none; padding: 5px 15px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s; }
        .logout-btn:hover { filter: brightness(1.2); box-shadow: 0 0 10px var(--danger); }
        
        .shutdown-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 99999; display: none; flex-direction: column; justify-content: center; align-items: center; font-family: 'Orbitron'; color: var(--neon); }
        
        .map-controls { position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 5px; }
        .map-btn { background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon); padding: 8px; cursor: pointer; font-size: 10px; font-family: 'Orbitron'; }
        .map-btn:hover { background: var(--neon); color: black; }

        .cmd-input { width: 100%; background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon); padding: 12px; font-family: 'Share Tech Mono'; margin-top: 10px; box-sizing: border-box; outline: none; }
        .cmd-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 12px; margin-top: 5px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase; }
        .siren-btn { background: #ffaa00 !important; color: black !important; }

        @keyframes pulse-red { 0%, 100% { opacity: 1; border-width: 1px; } 50% { opacity: 0.7; border-width: 2px; } }
        #logs { font-size: 10px; height: 150px; overflow-y: auto; font-family: 'Share Tech Mono'; color: rgba(0, 242, 255, 0.5); border-top: 1px solid var(--border); padding-top: 10px; }
        
        /* ACCESS DENIED STYLING */
        .denied-screen { background:#000; color:#ff0055; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; font-family:'Orbitron'; text-align:center; }
    </style>
</head>
<body>

<div id="shutdown" class="shutdown-overlay">
    <div id="shutdown-msg">TERMINATING_CONNECTION...</div>
    <div style="margin-top:20px; width:200px; height:2px; background:#222;">
        <div id="bar" style="width:0%; height:100%; background:var(--neon);"></div>
    </div>
</div>

<div class="crt-effect"></div>

<div class="header">
    <div style="font-family:'Orbitron'; letter-spacing:2px; font-weight:bold">YONIF 859/RBK HQ <span style="font-size:10px; color:var(--danger); margin-left:10px; opacity:0.6;">[LIVE_FEED]</span></div>
    <div style="display:flex; gap:15px; align-items:center">
        <div id="clock" style="font-family:'Share Tech Mono'; font-size: 18px;">00:00:00</div>
        <button class="logout-btn" onclick="window.triggerLogout()">SECURE_LOGOUT</button>
    </div>
</div>

<div class="container">
    <div class="panel">
        <div style="font-size:11px; opacity:0.5; margin-bottom:10px; letter-spacing:2px;">SQUAD_MANIFEST</div>
        <input type="text" id="search" placeholder="SEARCH CALLSIGN..." style="width:100%; background:rgba(0,0,0,0.5); border:1px solid var(--border); padding:10px; color:var(--neon); margin-bottom:15px; outline:none;">
        <div id="listAnggota"></div>
    </div>

    <div style="position:relative">
        <div id="map"></div>
        <div class="map-controls">
            <button class="map-btn" onclick="window.setMap('sat')">SATELLITE</button>
            <button class="map-btn" onclick="window.setMap('tact')">TERRAIN</button>
        </div>
    </div>

    <div class="panel" style="border-left:1px solid var(--border)">
        <div style="font-size:11px; opacity:0.5; margin-bottom:10px; letter-spacing:2px;">DATA_ANALYSIS</div>
        <div id="detailBox">
            <div style="text-align:center; padding-top:100px; opacity:0.3; font-family:'Orbitron';">
                AWAITING TARGET SELECTION...
            </div>
        </div>
        <div style="margin-top:auto">
            <div style="font-size:10px; margin-bottom:5px; opacity:0.5;">COMMS_LOG</div>
            <div id="logs">> SYSTEM READY...</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
    // --- AUTHENTICATION ENFORCER ---
    if (localStorage.getItem("auth") !== "true") {
        document.body.innerHTML = `
            <div class="denied-screen">
                <h1 style="font-size:3rem; text-shadow: 0 0 20px #ff0055;">ACCESS DENIED</h1>
                <p style="letter-spacing:5px;">UNAUTHORIZED_UPLINK_DETECTED</p>
                <div style="width:300px; height:2px; background:#222; margin-top:20px;">
                    <div id="redirect-bar" style="width:0%; height:100%; background:#ff0055; transition: linear 2s;"></div>
                </div>
            </div>
        `;
        setTimeout(() => document.getElementById('redirect-bar').style.width = '100%', 100);
        setTimeout(() => window.location.href = "login.html", 2000);
        throw new Error("Unauthorized");
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const map = L.map('map', {zoomControl: false}).setView([-2.5489, 118.0149], 13);
    
    const tiles = {
        sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
        tact: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    };
    tiles.sat.addTo(map);

    window.setMap = (t) => { 
        Object.values(tiles).forEach(l => map.removeLayer(l)); 
        tiles[t].addTo(map); 
    };

    let allData = {}, markers = {}, selectedId = null;
    const HQ = [-2.5489, 118.0149];
    L.circle(HQ, {radius: 5000, color: '#00f2ff', weight: 1, fillOpacity: 0.05}).addTo(map);

    // Logout Logic
    window.triggerLogout = () => {
        localStorage.removeItem("auth");
        const ov = document.getElementById('shutdown');
        const bar = document.getElementById('bar');
        ov.style.display = 'flex';
        let w = 0;
        const itv = setInterval(() => {
            w += 10; bar.style.width = w + '%';
            if(w>=100) { clearInterval(itv); window.location.href="login.html"; }
        }, 80);
    };

    window.sendCommand = (n, customCmd = null) => {
        const val = customCmd || document.getElementById("cmdInput").value;
        if(!val) return;
        update(ref(db, `live/${n}`), { command: val });
        const l = document.getElementById('logs');
        l.innerHTML = `> [${new Date().toLocaleTimeString()}] CMD: ${val} -> ${n}<br>` + l.innerHTML;
        if(!customCmd) document.getElementById("cmdInput").value = "";
    };

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * R).toFixed(0);
    }

    function render() {
        const list = document.getElementById("listAnggota");
        const searchTerm = document.getElementById("search").value.toLowerCase();
        list.innerHTML = "";
        
        Object.keys(allData).forEach(nama => {
            if (!nama.toLowerCase().includes(searchTerm)) return;
            
            const d = allData[nama];
            if(!d.lat) return;
            const latency = Date.now() - (d.waktu || 0);
            const isOnline = latency < 40000;
            const dist = getDist(HQ[0], HQ[1], d.lat, d.lon);
            
            if(!markers[nama]) {
                markers[nama] = L.circleMarker([d.lat, d.lon], {radius: 8, color: '#fff', weight: 2, fillOpacity: 1}).addTo(map);
            }
            
            markers[nama].setLatLng([d.lat, d.lon]).setStyle({
                fillColor: d.status === "DANGER_SOS" ? "#f05" : (isOnline ? "#0f2" : "#444")
            });

            const item = document.createElement("div");
            item.className = `unit-card ${selectedId === nama ? 'active' : ''} ${d.status === 'DANGER_SOS' ? 'sos' : ''}`;
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <b>${nama.toUpperCase()}</b>
                    <span style="font-size:9px; color:${isOnline?'#0f2':'#f05'}">${isOnline?'● ONLINE':'○ OFFLINE'}</span>
                </div>
                <div style="font-size:10px; opacity:0.7; margin-top:5px">
                    BAT: ${d.battery || '--'} | DIST: ${dist}M
                </div>
            `;
            item.onclick = () => { 
                selectedId = nama; 
                map.flyTo([d.lat, d.lon], 16); 
                showDetail(nama, d, dist); 
                render(); 
            };
            list.appendChild(item);
        });
    }

    function showDetail(n, d, dist) {
        document.getElementById("detailBox").innerHTML = `
            <div style="border:1px solid var(--neon); padding:15px; background:rgba(0,242,255,0.05); clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);">
                <div style="font-size:22px; font-family:'Orbitron'; color:white; margin-bottom:5px">${n}</div>
                <div style="font-size:12px; color:var(--neon); margin-bottom:15px; opacity:0.8">
                    COORDS: ${d.lat.toFixed(4)}, ${d.lon.toFixed(4)}
                </div>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px">
                    <div style="border-left:2px solid var(--neon); padding-left:10px">
                        <small style="opacity:0.5">SPEED</small><br><b>${d.speed} KM/H</b>
                    </div>
                    <div style="border-left:2px solid var(--neon); padding-left:10px">
                        <small style="opacity:0.5">DISTANCE</small><br><b>${dist} M</b>
                    </div>
                </div>

                <input type="text" id="cmdInput" class="cmd-input" placeholder="TYPE ENCRYPTED MSG...">
                <button class="cmd-btn" onclick="sendCommand('${n}')">SEND COMMAND</button>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px">
                    <button class="cmd-btn siren-btn" onclick="sendCommand('${n}', 'ALARM_ON')">SIREN_ON</button>
                    <button class="cmd-btn" style="background:#333;color:white" onclick="sendCommand('${n}', 'ALARM_OFF')">SIREN_OFF</button>
                </div>
            </div>`;
    }

    // Realtime Listeners
    onValue(ref(db, "live"), s => { if(s.val()){ allData = s.val(); render(); } });
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    document.getElementById("search").oninput = render;

</script>
</body>
</html>
