<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - TACTICAL DASHBOARD</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --bg-dark: #010808; --border: rgba(0, 242, 255, 0.2); }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: var(--neon); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { height: 55px; background: #001010; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 2000; }
        
        .container { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 57px); position: relative; }
        
        .panel { background: rgba(2, 12, 12, 0.96); border-right: 1px solid var(--border); padding: 15px; overflow-y: auto; z-index: 1000; }
        
        /* FIX MAP DISPLAY */
        #map { height: 100%; width: 100%; background: #050505; z-index: 1; }
        /* Map Filter untuk tampilan Tactical Night Mode */
        .leaflet-tile-container { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(170deg) saturate(0.5); }

        .unit-card { background: rgba(0, 242, 255, 0.03); border: 1px solid var(--border); margin-bottom: 10px; padding: 12px; cursor: pointer; transition: 0.3s; }
        .unit-card.active { border-color: var(--neon); background: rgba(0, 242, 255, 0.15); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .unit-card.sos { border-color: var(--danger); background: rgba(255, 0, 85, 0.2); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .visual-feed { width: 100%; border: 2px solid var(--neon); background: #000; margin-bottom: 15px; height: 200px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .visual-feed img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(0, 242, 255, 0.5); top: 0; animation: scan 3s linear infinite; z-index: 5; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .cmd-input { width: 100%; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; margin-top: 10px; box-sizing: border-box; }
        .cmd-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 10px; margin-top: 5px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-family:'Orbitron';">YONIF 859/RBK HQ <span style="font-size:10px; color:var(--danger)">[TACTICAL_DASHBOARD]</span></div>
    <div id="clock" style="font-family: monospace; font-size: 20px;">00:00:00</div>
</div>

<div class="container">
    <div class="panel">
        <div style="font-size:11px; opacity:0.5; margin-bottom:10px; letter-spacing: 2px;">SQUAD_LIST</div>
        <div id="listAnggota">
            <div style="text-align: center; opacity: 0.3; padding-top: 20px;">WAITING FOR DATA...</div>
        </div>
    </div>

    <div id="map"></div>

    <div class="panel" style="border-left:1px solid var(--border); border-right: none;">
        <div style="font-size:11px; opacity:0.5; margin-bottom:10px; letter-spacing: 2px;">VISUAL_UPLINK</div>
        <div id="detailBox">
            <div style="text-align:center; padding-top:100px; opacity:0.3; font-size: 12px;">SELECT UNIT</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // Setup Peta dengan koordinat default Indonesia
    const map = L.map('map', {zoomControl: false}).setView([-2.5, 118], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);

    // Memaksa peta merender ulang agar tidak abu-abu
    setTimeout(() => { map.invalidateSize(); }, 500);

    let allData = {}, markers = {}, selectedId = null;

    // Perintah global agar bisa dipanggil dari HTML
    window.sendCommand = (n, val) => {
        const msg = val || document.getElementById("cmdInput").value;
        if(!msg) return;
        update(ref(db, `live/${n}`), { command: msg });
        alert("COMMAND SENT TO " + n);
    };

    function renderList() {
        const list = document.getElementById("listAnggota");
        list.innerHTML = "";
        
        Object.keys(allData).forEach(nama => {
            const d = allData[nama];
            const isOnline = (Date.now() - (d.waktu || 0)) < 60000;
            
            if(!markers[nama]) {
                markers[nama] = L.circleMarker([d.lat, d.lon], {radius: 9, color: '#fff', weight: 2, fillOpacity: 1}).addTo(map);
            }
            markers[nama].setLatLng([d.lat, d.lon]).setStyle({
                fillColor: d.status === "DANGER_SOS" ? "#ff0055" : (isOnline ? "#00ff41" : "#444")
            });

            const item = document.createElement("div");
            item.className = `unit-card ${selectedId === nama ? 'active' : ''} ${d.status === 'DANGER_SOS' ? 'sos' : ''}`;
            item.innerHTML = `<b>${nama.toUpperCase()}</b><br><small>${isOnline?'ONLINE':'OFFLINE'} | BAT: ${d.battery||'--'}</small>`;
            item.onclick = () => { 
                selectedId = nama; 
                map.flyTo([d.lat, d.lon], 16);
                showDetail(nama, d);
                renderList(); 
            };
            list.appendChild(item);
        });
    }

    function showDetail(n, d) {
        const imgUrl = d.visual || '';
        document.getElementById("detailBox").innerHTML = `
            <div class="visual-feed">
                <div class="scan-line"></div>
                ${imgUrl ? `<img src="${imgUrl}" id="liveVisual">` : '<span style="opacity:0.2">NO FEED</span>'}
            </div>
            <div style="font-size:20px; font-family:Orbitron;">${n.toUpperCase()}</div>
            <div style="font-size:12px; margin-bottom:10px; color:#0f2">SPD: ${d.speed || 0} KM/H</div>
            <input type="text" id="cmdInput" class="cmd-input" placeholder="MESSAGE...">
            <button class="cmd-btn" onclick="sendCommand('${n}')">SEND COMMAND</button>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px">
                <button class="cmd-btn" style="background:#f50" onclick="sendCommand('${n}', 'ALARM_ON')">SIREN</button>
                <button class="cmd-btn" style="background:#333; color:white" onclick="sendCommand('${n}', 'ALARM_OFF')">SILENCE</button>
            </div>
        `;
    }

    onValue(ref(db, "live"), s => { 
        if(s.exists()){ 
            allData = s.val(); 
            renderList(); 
            if(selectedId && allData[selectedId] && document.getElementById('liveVisual')) {
                document.getElementById('liveVisual').src = allData[selectedId].visual || '';
            }
        } 
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
