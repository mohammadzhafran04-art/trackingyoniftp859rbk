<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMAND | YONIF 859/RBK 2045</title>
    
    <script>
        // Security Layer: Langsung arahkan jika tidak ada auth
        if (localStorage.getItem("auth") !== "true") {
            window.location.replace("login.html");
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.1);
            --bg: #000500;
            --danger: #ff003c;
            --panel: rgba(0, 15, 0, 0.85);
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg); color: var(--neon);
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Scanline Animasi */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scan-effect {
            position: fixed; inset: 0; 
            background: linear-gradient(to bottom, transparent, var(--neon-dim), transparent);
            height: 100px; width: 100%; z-index: 2000; pointer-events: none;
            animation: scanline 6s linear infinite; opacity: 0.3;
        }

        .cyber-grid {
            position: fixed; inset: 0; z-index: -1; opacity: 0.2;
            background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .main-ui {
            display: grid; grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 70px 1fr; height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
        }

        header {
            grid-column: span 3; background: var(--panel); border: 1px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px;
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
        }

        .side-panel {
            background: var(--panel); border: 1px solid var(--neon-dim);
            padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
            z-index: 10;
        }

        #map { 
            border: 1px solid var(--neon-dim); 
            background: #000a00; 
            z-index: 1;
        }
        
        .leaflet-container { 
            filter: invert(90%) hue-rotate(150deg) brightness(0.7) contrast(1.2) saturate(0.5); 
            background: #000 !important;
        }

        .personnel-card {
            background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon-dim);
            padding: 12px; cursor: pointer; transition: 0.3s; position: relative; margin-bottom: 5px;
        }
        .personnel-card:hover { 
            background: var(--neon-dim); border-color: var(--neon); 
        }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .offline { background: #444; }

        .btn-command {
            background: var(--neon-dim); border: 1px solid var(--neon);
            color: var(--neon); padding: 10px; cursor: pointer; font-family: 'Orbitron';
        }

        .terminal-log {
            font-size: 11px; font-family: 'Share Tech Mono'; background: rgba(0,5,0,0.9);
            padding: 10px; height: 180px; overflow-y: auto; border: 1px solid var(--neon-dim);
            color: var(--accent);
        }

        /* Full Screen Loading */
        #loadingArea {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }

        .hidden { display: none !important; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="scan-effect"></div>
<div class="cyber-grid"></div>

<div id="loadingArea">
    <div id="loadingText" style="font-family: 'Orbitron'; font-size: 20px; letter-spacing: 8px; color: var(--neon);">NEURAL_OS V4.3</div>
    <div style="width: 300px; height: 2px; background: rgba(0,255,65,0.1); margin: 20px 0;">
        <div id="progressFill" style="height: 100%; background: var(--neon); width: 0%; transition: 0.3s;"></div>
    </div>
    <div id="loadMsg" style="font-family: 'Share Tech Mono'; font-size: 10px; text-transform: uppercase;">Initializing Uplink...</div>
</div>

<div class="main-ui hidden" id="dashboardContent">
    <header>
        <div style="font-family: 'Orbitron'; letter-spacing: 2px;">
            <span style="color:var(--neon); animation: blink 1s infinite;">●</span> COMMAND DASHBOARD
        </div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 22px; color: var(--accent);">00:00:00</div>
        <button id="logoutBtn" style="background:transparent; border:1px solid var(--danger); color:var(--danger); font-family:'Orbitron'; padding:5px 15px; cursor:pointer;">DISCONNECT</button>
    </header>

    <aside class="side-panel">
        <h3 style="font-size: 12px; font-family: 'Orbitron'; color: var(--accent); border-bottom: 1px solid var(--neon-dim); padding-bottom: 5px;">ACTIVE UNITS</h3>
        <div id="unitList"></div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <h3 style="font-size: 12px; font-family: 'Orbitron'; color: var(--accent); border-bottom: 1px solid var(--neon-dim); padding-bottom: 5px;">DIRECTIVE CONTROL</h3>
        <input type="text" id="cmdInput" placeholder="ENTER DIRECTIVE..." style="background:rgba(0,0,0,0.5); border:1px solid var(--neon); color:var(--neon); padding:10px; font-family:'Share Tech Mono'; outline:none;">
        <button class="btn-command" id="broadcastBtn">BROADCAST COMMAND</button>
        
        <h3 style="font-size: 12px; font-family: 'Orbitron'; color: var(--accent); margin-top: 15px;">ENCRYPTED LOG</h3>
        <div class="terminal-log" id="sysLog">> WAITING_FOR_DATA...</div>
    </aside>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let map, markers = {};

    // --- FUNGSI BOOTING ---
    window.addEventListener('DOMContentLoaded', () => {
        let prog = 0;
        const bar = document.getElementById('progressFill');
        const loader = setInterval(() => {
            prog += Math.random() * 25;
            if(prog > 100) prog = 100;
            bar.style.width = prog + "%";
            if(prog === 100) {
                clearInterval(loader);
                setTimeout(initDashboard, 500);
            }
        }, 100);
    });

    function initDashboard() {
        document.getElementById('loadingArea').classList.add('hidden');
        document.getElementById('dashboardContent').classList.remove('hidden');
        
        // Setup Map
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-6.2000, 106.8166], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        
        // Clock
        setInterval(() => { 
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0') + ":" + d.getSeconds().toString().padStart(2, '0'); 
        }, 1000);
        
        syncUnits();
    }

    // --- SYNC DATA FIREBASE ---
    function syncUnits() {
        onValue(ref(db, "live"), (snapshot) => {
            const data = snapshot.val();
            const listArea = document.getElementById('unitList');
            if(!data) return;
            
            listArea.innerHTML = "";
            const now = Date.now();

            for(let id in data) {
                const unit = data[id];
                const isOnline = (now - unit.waktu) < 15000; 

                if(!markers[id]) {
                    markers[id] = L.circleMarker([unit.latitude, unit.longitude], {
                        radius: 8,
                        fillColor: unit.sos ? "#ff003c" : "#00ff41",
                        color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.8
                    }).addTo(map).bindPopup(`<b>${id}</b>`);
                } else {
                    markers[id].setLatLng([unit.latitude, unit.longitude]);
                    markers[id].setStyle({ fillColor: unit.sos ? "#ff003c" : "#00ff41" });
                }

                const card = document.createElement('div');
                card.className = "personnel-card";
                card.onclick = () => {
                    map.flyTo([unit.latitude, unit.longitude], 17);
                    markers[id].openPopup();
                };
                
                card.innerHTML = `
                    <div style="font-family:'Orbitron'; font-size:11px;">
                        <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                        ${id} ${unit.sos ? '<span style="color:var(--danger)">[SOS]</span>' : ''}
                    </div>
                `;
                listArea.appendChild(card);
            }
        });
    }

    // --- EVENT LISTENERS (SOLUSI DISCONNECT) ---
    
    // Broadcast Command
    document.getElementById('broadcastBtn').addEventListener('click', () => {
        const text = document.getElementById('cmdInput').value.trim();
        if(!text) return;
        set(ref(db, "commands/global"), { text: text, timestamp: Date.now() })
            .then(() => {
                addLog("GLOBAL_CMD: " + text);
                document.getElementById('cmdInput').value = "";
            });
    });

    // Logout / Disconnect Logic
    document.getElementById('logoutBtn').addEventListener('click', () => {
        // Tampilkan loading kembali
        const loadingArea = document.getElementById('loadingArea');
        const loadMsg = document.getElementById('loadMsg');
        const progBar = document.getElementById('progressFill');
        
        loadingArea.classList.remove('hidden');
        loadMsg.innerText = "Terminating Neural Link...";
        progBar.style.width = "0%";
        
        let p = 0;
        const outInterval = setInterval(() => {
            p += 10;
            progBar.style.width = p + "%";
            if(p >= 100) {
                clearInterval(outInterval);
                localStorage.removeItem("auth"); // Hapus Auth
                window.location.replace("login.html"); // Pindah Halaman
            }
        }, 50);
    });

    function addLog(msg) {
        const log = document.getElementById('sysLog');
        log.innerHTML = `<div>> [${new Date().toLocaleTimeString()}] ${msg}</div>` + log.innerHTML;
    }
</script>
</body>
</html>
