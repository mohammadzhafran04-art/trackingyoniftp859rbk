<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Komando</title> 

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
background:#081208;
color:white;
margin:0;
overflow:hidden;
}

/* RADAR BACKGROUND */

body::before{
content:"";
position:fixed;
width:900px;
height:900px;
border-radius:50%;
border:2px solid rgba(0,255,0,0.15);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:radarSpin 20s linear infinite;
pointer-events:none;
}

@keyframes radarSpin{
0%{transform:translate(-50%,-50%) rotate(0deg);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}

.header{
background:#102110;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logout-btn{
background:#b30000;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

#map{
height:520px;
margin:20px;
border-radius:12px;
}

#listContainer{
margin:20px;
padding:15px;
background:#132613;
border-radius:10px;
}

#searchNama{
padding:8px;
width:60%;
border-radius:6px;
border:none;
margin-bottom:15px;
}

.nama-item{
background:#203820;
margin:5px;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.nama-item:hover{
background:#2e4f2e;
}

.update-time{
font-size:12px;
color:#90ee90;
}

</style>
</head>

<body>

<script>
if(localStorage.getItem("auth") !== "true"){
window.location.href="login.html";
}
</script>

<div class="header">
<h3>🛰 Tactical Command Map</h3>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div id="map"></div>

<div id="listContainer">

<h3>Daftar Anggota Aktif</h3>

<input type="text" id="searchNama" placeholder="Cari nama anggota...">

<div id="listAnggota"></div>

</div>

<script>
function logout(){
localStorage.removeItem("auth");
window.location.href="login.html";
}
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
authDomain:"real-time-location-30d91.firebaseapp.com",
databaseURL:"https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"real-time-location-30d91",
storageBucket:"real-time-location-30d91.firebasestorage.app",
messagingSenderId:"1092565406651",
appId:"1:1092565406651:web:5895c20a8c7169cb7b6a9e"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const map=L.map("map").setView([-2,118],5);

const normal=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
);

const satelit=L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
);

normal.addTo(map);

L.control.layers({
"Normal":normal,
"Satelit":satelit
}).addTo(map);

let markers={};
let paths={};
let radar={};
let allData={};
let bounds=L.latLngBounds();

/* MARKER GERAK HALUS */

function moveSmooth(marker,newLatLng){

const start=marker.getLatLng();
const duration=800;
const startTime=performance.now();

function animate(time){

const progress=Math.min((time-startTime)/duration,1);

const lat=start.lat+(newLatLng[0]-start.lat)*progress;
const lng=start.lng+(newLatLng[1]-start.lng)*progress;

marker.setLatLng([lat,lng]);

if(progress<1){
requestAnimationFrame(animate);
}

}

requestAnimationFrame(animate);

}

/* FORMAT WAKTU */

function formatWaktu(timestamp){

if(!timestamp)return "-";

const d=new Date(timestamp);

return d.toLocaleTimeString();

}

/* RENDER DATA */

function render(){

const list=document.getElementById("listAnggota");
const keyword=document.getElementById("searchNama").value.toLowerCase();

list.innerHTML="";
bounds=L.latLngBounds();

Object.keys(allData).forEach(nama=>{

if(!nama.toLowerCase().includes(keyword))return;

const lat=allData[nama].latitude;
const lon=allData[nama].longitude;
const alamat=allData[nama].alamat||"-";
const waktu=formatWaktu(allData[nama].waktu);

bounds.extend([lat,lon]);

const popup=`
<b>${nama}</b><br>
📍 ${alamat}<br>
🕒 ${waktu}<br>
<a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">
Google Maps
</a>
`;

if(!markers[nama]){

markers[nama]=L.marker([lat,lon]).addTo(map).bindPopup(popup);

paths[nama]=L.polyline([[lat,lon]],{
color:"lime",
weight:3
}).addTo(map);

/* RADAR LINGKARAN */

radar[nama]=L.circle([lat,lon],{
radius:60,
color:"lime",
fillOpacity:0.1
}).addTo(map);

}else{

moveSmooth(markers[nama],[lat,lon]);

markers[nama].setPopupContent(popup);

paths[nama].addLatLng([lat,lon]);

radar[nama].setLatLng([lat,lon]);

}

/* LIST ANGGOTA */

const item=document.createElement("div");

item.className="nama-item";

item.innerHTML=`
<strong>${nama}</strong><br>
<span class="update-time">Update : ${waktu}</span>
`;

item.onclick=()=>{
map.setView([lat,lon],15);
markers[nama].openPopup();
};

list.appendChild(item);

});

if(bounds.isValid()){
map.fitBounds(bounds,{padding:[40,40]});
}

}

/* REALTIME FIREBASE */

onValue(ref(db,"live"),snapshot=>{

const data=snapshot.val();

if(!data)return;

allData=data;

render();

});

document.getElementById("searchNama")
.addEventListener("input",render);

</script>

</body>
</html>
