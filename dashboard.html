<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Command Center | YONIF TP 859</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.2);
            --bg: #020502;
            --danger: #ff003c;
            --panel: rgba(2, 8, 2, 0.9);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--neon);
            height: 100vh; overflow: hidden;
        }

        /* Overlay Scanline */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .main-ui {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 80px 1fr;
            height: 100vh; gap: 15px; padding: 15px; box-sizing: border-box;
        }

        .top-bar {
            grid-column: span 3;
            background: var(--panel);
            border: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
            box-shadow: 0 0 20px var(--neon-dim);
        }

        .side-panel {
            background: var(--panel);
            border: 1px solid var(--neon);
            padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
            box-shadow: inset 0 0 15px var(--neon-dim);
            overflow-y: auto;
        }

        #map {
            border: 2px solid var(--neon);
            background: #000; z-index: 1;
        }

        /* Marker Pulse Animation */
        @keyframes pulse-marker {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        .radar-pulse {
            width: 20px; height: 20px; background: var(--neon);
            border-radius: 50%; position: relative;
        }
        .radar-pulse::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid var(--neon); border-radius: 50%;
            animation: pulse-marker 1.5s infinite;
        }

        .personnel-card {
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid var(--neon-dim);
            padding: 12px; margin-bottom: 10px; cursor: pointer;
            transition: 0.3s; border-left: 4px solid var(--neon);
        }
        .personnel-card:hover { 
            background: var(--neon-dim); 
            transform: translateX(5px);
            box-shadow: -5px 0 15px var(--neon);
        }

        .status-active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .status-lost { color: var(--danger); text-shadow: 0 0 10px var(--danger); }

        .stat-box {
            border: 1px solid var(--neon); padding: 10px;
            text-align: center; background: rgba(0, 40, 0, 0.2);
        }
        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 28px; display: block; }

        .btn-action {
            background: transparent; border: 1px solid var(--danger);
            color: var(--danger); padding: 8px 20px; cursor: pointer;
            font-family: 'Orbitron', sans-serif; font-size: 10px;
            transition: 0.3s;
        }
        .btn-action:hover { background: var(--danger); color: white; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }

        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.8) contrast(1.2); }
    </style>
</head>
<body>

<div class="main-ui">
    <header class="top-bar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="width: 10px; height: 10px; background: var(--neon); border-radius: 50%; animation: pulse-marker 1s infinite;"></div>
            <h1 style="font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 5px; margin: 0;">STRATEGIC NODE: 859</h1>
        </div>
        <div id="clock" style="font-family: 'Orbitron', sans-serif; font-size: 22px;">00:00:00</div>
        <button class="btn-action" onclick="location.href='index.html'">ABORT MISSION</button>
    </header>

    <aside class="side-panel">
        <div>
            <h3 style="font-size: 14px; border-bottom: 1px solid var(--neon); padding-bottom: 5px; margin-bottom: 15px;">BATTALION OVERVIEW</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="stat-box">
                    <span class="stat-val" id="totalUnit">0</span>
                    <small>TOTAL UNITS</small>
                </div>
                <div class="stat-box">
                    <span class="stat-val" style="color: #00ff88;" id="activeUnit">0</span>
                    <small>OPERATIONAL</small>
                </div>
            </div>
        </div>

        <div>
            <h3 style="font-size: 14px; border-bottom: 1px solid var(--neon); padding-bottom: 5px; margin-bottom: 10px;">ACTIVE LOCATORS</h3>
            <div id="unitList"></div>
        </div>
    </aside>

    <main id="map"></main>

    <aside class="side-panel">
        <h3 style="font-size: 14px; border-bottom: 1px solid var(--neon); padding-bottom: 5px;">UNIT TELEMETRY</h3>
        <div id="telemetryBox">
            <div style="opacity: 0.4; text-align: center; padding-top: 50px;">NO UNIT SELECTED</div>
        </div>
        
        <div style="margin-top: auto;">
            <div style="font-size: 11px; margin-bottom: 10px;">
                <div style="display: flex; justify-content: space-between;"><span>ENCRYPTION</span><span>AES-256</span></div>
                <div style="display: flex; justify-content: space-between;"><span>SIGNAL</span><span style="color: lime;">STABLE</span></div>
            </div>
            <img src="https://i.imgur.com/K3pWpXm.gif" width="100%" style="opacity: 0.5; filter: hue-rotate(90deg);">
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-2.5, 118], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markers = {};
    let polylines = {};

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    onValue(ref(db, "live"), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        const listContainer = document.getElementById("unitList");
        listContainer.innerHTML = "";
        let total = 0, active = 0;

        Object.keys(data).forEach(id => {
            const unit = data[id];
            const isOnline = (Date.now() - (unit.waktu || 0)) < 60000;
            total++; if(isOnline) active++;

            // Marker & Path logic
            if(unit.latitude && unit.longitude) {
                const pos = [unit.latitude, unit.longitude];
                
                if(!markers[id]) {
                    const icon = L.divIcon({ className: 'radar-pulse', iconSize: [20, 20] });
                    markers[id] = L.marker(pos, { icon }).addTo(map).bindPopup(`<b>${id}</b>`);
                    polylines[id] = L.polyline([pos], {color: '#00ff41', weight: 2, opacity: 0.5, dashArray: '5, 10'}).addTo(map);
                } else {
                    markers[id].setLatLng(pos);
                    // Add point to history trail (limit to last 20 points)
                    let currentPath = polylines[id].getLatLngs();
                    currentPath.push(pos);
                    if(currentPath.length > 20) currentPath.shift();
                    polylines[id].setLatLngs(currentPath);
                }
            }

            // List UI
            const item = document.createElement("div");
            item.className = "personnel-card";
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <strong>${id}</strong>
                    <span class="${isOnline?'status-active':'status-lost'}">${isOnline?'● ACTIVE':'● LOST'}</span>
                </div>
                <div style="font-size: 11px; margin-top:5px; opacity: 0.8;">
                    VEL: ${unit.speed || 0} KM/H | ACC: ${unit.accuracy || 0}m
                </div>
            `;
            item.onclick = () => {
                map.flyTo([unit.latitude, unit.longitude], 15);
                showTelemetry(id, unit, isOnline);
            };
            listContainer.appendChild(item);
        });

        document.getElementById("totalUnit").innerText = total;
        document.getElementById("activeUnit").innerText = active;
    });

    function showTelemetry(id, unit, isOnline) {
        document.getElementById("telemetryBox").innerHTML = `
            <div style="border: 1px solid var(--neon); padding: 15px; background: rgba(0,255,65,0.05);">
                <h2 style="margin:0; font-family: 'Orbitron'; color: white;">${id}</h2>
                <div style="margin: 15px 0; font-size: 13px;">
                    <p>COORDINATES:<br><span style="color:white">${unit.latitude.toFixed(6)}, ${unit.longitude.toFixed(6)}</span></p>
                    <p>ACCURACY:<br><span style="color:${unit.accuracy < 20 ? 'lime':'yellow'}">${unit.accuracy} METERS</span></p>
                    <p>LAST PING:<br><span style="color:white">${new Date(unit.waktu).toLocaleTimeString()}</span></p>
                </div>
                <div style="height: 40px; background: repeating-linear-gradient(90deg, transparent, transparent 5px, var(--neon-dim) 5px, var(--neon-dim) 10px);"></div>
            </div>
        `;
    }
</script>
</body>
</html>
