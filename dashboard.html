<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - TACTICAL DASHBOARD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --warning: #ffcc00; --bg-dark: #010808; --panel-bg: rgba(2, 12, 12, 0.96); --border: rgba(0, 242, 255, 0.2); }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: var(--neon); overflow: hidden; height: 100vh; }
        .header { height: 55px; background: #001010; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); z-index: 100; }
        .container { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 57px); }
        .panel { background: var(--panel-bg); border-right: 1px solid var(--border); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        #map { height: 100%; background: #000; filter: brightness(0.9) contrast(1.1) saturate(0.2) hue-rotate(140deg) invert(0.95); }
        .unit-card { background: rgba(0, 242, 255, 0.03); border: 1px solid var(--border); margin-bottom: 12px; padding: 12px; cursor: pointer; position: relative; clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%); }
        .unit-card.active { background: rgba(0, 242, 255, 0.15); border-color: var(--neon); }
        .unit-card.sos { border-color: var(--danger); background: rgba(255, 0, 85, 0.2); animation: pulse-red 0.8s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .logout-btn { background: #ff0055; color: white; border: none; padding: 5px 15px; font-family: 'Orbitron'; cursor: pointer; font-size: 10px; }
        .cmd-input { width: 100%; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; font-family: 'Share Tech Mono'; margin-top: 10px; }
        .cmd-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 10px; margin-top: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="header">
    <div style="font-family:'Orbitron'; letter-spacing:2px;">YONIF 859/RBK HQ</div>
    <div style="display:flex; gap:15px; align-items:center">
        <div id="clock" style="font-family:'Share Tech Mono'">00:00:00</div>
        <button class="logout-btn" onclick="window.triggerLogout()">TERMINATE_SESSION</button>
    </div>
</div>

<div class="container">
    <div class="panel">
        <div style="font-size:11px; opacity:0.5; margin-bottom:10px">SQUAD_MANIFEST</div>
        <div id="listAnggota"></div>
    </div>
    <div id="map"></div>
    <div class="panel" style="border-left:1px solid var(--border)">
        <div style="font-size:11px; opacity:0.5; margin-bottom:10px">DATA_ANALYSIS</div>
        <div id="detailBox"><div style="text-align:center; padding-top:100px; opacity:0.3">AWAITING TARGET</div></div>
        <div style="margin-top:auto; font-size:10px; height:100px; overflow-y:auto; font-family:monospace;" id="logs"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Middleware: Cek Login
    if (localStorage.getItem("auth") !== "true") window.location.href = "login.html";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const map = L.map('map', {zoomControl: false}).setView([-2.5489, 118.0149], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let allData = {}, markers = {}, selectedId = null;
    const HQ = [-2.5489, 118.0149];

    window.triggerLogout = () => { if(confirm("Keluar?")) { localStorage.removeItem("auth"); window.location.href="login.html"; } };

    window.sendCommand = (n, cmd = null) => {
        const val = cmd || document.getElementById("cmdInput").value;
        if(!val) return;
        update(ref(db, `live/${n}`), { command: val });
        document.getElementById('logs').innerHTML = `> CMD: ${val} -> ${n}<br>` + document.getElementById('logs').innerHTML;
    };

    function render() {
        const list = document.getElementById("listAnggota");
        list.innerHTML = "";
        const NOW = Date.now();

        Object.keys(allData).forEach(nama => {
            const d = allData[nama];
            const latency = NOW - (d.waktu || 0);

            // AUTO-PURGE: Hapus jika tidak ada kabar > 10 menit
            if (latency > 600000) { remove(ref(db, `live/${nama}`)); return; }

            const isOnline = latency < 45000;
            if(!markers[nama]) markers[nama] = L.circleMarker([d.lat, d.lon], {radius: 8, color: '#fff', weight: 2, fillOpacity: 1}).addTo(map);
            markers[nama].setLatLng([d.lat, d.lon]).setStyle({fillColor: d.status === "DANGER_SOS" ? "#f05" : (isOnline ? "#0f2" : "#444")});

            const item = document.createElement("div");
            item.className = `unit-card ${selectedId === nama ? 'active' : ''} ${d.status === 'DANGER_SOS' ? 'sos' : ''}`;
            item.innerHTML = `<b>${nama}</b> <span style="font-size:9px; color:${isOnline?'#0f2':'#f05'}">${isOnline?'ONLINE':'OFFLINE'}</span><br><small>LAT: ${latency}ms</small>`;
            item.onclick = () => { selectedId = nama; map.flyTo([d.lat, d.lon], 16); showDetail(nama, d); render(); };
            list.appendChild(item);
        });
    }

    function showDetail(n, d) {
        document.getElementById("detailBox").innerHTML = `
            <div style="border:1px solid var(--neon); padding:10px; background:rgba(0,242,255,0.05);">
                <div style="font-size:18px">${n}</div>
                <div style="font-size:11px; margin:10px 0">SPD: ${d.speed}KM/H | BAT: ${d.battery}</div>
                <input type="text" id="cmdInput" class="cmd-input" placeholder="Message...">
                <button class="cmd-btn" onclick="sendCommand('${n}')">SEND TEXT</button>
                <button class="cmd-btn" style="background:#ffaa00" onclick="sendCommand('${n}', 'ALARM_ON')">SIREN ON</button>
            </div>`;
    }

    onValue(ref(db, "live"), s => { if(s.val()){ allData = s.val(); render(); } });
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
</script>
</body>
</html>
