<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - DASHBOARD</title>
    
    <script>
        if (localStorage.getItem("auth") !== "true") window.location.href = "login.html";
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --bg-dark: #010808; --border: rgba(0, 242, 255, 0.2); }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: var(--neon); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 55px; background: #001010; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .container { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 57px); }
        .panel { background: rgba(2, 12, 12, 0.96); border-right: 1px solid var(--border); padding: 15px; overflow-y: auto; }
        #map { height: 100%; background: #000; filter: brightness(0.9) contrast(1.1) saturate(0.2) hue-rotate(140deg) invert(0.95); }
        .unit-card { background: rgba(0, 242, 255, 0.03); border: 1px solid var(--border); margin-bottom: 10px; padding: 12px; cursor: pointer; transition: 0.3s; }
        .unit-card:hover, .unit-card.active { border-color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .unit-card.sos { border-color: var(--danger); background: rgba(255, 0, 85, 0.2); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.6; } }

        /* VISUAL MONITOR */
        .visual-feed { width: 100%; border: 2px solid var(--neon); background: #000; margin-bottom: 15px; min-height: 180px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .visual-feed img { width: 100%; height: auto; display: block; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(0, 242, 255, 0.5); top: 0; animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .cmd-input { width: 100%; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; margin-top: 10px; box-sizing: border-box; }
        .cmd-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 10px; margin-top: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-family:'Orbitron';">YONIF 859/RBK HQ <span style="font-size:10px; color:var(--danger)">[LIVE]</span></div>
    <div id="clock">00:00:00</div>
</div>

<div class="container">
    <div class="panel">
        <div style="font-size:11px; opacity:0.5; margin-bottom:10px;">SQUAD_LIST</div>
        <div id="listAnggota"></div>
    </div>

    <div id="map"></div>

    <div class="panel" style="border-left:1px solid var(--border)">
        <div style="font-size:11px; opacity:0.5; margin-bottom:10px;">TACTICAL_DATA</div>
        <div id="detailBox">
            <div style="text-align:center; padding-top:50px; opacity:0.3;">SELECT UNIT TO VIEW FEED</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const map = L.map('map', {zoomControl: false}).setView([-2.5489, 118.0149], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let allData = {}, markers = {}, selectedId = null;

    window.sendCommand = (n, val) => {
        const cmd = val || document.getElementById("cmdInput").value;
        update(ref(db, `live/${n}`), { command: cmd });
    };

    function render() {
        const list = document.getElementById("listAnggota");
        list.innerHTML = "";
        
        Object.keys(allData).forEach(nama => {
            const d = allData[nama];
            const isOnline = (Date.now() - d.waktu) < 30000;
            
            if(!markers[nama]) {
                markers[nama] = L.circleMarker([d.lat, d.lon], {radius: 8, color: '#fff', weight: 2, fillOpacity: 1}).addTo(map);
            }
            markers[nama].setLatLng([d.lat, d.lon]).setStyle({
                fillColor: d.status === "DANGER_SOS" ? "#f05" : (isOnline ? "#0f2" : "#444")
            });

            const item = document.createElement("div");
            item.className = `unit-card ${selectedId === nama ? 'active' : ''} ${d.status === 'DANGER_SOS' ? 'sos' : ''}`;
            item.innerHTML = `<b>${nama}</b><br><small>${isOnline?'ONLINE':'OFFLINE'} | BAT: ${d.battery}</small>`;
            item.onclick = () => { 
                selectedId = nama; 
                map.flyTo([d.lat, d.lon], 16);
                showDetail(nama, d);
                render(); 
            };
            list.appendChild(item);
        });
    }

    function showDetail(n, d) {
        const feed = d.visual ? `<img src="${d.visual}" id="liveVisual">` : `<div style="opacity:0.2">NO_VISUAL</div>`;
        document.getElementById("detailBox").innerHTML = `
            <div class="visual-feed">
                <div class="scan-line"></div>
                ${feed}
            </div>
            <div style="font-size:20px; color:white;">${n}</div>
            <div style="font-size:12px; margin-bottom:10px;">SPEED: ${d.speed} KM/H</div>
            <input type="text" id="cmdInput" class="cmd-input" placeholder="SEND MSG...">
            <button class="cmd-btn" onclick="sendCommand('${n}')">SEND</button>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px">
                <button class="cmd-btn" style="background:#f50" onclick="sendCommand('${n}', 'ALARM_ON')">ALARM</button>
                <button class="cmd-btn" style="background:#333; color:white" onclick="sendCommand('${n}', 'ALARM_OFF')">OFF</button>
            </div>
        `;
    }

    onValue(ref(db, "live"), s => { 
        if(s.val()){ 
            allData = s.val(); 
            render(); 
            if(selectedId && allData[selectedId] && document.getElementById('liveVisual')) {
                document.getElementById('liveVisual').src = allData[selectedId].visual;
            }
        } 
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
