<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - HQ DASHBOARD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --bg: #010808; }
        body { margin: 0; font-family: 'Rajdhani'; background: var(--bg); color: var(--neon); overflow: hidden; height: 100vh; }
        .header { height: 50px; background: #001010; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .container { display: grid; grid-template-columns: 300px 1fr 300px; height: calc(100vh - 52px); }
        .panel { background: rgba(2, 12, 12, 0.95); border-right: 1px solid rgba(0, 242, 255, 0.2); padding: 15px; overflow-y: auto; }
        #map { height: 100%; background: #000; filter: brightness(0.8) contrast(1.2) saturate(0.5) hue-rotate(150deg) invert(0.9); }
        .unit-card { border: 1px solid rgba(0, 242, 255, 0.2); padding: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .unit-card.active { border-color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .unit-card.sos { border-color: var(--danger); animation: blink 0.8s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } }
        .cmd-btn { width: 100%; padding: 10px; margin-top: 5px; background: var(--neon); border: none; font-weight: bold; cursor: pointer; }
        input { width: 100%; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-family:'Orbitron';">859/RBK TACTICAL HQ</div>
        <button onclick="logout()" style="background:#ff0055; color:white; border:none; cursor:pointer;">LOGOUT</button>
    </div>
    <div class="container">
        <div class="panel">
            <div style="opacity:0.5; font-size:12px; margin-bottom:10px;">UNIT_LIST</div>
            <div id="list"></div>
        </div>
        <div id="map"></div>
        <div class="panel">
            <div style="opacity:0.5; font-size:12px; margin-bottom:10px;">UNIT_DETAILS</div>
            <div id="details"><div style="text-align:center; margin-top:50px; opacity:0.3;">SELECT UNIT</div></div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    if(localStorage.getItem("auth") !== "true") window.location.href = "login.html";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const map = L.map('map', {zoomControl: false}).setView([-2.5489, 118.0149], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let units = {}, markers = {}, selected = null;

    window.logout = () => { localStorage.removeItem("auth"); window.location.href="login.html"; };

    window.sendCmd = (id, msg = null) => {
        const val = msg || document.getElementById('cInp').value;
        if(val) update(ref(db, `live/${id}`), { command: val });
    };

    onValue(ref(db, "live"), (snap) => {
        const data = snap.val() || {};
        const listDiv = document.getElementById("list");
        listDiv.innerHTML = "";
        
        Object.keys(data).forEach(id => {
            const u = data[id];
            const latlng = [u.lat, u.lon];
            const isOnline = (Date.now() - u.waktu) < 60000;

            if(!markers[id]) markers[id] = L.circleMarker(latlng, {radius:8, color:'#fff', fillOpacity:1}).addTo(map);
            markers[id].setLatLng(latlng).setStyle({fillColor: u.status === 'DANGER_SOS' ? '#f05' : (isOnline ? '#0f2' : '#444')});

            const card = document.createElement("div");
            card.className = `unit-card ${selected === id ? 'active' : ''} ${u.status === 'DANGER_SOS' ? 'sos' : ''}`;
            card.innerHTML = `<b>${id}</b><br><small>${isOnline ? 'ONLINE' : 'OFFLINE'} | ${u.battery || '--'}</small>`;
            card.onclick = () => {
                selected = id;
                map.flyTo(latlng, 15);
                document.getElementById("details").innerHTML = `
                    <h3>${id}</h3>
                    <p>SPD: ${u.speed} KM/H</p>
                    <input id="cInp" placeholder="Send text...">
                    <button class="cmd-btn" onclick="sendCmd('${id}')">SEND MESSAGE</button>
                    <button class="cmd-btn" style="background:#ffaa00" onclick="sendCmd('${id}','ALARM_ON')">SIREN ON</button>
                    <button class="cmd-btn" style="background:#444; color:#fff" onclick="sendCmd('${id}','ALARM_OFF')">SIREN OFF</button>
                `;
            };
            listDiv.appendChild(card);
        });
    });
</script>
</body>
</html>
