<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMAND | YONIF 859 RBK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #000800; --danger: #ff003c; --accent: #00e5ff; --panel: rgba(0, 20, 0, 0.9); }
        body, html { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--neon); height: 100vh; overflow: hidden; text-transform: uppercase; }
        
        /* Grid Layout Utama */
        .main-ui { display: grid; grid-template-columns: 320px 1fr 320px; grid-template-rows: 60px 1fr; height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box; }
        
        header { grid-column: span 3; background: var(--panel); border: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; clip-path: polygon(0 0, 100% 0, 99% 100%, 1% 100%); }
        
        .side-panel { background: var(--panel); border: 1px solid rgba(0,255,65,0.2); padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        
        /* Map Styling */
        #map { background: #000; border: 1px solid var(--neon); z-index: 1; }
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.2); }
        
        /* Unit Card Styling */
        .unit-card { background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.1); padding: 12px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; }
        .unit-card:hover { border-color: var(--neon); background: rgba(0,255,65,0.1); }
        .unit-card.sos { border-color: var(--danger); animation: danger-pulse 1s infinite; background: rgba(255,0,60,0.1); }
        
        @keyframes danger-pulse { 0%, 100% { box-shadow: 0 0 5px var(--danger); } 50% { box-shadow: 0 0 20px var(--danger); } }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: var(--neon); box-shadow: 0 0 8px var(--neon); }
        .offline { background: #444; }

        /* Input & Log Styling */
        .input-cmd { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; box-sizing: border-box; font-family: 'Share Tech Mono'; margin-bottom: 10px; outline: none; }
        .btn-cmd { background: var(--neon); color: #000; font-family: 'Orbitron'; font-weight: bold; padding: 12px; border: none; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-cmd:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }
        .log-area { font-size: 11px; font-family: 'Share Tech Mono'; color: var(--accent); height: 250px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid rgba(0,229,255,0.2); }
    </style>
</head>
<body>

<div class="main-ui">
    <header>
        <div style="font-family: 'Orbitron'; font-weight: bold; letter-spacing: 2px;"><span style="color:var(--danger)">HQ</span> COMMAND_DASHBOARD</div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 20px; color: #fff;">00:00:00</div>
        <button onclick="location.reload()" style="border: 1px solid var(--danger); background: transparent; color: var(--danger); padding: 5px 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px;">REBOOT_SESSION</button>
    </header>

    <aside class="side-panel">
        <div style="font-size: 12px; font-family: 'Orbitron'; border-bottom: 1px solid var(--neon); padding-bottom: 5px; color: var(--accent); margin-bottom: 10px;">[ ACTIVE_UNITS ]</div>
        <div id="unitList">MENUNGGU SIGNAL...</div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <div style="font-size: 12px; font-family: 'Orbitron'; border-bottom: 1px solid var(--neon); padding-bottom: 5px; color: var(--accent); margin-bottom: 10px;">[ GLOBAL_DIRECTIVE ]</div>
        <input type="text" id="cmdInput" class="input-cmd" placeholder="MASUKKAN PERINTAH...">
        <button class="btn-cmd" id="btnBroadcast">SEND BROADCAST</button>
        
        <div style="margin-top: 20px; font-size: 12px; font-family: 'Orbitron'; border-bottom: 1px solid var(--neon); padding-bottom: 5px; color: var(--accent); margin-bottom: 10px;">[ ENCRYPTED_LOG ]</div>
        <div id="sysLog" class="log-area"></div>
    </aside>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let markers = {}, firstLock = false;

    // Inisialisasi Map
    const map = L.map('map', { zoomControl: false }).setView([-2.0, 118.0], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Fungsi Log
    function addLog(msg) {
        const logArea = document.getElementById('sysLog');
        const time = new Date().toLocaleTimeString();
        logArea.innerHTML = `<div style="margin-bottom:4px;">> [${time}] ${msg}</div>` + logArea.innerHTML;
    }

    // Handle Broadcast
    document.getElementById('btnBroadcast').onclick = () => {
        const val = document.getElementById('cmdInput').value.trim().toUpperCase();
        if(val) {
            set(ref(db, "commands/global"), { text: val, waktu: Date.now() })
                .then(() => {
                    addLog(`BROADCAST_SENT: ${val}`);
                    document.getElementById('cmdInput').value = "";
                });
        }
    };

    // Monitoring Real-time
    onValue(ref(db, "live"), (snap) => {
        const data = snap.val();
        const list = document.getElementById('unitList');
        list.innerHTML = "";
        if(!data) return;

        for(let id in data) {
            const u = data[id];
            const pos = [u.lat, u.lon];
            const isOnline = (Date.now() - u.waktu) < 60000;

            // Auto Fokus unit pertama
            if(!firstLock && isOnline) { map.flyTo(pos, 14); firstLock = true; }

            // Marker Update
            if(markers[id]) {
                markers[id].setLatLng(pos);
                markers[id].setStyle({ fillColor: isOnline ? (u.sos ? '#f00' : '#0f0') : '#444' });
            } else {
                markers[id] = L.circleMarker(pos, { radius: 10, color: '#fff', fillColor: '#0f0', fillOpacity: 1 }).addTo(map).bindTooltip(id);
                addLog(`NEW_UNIT_CONNECTED: ${id}`);
            }

            // Create Unit Card
            const card = document.createElement('div');
            card.className = `unit-card ${u.sos ? 'sos' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:bold; font-size:14px;">${id}</span>
                    <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                </div>
                <div style="font-size:10px; color:var(--accent); margin-top:5px; font-family:'Share Tech Mono';">
                    SPD: ${(u.speed * 3.6).toFixed(1)} KM/H | ACC: ${Math.round(u.accuracy)}M
                    ${u.sos ? '<br><span style="color:var(--danger)">[ EMERGENCY_SOS ]</span>' : ''}
                </div>
            `;
            card.onclick = () => {
                map.flyTo(pos, 16);
                addLog(`TRACKING_FOCUS: ${id}`);
            };
            list.appendChild(card);
        }
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
    addLog("SYSTEM_INITIALIZED");
</script>
</body>
</html>
