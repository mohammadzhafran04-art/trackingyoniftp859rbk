<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMAND | YONIF 859/RBK 2045</title>
    
    <script>
        /* PROTEKSI KETAT */
        if (localStorage.getItem("auth") !== "true") {
            // Langsung lempar ke login.html
            window.location.replace("login.html");
            
            // Hentikan render HTML sisa agar tidak sempat terlihat
            document.write('<style>body { display:none !important; }</style>');
            window.stop(); 
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.1);
            --bg: #000500;
            --danger: #ff003c;
            --panel: rgba(0, 15, 0, 0.8);
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--neon);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        .cyber-grid {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(var(--neon-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1; opacity: 0.3;
        }

        .main-ui {
            display: grid;
            grid-template-columns: 380px 1fr 380px;
            grid-template-rows: 70px 1fr;
            height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
            transition: filter 1s, transform 1s;
        }

        header {
            grid-column: span 3;
            background: var(--panel);
            border: 1px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px;
            backdrop-filter: blur(15px);
            clip-path: polygon(0 0, 100% 0, 99% 100%, 1% 100%);
        }

        .side-panel {
            background: var(--panel);
            border: 1px solid var(--neon-dim);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; backdrop-filter: blur(20px);
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.05);
        }

        #map { 
            border: 1px solid var(--neon-dim); 
            background: #000; 
            position: relative;
        }

        #map::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        repeating-linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none; z-index: 1000;
        }

        .personnel-card {
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid var(--neon-dim);
            padding: 12px; margin-bottom: 10px;
            position: relative; transition: 0.3s; cursor: pointer;
            overflow: hidden;
        }
        .personnel-card::before {
            content: ""; position: absolute; left: 0; top: 0; width: 3px; height: 100%;
            background: var(--neon);
        }
        .personnel-card:hover { background: rgba(0, 255, 65, 0.1); transform: translateX(5px); }

        .stat-box {
            background: rgba(0,0,0,0.5); border: 1px solid var(--neon-dim);
            padding: 15px; text-align: center; position: relative;
        }
        .stat-val { font-family: 'Orbitron'; font-size: 32px; color: #fff; text-shadow: 0 0 10px var(--neon); }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            font-family: 'Orbitron';
            font-size: 10px;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .btn-logout:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 15px var(--danger);
        }

        #logoutOverlay {
            position: fixed; inset: 0;
            background: black;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Share Tech Mono';
            color: var(--danger);
        }

        .terminal-text {
            width: 400px;
            height: 200px;
            overflow: hidden;
            font-size: 14px;
            line-height: 1.5;
        }

        body.sos-active::after {
            content: "EMERGENCY - UNIT COMPROMISED";
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: var(--danger); font-family: 'Orbitron'; font-weight: bold;
            z-index: 2000; letter-spacing: 5px; animation: blink 0.5s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.5); }
    </style>
</head>
<body>

<div id="logoutOverlay">
    <div style="font-family: 'Orbitron'; font-size: 24px; margin-bottom: 20px;">TERMINATING NEURAL LINK...</div>
    <div class="terminal-text" id="logoutLog"></div>
    <div style="margin-top: 20px; width: 300px; height: 2px; background: #200;">
        <div id="logoutBar" style="width: 100%; height: 100%; background: var(--danger); transition: width 2s linear;"></div>
    </div>
</div>

<div class="cyber-grid"></div>

<div class="main-ui" id="dashboardContent">
    <header>
        <div style="font-family: 'Orbitron'; letter-spacing: 3px; display: flex; align-items: center; gap: 15px;">
            <div style="width: 15px; height: 15px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 10px var(--neon);"></div>
            NEURAL COMMAND CENTER <span style="color:white; opacity: 0.5;">V4.0</span>
        </div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 20px; color: var(--accent);">00:00:00</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="font-family: 'Share Tech Mono'; font-size: 10px; text-align: right; opacity: 0.7;">
                CORE_SYNC: ACTIVE<br>SATELLITE: MIL-SAT_2045
            </div>
            <button class="btn-logout" onclick="triggerLogout()">DISCONNECT</button>
        </div>
    </header>

    <aside class="side-panel">
        <h3 style="font-size: 11px; font-family: 'Orbitron'; color: var(--accent); letter-spacing: 2px;">NEURAL LINK STATUS</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="stat-box">
                <small style="font-size: 9px; opacity: 0.6;">TOTAL UNITS</small>
                <div class="stat-val" id="totalUnit">0</div>
            </div>
            <div class="stat-box">
                <small style="font-size: 9px; opacity: 0.6;">ACTIVE LINK</small>
                <div class="stat-val" style="color: var(--accent)" id="activeUnit">0</div>
            </div>
        </div>
        <div id="unitList" style="flex:1; margin-top: 10px;"></div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <div style="font-family: 'Orbitron'; font-size: 12px; border-bottom: 1px solid var(--neon); padding-bottom:8px; color: var(--accent);">DATA TELEMETRY</div>
        <div id="detailBox" style="font-family: 'Share Tech Mono'; margin-top:15px;">
            <div style="text-align: center; padding: 40px 0; opacity: 0.3;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M4.93 19.07L19.07 4.93"/>
                </svg>
                <p>WAITING FOR TARGET SELECTION</p>
            </div>
        </div>
        <div id="sosAlertBox"></div>
        <div style="margin-top:auto; background: rgba(0,0,0,0.4); padding: 10px; border: 1px solid var(--neon-dim);">
            <div class="hud-line" style="display:flex; justify-content:space-between; font-size:12px;"><span>UPLINK</span><span style="color:white">SECURED</span></div>
            <div class="hud-line" style="display:flex; justify-content:space-between; font-size:12px;"><span>LATENCY</span><span id="latency">24ms</span></div>
        </div>
    </aside>
</div>

<audio id="sosAudio" src="https://www.soundjay.com/buttons/beep-01a.mp3" loop></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-2.5, 118], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markers = {};
    const sosAudio = document.getElementById('sosAudio');

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        if(document.getElementById('latency')) {
            document.getElementById('latency').innerText = Math.floor(Math.random() * (40 - 15) + 15) + "ms";
        }
    }, 1000);

    window.triggerLogout = function() {
        const overlay = document.getElementById('logoutOverlay');
        const log = document.getElementById('logoutLog');
        const main = document.getElementById('dashboardContent');

        main.style.filter = "blur(20px) grayscale(1)";
        main.style.transform = "scale(0.9)";
        overlay.style.display = "flex";

        const steps = [
            "[LOG] Requesting disconnect from MIL-SAT...",
            "[LOG] Purging local session cache...",
            "[LOG] Encrypting exit protocols...",
            "[LOG] Disconnecting neural link node 859...",
            "[LOG] Clearing authorization keys...",
            "[LOG] SESSION TERMINATED. GOODBYE COMMANDER."
        ];

        let i = 0;
        const interval = setInterval(() => {
            log.innerHTML += `<div>${steps[i]}</div>`;
            i++;
            if(i >= steps.length) {
                clearInterval(interval);
                localStorage.removeItem("auth");
                setTimeout(() => {
                    window.location.replace("login.html"); 
                }, 1000);
            }
        }, 400);
    }

    onValue(ref(db, "live"), (snapshot) => {
        const data = snapshot.val();
        const listContainer = document.getElementById("unitList");
        
        Object.keys(markers).forEach(id => {
            if (!data || !data[id]) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
        });

        if(!data) {
            listContainer.innerHTML = "<div style='opacity:0.3; text-align:center'>SCANNING...</div>";
            return;
        }

        listContainer.innerHTML = "";
        let total = 0, active = 0, anySOS = false;

        Object.keys(data).forEach(id => {
            const val = data[id];
            const isOnline = (Date.now() - (val.waktu || 0)) < 60000;
            const hasSOS = val.sos === true;
            
            total++;
            if(isOnline) active++;
            if(hasSOS && isOnline) anySOS = true;

            if(val.latitude && val.longitude) {
                const markerColor = hasSOS && isOnline ? 'var(--danger)' : (isOnline ? 'var(--neon)' : '#555');
                const iconHtml = `<div style="width:12px; height:12px; background:${markerColor}; border:2px solid #fff; border-radius:50%; box-shadow:0 0 10px ${markerColor};"></div>`;
                const customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [12,12] });

                if(!markers[id]) {
                    markers[id] = L.marker([val.latitude, val.longitude], {icon: customIcon}).addTo(map);
                } else {
                    markers[id].setLatLng([val.latitude, val.longitude]);
                    markers[id].setIcon(customIcon);
                }

                const card = document.createElement("div");
                card.className = `personnel-card ${hasSOS && isOnline ? 'sos' : ''}`;
                card.style.opacity = isOnline ? "1" : "0.5";
                card.innerHTML = `<div style="display:flex; justify-content:space-between"><strong>${id}</strong><small>${isOnline ? 'SYNC' : 'LOST'}</small></div>`;
                card.onclick = () => map.flyTo([val.latitude, val.longitude], 16);
                listContainer.appendChild(card);
            }
        });

        if(anySOS) {
            document.body.classList.add('sos-active');
            sosAudio.play();
        } else {
            document.body.classList.remove('sos-active');
            sosAudio.pause();
        }

        document.getElementById("totalUnit").innerText = total;
        document.getElementById("activeUnit").innerText = active;
    });
</script>
</body>
</html>
