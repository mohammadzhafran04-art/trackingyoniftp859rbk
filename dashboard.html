<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Command Center | YONIF TP 859</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.2);
            --bg: #010a01;
            --danger: #ff003c;
            --panel: rgba(2, 15, 2, 0.9);
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--neon);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* Ambient SOS Alert Effect */
        .sos-active body::before {
            content: ""; position: fixed; inset: 0;
            box-shadow: inset 0 0 100px rgba(255, 0, 60, 0.5);
            animation: sos-pulse 0.5s infinite alternate;
            z-index: 10000; pointer-events: none;
        }

        @keyframes sos-pulse {
            from { opacity: 0.2; } to { opacity: 0.8; }
        }

        /* Futuristic Grid Overlay */
        .grid-overlay {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none; opacity: 0.1; z-index: 0;
        }

        .main-ui {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 80px 1fr;
            height: 100vh; gap: 15px; padding: 15px; box-sizing: border-box;
            position: relative; z-index: 1;
        }

        header {
            grid-column: span 3;
            background: var(--panel);
            border: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
            box-shadow: 0 0 20px var(--neon-dim);
        }

        .side-panel {
            background: var(--panel);
            border: 1px solid var(--neon);
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto; backdrop-filter: blur(5px);
            box-shadow: inset 0 0 15px rgba(0,255,65,0.1);
        }

        #map {
            border: 1px solid var(--neon);
            background: #000; position: relative;
        }

        /* Marker Styles */
        .custom-marker {
            width: 20px; height: 20px;
            background: var(--neon);
            border: 2px solid white; border-radius: 50%;
            box-shadow: 0 0 15px var(--neon);
        }

        .sos-marker {
            background: var(--danger) !important;
            box-shadow: 0 0 20px var(--danger) !important;
            animation: marker-blink 0.5s infinite alternate;
        }

        @keyframes marker-blink {
            from { transform: scale(1); } to { transform: scale(1.5); }
        }

        /* UI Components */
        .personnel-card {
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid var(--neon-dim);
            padding: 12px; margin-bottom: 10px; cursor: pointer;
            transition: 0.3s; position: relative; overflow: hidden;
        }

        .personnel-card.sos {
            border-color: var(--danger);
            background: rgba(255, 0, 60, 0.15);
            animation: card-alert 1s infinite;
        }

        @keyframes card-alert {
            0%, 100% { border-color: var(--danger); }
            50% { border-color: white; }
        }

        .personnel-card:hover { 
            background: var(--neon-dim); 
            border-left: 5px solid var(--neon);
        }

        .stat-display {
            text-align: center; border: 1px solid var(--neon); padding: 10px;
            background: rgba(0, 255, 65, 0.05);
        }

        .stat-val { font-family: 'Orbitron'; font-size: 28px; color: white; text-shadow: 0 0 10px var(--neon); }

        .detail-header {
            font-family: 'Orbitron'; border-bottom: 2px solid var(--neon);
            padding-bottom: 10px; margin-bottom: 15px; color: var(--accent);
        }

        .data-row {
            display: flex; justify-content: space-between; 
            font-family: 'Share Tech Mono'; margin-bottom: 5px; font-size: 15px;
        }

        /* Leaflet Dark Theme */
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.9) contrast(1.2); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body class="">

<div class="grid-overlay"></div>

<div class="main-ui">
    <header>
        <div style="font-family: 'Orbitron'; font-weight: bold; font-size: 1.2rem; letter-spacing: 5px;">
            <span style="color: var(--accent)">●</span> HQ STRATEGIC MONITORING
        </div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 24px; color: white;">00:00:00</div>
        <button class="logout-btn" style="background:none; border: 1px solid var(--danger); color: var(--danger); padding: 5px 15px; font-family: 'Orbitron'; cursor:pointer" onclick="window.location.href='index.html'">LOGOUT</button>
    </header>

    <aside class="side-panel">
        <div>
            <h3 style="font-size: 14px; margin-bottom: 10px; font-family: 'Orbitron'">OPERATIONAL STATUS</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="stat-display">
                    <div class="stat-val" id="totalUnit">0</div>
                    <small>TOTAL UNIT</small>
                </div>
                <div class="stat-display">
                    <div class="stat-val" style="color: var(--accent)" id="activeUnit">0</div>
                    <small>DEPLOYED</small>
                </div>
            </div>
        </div>

        <div>
            <h3 style="font-size: 14px; border-bottom: 1px solid var(--neon); padding-bottom: 5px; font-family: 'Orbitron'">TRACKING LIST</h3>
            <div id="unitList" style="margin-top: 15px;"></div>
        </div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <div class="detail-header">UNIT TELEMETRY</div>
        <div id="detailBox">
            <p style="opacity: 0.5; font-style: italic;">AWAITING UNIT SELECTION...</p>
        </div>

        <div id="sosAlertBox" style="margin-top: auto;">
            </div>

        <div style="background: rgba(0,0,0,0.4); padding: 15px; border: 1px solid var(--neon-dim); font-size: 11px; font-family: 'Share Tech Mono'">
            ENC: AES-256 BIT<br>
            SIGNAL: ENCRYPTED BATTALION LINK<br>
            SATELLITE: WGS-84 ACTIVE
        </div>
    </aside>
</div>

<audio id="sosAudio" src="https://www.soundjay.com/buttons/beep-01a.mp3" loop></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markers = {};
    const sosAudio = document.getElementById('sosAudio');

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    window.focusUnit = (id, lat, lon) => {
        map.flyTo([lat, lon], 17);
        if(markers[id]) markers[id].openPopup();
    };

    onValue(ref(db, "live"), (snapshot) => {
        const data = snapshot.val();
        const listContainer = document.getElementById("unitList");
        const sosAlertBox = document.getElementById("sosAlertBox");
        
        if(!data) {
            listContainer.innerHTML = "<div style='opacity:0.5'>NO ACTIVE UNITS</div>";
            document.body.classList.remove('sos-active');
            sosAudio.pause();
            return;
        }

        listContainer.innerHTML = "";
        let total = 0, active = 0, anySOS = false;

        Object.keys(data).forEach(id => {
            const val = data[id];
            const isOnline = (Date.now() - (val.waktu || 0)) < 120000;
            const hasSOS = val.sos === true;
            
            total++; if(isOnline) active++;
            if(hasSOS) anySOS = true;

            // Handle Marker
            if(val.latitude && val.longitude) {
                const markerIcon = L.divIcon({
                    className: `custom-marker ${hasSOS ? 'sos-marker' : ''}`,
                    iconSize: [20, 20]
                });

                if(!markers[id]) {
                    markers[id] = L.marker([val.latitude, val.longitude], {icon: markerIcon}).addTo(map).bindPopup(`<b>${id}</b>`);
                } else {
                    markers[id].setLatLng([val.latitude, val.longitude]);
                    markers[id].setIcon(markerIcon);
                }

                // UI Card
                const card = document.createElement("div");
                card.className = `personnel-card ${hasSOS ? 'sos' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <strong style="color:${hasSOS ? '#ff003c' : 'white'}">${id}</strong>
                        <span style="font-size:10px; color:${isOnline ? '#00ff41' : '#666'}">${isOnline ? '● LIVE' : '○ LOST'}</span>
                    </div>
                    <div style="font-size:11px; margin-top:5px; font-family:'Share Tech Mono'">
                        POS: ${val.latitude.toFixed(4)}, ${val.longitude.toFixed(4)}<br>
                        SPD: ${val.speed || 0} KM/H | ACC: ${val.accuracy || 0}M
                    </div>
                    ${hasSOS ? '<div style="color:#ff003c; font-weight:bold; font-size:12px; margin-top:5px">⚠️ EMERGENCY SOS ACTIVE</div>' : ''}
                `;
                
                card.onclick = () => {
                    window.focusUnit(id, val.latitude, val.longitude);
                    document.getElementById("detailBox").innerHTML = `
                        <div style="font-family:'Share Tech Mono'">
                            <h2 style="margin:0; color:white">${id}</h2>
                            <p style="color:var(--neon)">STATUS: ${isOnline ? 'ACTIVE SERVICE' : 'CONNECTION LOST'}</p>
                            <hr style="border:1px solid var(--neon-dim)">
                            <div class="data-row"><span>LATITUDE</span><span>${val.latitude}</span></div>
                            <div class="data-row"><span>LONGITUDE</span><span>${val.longitude}</span></div>
                            <div class="data-row"><span>VELOCITY</span><span>${val.speed} KM/H</span></div>
                            <div class="data-row"><span>PRECISION</span><span>${val.accuracy} METER</span></div>
                            <div class="data-row"><span>LAST CONTACT</span><span>${new Date(val.waktu).toLocaleTimeString()}</span></div>
                            ${hasSOS ? '<div style="background:var(--danger); color:white; padding:10px; margin-top:10px; text-align:center; font-weight:bold">DISTRESS SIGNAL DETECTED</div>' : ''}
                        </div>
                    `;
                };
                listContainer.appendChild(card);
            }
        });

        // Global SOS Alert Trigger
        if(anySOS) {
            document.body.classList.add('sos-active');
            if(sosAudio.paused) sosAudio.play();
            sosAlertBox.innerHTML = `
                <div style="background:var(--danger); color:white; padding:15px; border-radius:5px; animation: blink 0.5s infinite; font-family:'Orbitron'; text-align:center">
                    CRITICAL: SOS SIGNAL DETECTED!
                </div>
            `;
        } else {
            document.body.classList.remove('sos-active');
            sosAudio.pause();
            sosAlertBox.innerHTML = "";
        }

        document.getElementById("totalUnit").innerText = total;
        document.getElementById("activeUnit").innerText = active;
    });
</script>

</body>
</html>
