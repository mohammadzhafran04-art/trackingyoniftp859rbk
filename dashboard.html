<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMAND | YONIF 859/RBK 2045</title>
    
    <script>
        /* PROTEKSI KETAT - INTEGRITAS SISTEM */
        if (localStorage.getItem("auth") !== "true") {
            window.location.replace("login.html");
            document.write('<style>body { display:none !important; }</style>');
            window.stop(); 
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.1);
            --bg: #000500;
            --danger: #ff003c;
            --panel: rgba(0, 15, 0, 0.85);
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg); color: var(--neon);
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Loading Screen Style */
        #loadingArea {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .progress-track {
            width: 300px; height: 4px; background: rgba(0,255,65,0.1);
            margin: 20px 0; border: 1px solid var(--neon-dim);
        }
        .progress-fill {
            height: 100%; background: var(--neon); width: 0%;
            box-shadow: 0 0 15px var(--neon); transition: width 0.2s;
        }

        /* Dashboard Style */
        .cyber-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px),
                              linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; opacity: 0.3;
        }

        .main-ui {
            display: grid; grid-template-columns: 380px 1fr 380px;
            grid-template-rows: 70px 1fr; height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
        }

        header {
            grid-column: span 3; background: var(--panel); border: 1px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; backdrop-filter: blur(15px);
            clip-path: polygon(0 0, 100% 0, 99% 100%, 1% 100%);
        }

        .side-panel {
            background: var(--panel); border: 1px solid var(--neon-dim);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; backdrop-filter: blur(20px);
        }

        #map { border: 1px solid var(--neon-dim); background: #000; position: relative; }
        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.5); }

        .btn-command {
            background: var(--neon-dim); border: 1px solid var(--neon);
            color: var(--neon); padding: 10px; font-family: 'Orbitron';
            cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }

        .terminal-log {
            font-size: 11px; font-family: 'Share Tech Mono';
            background: rgba(0,0,0,0.5); padding: 10px; height: 150px;
            overflow-y: auto; border: 1px solid var(--neon-dim);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loadingArea">
    <div style="font-family: 'Orbitron'; font-size: 18px; letter-spacing: 5px;">INITIALIZING DASHBOARD</div>
    <div class="progress-track">
        <div id="progressFill" class="progress-fill"></div>
    </div>
    <div id="loadMsg" style="font-family: 'Share Tech Mono'; font-size: 10px; color: var(--accent);">CONNECTING TO MIL-SAT...</div>
</div>

<div class="cyber-grid"></div>
<div class="main-ui hidden" id="dashboardContent">
    <header>
        <div style="font-family: 'Orbitron'; letter-spacing: 3px; display: flex; align-items: center; gap: 15px;">
            <div style="width: 15px; height: 15px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 10px var(--neon);"></div>
            NEURAL COMMAND CENTER <span style="color:white; opacity: 0.5;">V4.0</span>
        </div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 20px; color: var(--accent);">00:00:00</div>
        <button onclick="triggerLogout()" style="background:transparent; border:1px solid var(--danger); color:var(--danger); font-family:'Orbitron'; padding:5px 15px; cursor:pointer;">DISCONNECT</button>
    </header>

    <aside class="side-panel">
        <h3 style="font-size: 12px; font-family: 'Orbitron'; color: var(--accent);">UNIT MONITORING</h3>
        <div id="unitList">
            </div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <h3 style="font-size: 12px; font-family: 'Orbitron'; color: var(--accent);">GLOBAL DIRECTIVE</h3>
        <input type="text" id="cmdInput" placeholder="ENTER COMMAND TEXT..." style="background:black; border:1px solid var(--neon); color:var(--neon); padding:10px; font-family:'Share Tech Mono';">
        <button class="btn-command" onclick="broadcastCommand()">BROADCAST TO ALL UNITS</button>
        
        <h3 style="font-size: 12px; font-family: 'Orbitron'; color: var(--accent); margin-top: 20px;">SYSTEM LOG</h3>
        <div class="terminal-log" id="sysLog">> SYSTEM_READY...</div>
    </aside>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let map, markers = {};

    // 1. SEQUENCE LOADING (YANG TADI HILANG)
    window.addEventListener('DOMContentLoaded', () => {
        let prog = 0;
        const bar = document.getElementById('progressFill');
        const loader = setInterval(() => {
            prog += Math.random() * 20;
            if(prog > 100) prog = 100;
            bar.style.width = prog + "%";
            if(prog === 100) {
                clearInterval(loader);
                setTimeout(initDashboard, 500);
            }
        }, 150);
    });

    function initDashboard() {
        document.getElementById('loadingArea').classList.add('hidden');
        document.getElementById('dashboardContent').classList.remove('hidden');
        
        // Inisialisasi Peta
        map = L.map('map').setView([-6.2000, 106.8166], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        startClock();
        syncUnits();
    }

    function startClock() {
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);
    }

    // 2. FITUR BROADCAST (DARI DASHBOARD KE SEMUA UNIT)
    window.broadcastCommand = () => {
        const text = document.getElementById('cmdInput').value.trim();
        if(!text) return;
        
        set(ref(db, "commands/global"), {
            text: text,
            timestamp: Date.now()
        }).then(() => {
            addLog("COMMAND SENT: " + text);
            document.getElementById('cmdInput').value = "";
        });
    };

    // 3. SYNC POSITION UNIT LAPANGAN
    function syncUnits() {
        onValue(ref(db, "live"), (snapshot) => {
            const data = snapshot.val();
            const listArea = document.getElementById('unitList');
            listArea.innerHTML = "";

            for(let id in data) {
                const unit = data[id];
                // Update Marker Peta
                if(!markers[id]) {
                    markers[id] = L.marker([unit.latitude, unit.longitude]).addTo(map).bindPopup(id);
                } else {
                    markers[id].setLatLng([unit.latitude, unit.longitude]);
                }

                // Update List Samping
                const card = document.createElement('div');
                card.className = "personnel-card";
                card.style.borderLeft = unit.sos ? "4px solid red" : "4px solid var(--neon)";
                card.innerHTML = `
                    <div style="font-weight:bold">${id} ${unit.sos ? '<span style="color:red">[SOS]</span>' : ''}</div>
                    <div style="font-size:10px; opacity:0.7">SPD: ${unit.speed} KM/H | ALT: ${unit.altitude}M</div>
                `;
                listArea.appendChild(card);
            }
        });
    }

    function addLog(msg) {
        const log = document.getElementById('sysLog');
        log.innerHTML += `<br>> [${new Date().toLocaleTimeString()}] ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    window.triggerLogout = () => {
        localStorage.removeItem("auth");
        location.reload();
    };
</script>
</body>
</html>
