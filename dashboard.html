<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - HQ DASHBOARD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff0055; --bg-dark: #010808; --panel-bg: rgba(2, 12, 12, 0.96); --border: rgba(0, 242, 255, 0.2); }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: var(--neon); overflow: hidden; height: 100vh; }
        .crt-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 3px; z-index: 10000; pointer-events: none; }
        .header { height: 55px; background: #001010; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .container { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 57px); }
        .panel { background: var(--panel-bg); border-right: 1px solid var(--border); padding: 15px; overflow-y: auto; }
        #map { height: 100%; background: #000; filter: brightness(0.9) contrast(1.1) saturate(0.2) hue-rotate(140deg) invert(0.95); }
        .unit-card { background: rgba(0, 242, 255, 0.03); border: 1px solid var(--border); margin-bottom: 12px; padding: 12px; cursor: pointer; clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%); }
        .unit-card.active { background: rgba(0, 242, 255, 0.15); border-color: var(--neon); }
        .cmd-input { width: 100%; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: 'Share Tech Mono'; margin-top: 10px; box-sizing: border-box; }
        .cmd-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 8px; margin-top: 5px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="crt-effect"></div>
<div class="header">
    <div style="font-family:'Orbitron'; letter-spacing:2px; font-weight:bold">YONIF 859/RBK COMMAND CENTER</div>
    <div id="clock" style="font-family:'Share Tech Mono'; background:#000; padding:5px 15px; border:1px solid var(--border)">00:00:00</div>
</div>

<div class="container">
    <div class="panel">
        <input type="text" id="search" placeholder="FILTER CALLSIGN..." style="width:100%; background:rgba(0,0,0,0.5); border:1px solid var(--border); padding:10px; color:var(--neon); font-family:'Share Tech Mono'">
        <div id="listAnggota" style="margin-top:15px"></div>
    </div>
    <div id="map"></div>
    <div class="panel" style="border-right:none; border-left:1px solid var(--border)">
        <div id="detailBox"><div style="text-align:center; padding-top:100px; opacity:0.3">SELECT TARGET</div></div>
        <div id="logs" style="font-size:10px; margin-top:20px; color:rgba(0,242,255,0.4)"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const map = L.map('map', {zoomControl: false}).setView([-2.5489, 118.0149], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const HQ_COORD = [-2.5489, 118.0149];
    let markers = {}, paths = {}, allData = {}, selectedId = null;

    window.sendCommand = (nama) => {
        const cmd = document.getElementById("cmdInput").value;
        if(!cmd) return;
        update(ref(db, "live/" + nama), { command: cmd });
        document.getElementById("logs").innerHTML = `> CMD SENT TO ${nama}: ${cmd}<br>` + document.getElementById("logs").innerHTML;
        document.getElementById("cmdInput").value = "";
    };

    function render() {
        const list = document.getElementById("listAnggota");
        list.innerHTML = "";
        Object.keys(allData).forEach(nama => {
            const data = allData[nama];
            const lat = data.lat, lon = data.lon;
            const isOnline = (Date.now() - data.waktu) < 40000;
            
            if(!markers[nama]) {
                markers[nama] = L.circleMarker([lat, lon], {radius: 10, color: '#fff', weight: 2, fillColor: data.status === "DANGER_SOS" ? "#f05" : "#00f2ff", fillOpacity: 1}).addTo(map);
            } else {
                markers[nama].setLatLng([lat, lon]).setStyle({fillColor: data.status === "DANGER_SOS" ? "#f05" : (isOnline ? "#00f2ff" : "#444")});
            }

            const item = document.createElement("div");
            item.className = `unit-card ${selectedId === nama ? 'active' : ''}`;
            item.innerHTML = `<b>${nama}</b><br><small>${isOnline ? 'SIGNAL_LOCKED' : 'SIGNAL_LOST'} | ${data.speed} KM/H</small>`;
            item.onclick = () => { selectedId = nama; map.flyTo([lat, lon], 17); showDetail(nama, data); render(); };
            list.appendChild(item);
        });
    }

    function showDetail(nama, data) {
        document.getElementById("detailBox").innerHTML = `
            <div style="border:1px solid var(--neon); padding:15px; background:rgba(0,242,255,0.05); clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);">
                <div style="font-family:Orbitron; font-size:20px">${nama}</div>
                <div style="margin-top:10px; font-size:12px">
                    SPD: ${data.speed} KM/H | BAT: ${data.battery}
                </div>
                <div style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px">
                    <label style="font-size:10px">DIRECT COMMAND</label>
                    <input type="text" id="cmdInput" class="cmd-input" placeholder="Enter message...">
                    <button class="cmd-btn" onclick="sendCommand('${nama}')">EXECUTE</button>
                </div>
            </div>
        `;
    }

    onValue(ref(db, "live"), snap => { if(snap.val()) { allData = snap.val(); render(); }});
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
</script>
</body>
</html>
