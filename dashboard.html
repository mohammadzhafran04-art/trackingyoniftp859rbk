<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL COMMAND | YONIF 859/RBK 2045</title>
    
    <script>
        if (localStorage.getItem("auth") !== "true") {
            window.location.replace("login.html");
            document.write('<style>body { display:none !important; }</style>');
            window.stop(); 
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.1);
            --bg: #000500;
            --danger: #ff003c;
            --panel: rgba(0, 15, 0, 0.9);
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--neon);
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* Scanline Effect */
        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 1000; pointer-events: none;
        }

        .cyber-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px), linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; opacity: 0.2;
        }

        .main-ui {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 70px 1fr;
            height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
        }

        header {
            grid-column: span 3;
            background: var(--panel);
            border: 1px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; backdrop-filter: blur(15px);
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
        }

        .side-panel {
            background: var(--panel);
            border: 1px solid var(--neon-dim);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; backdrop-filter: blur(20px);
        }

        #map { border: 1px solid var(--neon-dim); background: #000; }

        /* Tactical Uplink Styles */
        .uplink-box {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--neon);
            padding: 15px;
            margin-top: auto;
        }
        .uplink-input {
            width: 100%; background: #000; border: 1px solid var(--neon-dim);
            color: var(--neon); font-family: 'Share Tech Mono';
            padding: 10px; box-sizing: border-box; margin-bottom: 10px; outline: none;
        }
        .btn-execute {
            width: 100%; padding: 10px; background: var(--neon); color: #000;
            border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
        }
        .btn-execute:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }

        .personnel-card {
            background: rgba(0, 255, 65, 0.03); border: 1px solid var(--neon-dim);
            padding: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.3s;
        }
        .personnel-card:hover { background: rgba(0, 255, 65, 0.1); border-color: var(--neon); }

        .stat-val { font-family: 'Orbitron'; font-size: 28px; color: #fff; text-shadow: 0 0 10px var(--neon); }

        .leaflet-container { filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.5); }
        
        .sos-active { animation: emergency-bg 0.5s infinite; }
        @keyframes emergency-bg { 0% { background: #000; } 50% { background: #200; } 100% { background: #000; } }
    </style>
</head>
<body>

<div class="cyber-grid"></div>

<div class="main-ui" id="dashboardContent">
    <header>
        <div style="font-family: 'Orbitron'; letter-spacing: 3px;">
            NEURAL COMMAND <span style="color:white; opacity: 0.5;">V4.0</span>
        </div>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 20px; color: var(--accent);">00:00:00</div>
        <button style="background:none; border: 1px solid var(--danger); color: var(--danger); padding: 5px 15px; cursor:pointer;" onclick="triggerLogout()">DISCONNECT</button>
    </header>

    <aside class="side-panel">
        <h3 style="font-size: 11px; font-family: 'Orbitron'; color: var(--accent);">UNIT STATUS</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="border: 1px solid var(--neon-dim); padding: 10px; text-align:center;">
                <small style="font-size: 9px;">TOTAL</small>
                <div class="stat-val" id="totalUnit">0</div>
            </div>
            <div style="border: 1px solid var(--neon-dim); padding: 10px; text-align:center;">
                <small style="font-size: 9px;">ACTIVE</small>
                <div class="stat-val" style="color: var(--accent)" id="activeUnit">0</div>
            </div>
        </div>
        <div id="unitList" style="flex:1; margin-top: 10px;"></div>
    </aside>

    <div id="map"></div>

    <aside class="side-panel">
        <div style="font-family: 'Orbitron'; font-size: 12px; color: var(--accent);">COMMAND UPLINK</div>
        
        <div id="missionLog" style="flex:1; font-family: 'Share Tech Mono'; font-size: 11px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border: 1px solid var(--neon-dim);">
            <div>> SYSTEM READY...</div>
        </div>

        <div class="uplink-box">
            <div style="font-size: 9px; margin-bottom: 5px;">BROADCAST DIRECTIVE:</div>
            <input type="text" id="cmdInput" class="uplink-input" placeholder="Enter command text...">
            <button class="btn-execute" onclick="broadcastCommand()">SEND TO ALL UNITS</button>
        </div>
    </aside>
</div>

<audio id="sosAudio" src="https://www.soundjay.com/buttons/beep-01a.mp3" loop></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let markers = {};

    // BROADCAST FUNCTION
    window.broadcastCommand = () => {
        const msg = document.getElementById('cmdInput').value;
        if(!msg) return;
        
        // Simpan ke node 'commands' agar semua index bisa listen
        set(ref(db, "commands/global"), {
            text: msg.toUpperCase(),
            timestamp: Date.now(),
            sender: "COMMAND CENTER"
        }).then(() => {
            document.getElementById('cmdInput').value = "";
            addLog("DIRECTIVE SENT: " + msg);
        });
    };

    function addLog(msg) {
        const log = document.getElementById('missionLog');
        log.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    // REALTIME TRACKING
    onValue(ref(db, "live"), (snapshot) => {
        const data = snapshot.val();
        const listContainer = document.getElementById("unitList");
        if(!data) return;

        listContainer.innerHTML = "";
        let total = 0, active = 0, anySOS = false;

        Object.keys(data).forEach(id => {
            const val = data[id];
            const isOnline = (Date.now() - (val.waktu || 0)) < 60000;
            const hasSOS = val.sos === true && isOnline;

            total++; if(isOnline) active++;
            if(hasSOS) anySOS = true;

            if(val.latitude && val.longitude) {
                const color = hasSOS ? 'var(--danger)' : (isOnline ? 'var(--neon)' : '#555');
                const iconHtml = `<div style="width:12px; height:12px; background:${color}; border:2px solid #fff; border-radius:50%; box-shadow:0 0 10px ${color};"></div>`;
                
                if(!markers[id]) {
                    markers[id] = L.marker([val.latitude, val.longitude], {
                        icon: L.divIcon({ html: iconHtml, className: '', iconSize: [12,12] })
                    }).addTo(map);
                } else {
                    markers[id].setLatLng([val.latitude, val.longitude]);
                }

                const card = document.createElement("div");
                card.className = "personnel-card";
                card.innerHTML = `<div style="display:flex; justify-content:space-between"><strong>${id}</strong><small>${isOnline ? 'SYNC' : 'LOST'}</small></div>`;
                card.onclick = () => map.flyTo([val.latitude, val.longitude], 17);
                listContainer.appendChild(card);
            }
        });

        document.getElementById("totalUnit").innerText = total;
        document.getElementById("activeUnit").innerText = active;
        
        if(anySOS) {
            document.body.classList.add('sos-active');
            document.getElementById('sosAudio').play();
        } else {
            document.body.classList.remove('sos-active');
            document.getElementById('sosAudio').pause();
        }
    });

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);
</script>
</body>
</html>
