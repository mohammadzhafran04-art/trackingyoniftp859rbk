<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - ULTIMATE TACTICAL HUD</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff0055;
            --warning: #ffcc00;
            --bg-dark: #010808;
            --panel-bg: rgba(2, 12, 12, 0.95);
            --border: rgba(0, 242, 255, 0.25);
        }

        body {
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--neon);
            overflow: hidden;
            height: 100vh;
        }

        /* Overlay Efek CRT & Scanline */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%;
            z-index: 10000; pointer-events: none;
        }

        .header {
            height: 50px; background: #001515; border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .container {
            display: grid; grid-template-columns: 320px 1fr 320px;
            height: calc(100vh - 52px);
        }

        .panel {
            background: var(--panel-bg); border-right: 1px solid var(--border);
            padding: 15px; overflow-y: auto; display: flex; flex-direction: column;
        }

        #map {
            height: 100%; background: #000;
            filter: brightness(0.9) contrast(1.1) saturate(0) hue-rotate(140deg) invert(0.95);
        }

        /* Tactical Components */
        .vitals-card {
            background: rgba(0, 242, 255, 0.03); border: 1px solid var(--border);
            margin-bottom: 10px; padding: 10px; position: relative;
        }

        .vitals-card::after {
            content: "REC"; position: absolute; top: 5px; right: 8px; font-size: 8px; color: var(--danger); animation: blink 1s infinite;
        }

        .proximity-tag {
            font-size: 10px; color: var(--warning); border: 1px solid var(--warning);
            padding: 2px 5px; border-radius: 3px; margin-top: 5px; display: inline-block;
        }

        .signal-bar {
            height: 4px; background: #222; margin-top: 5px; overflow: hidden;
        }

        .signal-fill { height: 100%; background: var(--neon); transition: 0.5s; }

        /* Navigation Menu */
        .nav-header {
            font-family: 'Orbitron'; font-size: 11px; letter-spacing: 2px;
            margin: 15px 0 10px; color: rgba(0, 242, 255, 0.6); display: flex; align-items: center;
        }

        .nav-header::after { content: ""; flex: 1; height: 1px; background: var(--border); margin-left: 10px; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* Map Legend */
        .map-overlay-info {
            position: absolute; bottom: 20px; left: 340px;
            background: rgba(0,0,0,0.7); padding: 10px; border-left: 3px solid var(--neon);
            z-index: 1000; font-size: 12px; font-family: 'Share Tech Mono';
        }

    </style>
</head>
<body>

<div class="crt-overlay"></div>

<div class="header">
    <div style="font-family:'Orbitron'; font-weight:bold; letter-spacing:1px">TACTICAL HUB // UNIT-859</div>
    <div id="clock" style="font-family:'Share Tech Mono'; font-size:14px; background:rgba(0,0,0,0.5); padding:3px 10px; border:1px solid var(--border)">00:00:00</div>
</div>

<div class="container">
    <div class="panel">
        <div class="nav-header">LIVE OPERATIVES</div>
        <input type="text" id="search" placeholder="FILTER BY CALLSIGN..." 
               style="width:100%; background:transparent; border:1px solid var(--border); padding:8px; color:var(--neon); margin-bottom:15px; font-family:'Share Tech Mono'">
        
        <div id="listAnggota"></div>

        <div style="margin-top:auto">
            <div class="nav-header">SYSTEM SUMMARY</div>
            <div style="display:flex; justify-content:space-between; font-size:12px">
                <span>TOTAL NODES: <b id="count-total">0</b></span>
                <span>ACTIVE: <b id="count-online" style="color:var(--neon)">0</b></span>
            </div>
        </div>
    </div>

    <div style="position:relative">
        <div id="map"></div>
        <div class="map-overlay-info">
            LAT: <span id="overlay-lat">0.00</span> | LON: <span id="overlay-lon">0.00</span><br>
            GRID: UTM-50S | OP-AREA: SECURE
        </div>
    </div>

    <div class="panel" style="border-right:none; border-left:1px solid var(--border)">
        <div class="nav-header">TARGET ANALYSIS</div>
        <div id="detailBox">
            <p style="opacity:0.3; text-align:center; font-size:12px; margin-top:50px">[ SELECT UNIT TO DECRYPT DATA ]</p>
        </div>

        <div class="nav-header">COMMS LOG</div>
        <div id="logs" style="font-size:10px; color:rgba(0,255,242,0.4); font-family:monospace; line-height:1.4"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const map = L.map('map', {zoomControl: false}).setView([-2.5, 118], 5);
    const satTile = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    // Titik Markas (HQ) - Contoh koordinat
    const HQ_COORD = [-2.5489, 118.0149];
    L.marker(HQ_COORD).addTo(map).bindTooltip("COMMAND CENTER HQ");

    // Geofencing: Lingkaran Operasional (radius 5km)
    const geofence = L.circle(HQ_COORD, {
        radius: 5000, color: 'lime', weight: 1, fillOpacity: 0.05
    }).addTo(map);

    let markers = {};
    let allData = {};
    let selectedId = null;

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', {hour12: false}) + " ZULU";
    }, 1000);

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Radius bumi KM
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return (R * c).toFixed(2);
    }

    function addLog(msg) {
        const l = document.getElementById('logs');
        l.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
        if(l.childNodes.length > 15) l.lastChild.remove();
    }

    function render() {
        const list = document.getElementById("listAnggota");
        const keyword = document.getElementById("search").value.toLowerCase();
        list.innerHTML = "";

        let total = 0, online = 0;

        Object.keys(allData).forEach(nama => {
            const data = allData[nama];
            const lat = data.lat || data.latitude;
            const lon = data.lon || data.longitude;
            const waktu = data.waktu || 0;
            
            if(!lat || !lon) return;

            const isOnline = (Date.now() - waktu) < 40000;
            const distance = calculateDistance(HQ_COORD[0], HQ_COORD[1], lat, lon);
            const accuracyPercent = Math.max(10, 100 - (data.accuracy || 0));

            total++;
            if(isOnline) online++;
            if(!nama.toLowerCase().includes(keyword)) return;

            // Update Marker
            if (!markers[nama]) {
                markers[nama] = L.circleMarker([lat, lon], {
                    radius: 10, weight: 2, color: '#fff', fillOpacity: 0.8,
                    fillColor: data.status === "DANGER_SOS" ? "#ff0055" : "#00f2ff"
                }).addTo(map);
                addLog(`TARGET_ACQUIRED: ${nama}`);
            } else {
                markers[nama].setLatLng([lat, lon]);
                markers[nama].setStyle({
                    fillColor: data.status === "DANGER_SOS" ? "#ff0055" : (isOnline ? "#00f2ff" : "#444")
                });
            }

            // List UI
            const item = document.createElement("div");
            item.className = `vitals-card ${selectedId === nama ? 'active' : ''}`;
            item.style.borderColor = selectedId === nama ? 'var(--neon)' : 'var(--border)';
            
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span style="font-family:Orbitron; font-size:13px">${nama}</span>
                    <span style="font-size:10px; color:${isOnline ? 'var(--neon)' : '#555'}">${isOnline ? '● LIVE' : '○ LOST'}</span>
                </div>
                <div class="proximity-tag">DIST: ${distance} KM FROM HQ</div>
                <div class="signal-bar"><div class="signal-fill" style="width:${accuracyPercent}%"></div></div>
            `;

            item.onclick = () => {
                selectedId = nama;
                map.flyTo([lat, lon], 15);
                showDetail(nama, data, isOnline, distance);
                render();
            };
            list.appendChild(item);
        });

        document.getElementById("count-total").innerText = total;
        document.getElementById("count-online").innerText = online;
    }

    function showDetail(nama, data, isOnline, distance) {
        const lat = data.lat || data.latitude;
        const lon = data.lon || data.longitude;
        document.getElementById("overlay-lat").innerText = lat.toFixed(4);
        document.getElementById("overlay-lon").innerText = lon.toFixed(4);

        document.getElementById("detailBox").innerHTML = `
            <div style="border:1px solid var(--neon); padding:10px; background:rgba(0,242,255,0.05)">
                <h2 style="margin:0; font-family:Orbitron; font-size:18px">${nama}</h2>
                <div style="font-size:10px; opacity:0.6">UID: ${data.waktu}</div>
            </div>
            
            <div style="margin-top:15px">
                <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #111">
                    <span style="color:rgba(0,242,255,0.5)">COORD</span>
                    <span>${lat.toFixed(6)}, ${lon.toFixed(6)}</span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #111">
                    <span style="color:rgba(0,242,255,0.5)">VELOCITY</span>
                    <span>${data.speed || 0} KM/H</span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #111">
                    <span style="color:rgba(0,242,255,0.5)">BATTERY</span>
                    <span>${data.battery || '--'}</span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #111">
                    <span style="color:rgba(0,242,255,0.5)">SIGNAL ACC</span>
                    <span>±${data.accuracy || 0}m</span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #111">
                    <span style="color:rgba(0,242,255,0.5)">HQ DISTANCE</span>
                    <span style="color:var(--warning)">${distance} KM</span>
                </div>
            </div>

            <div style="margin-top:15px; padding:8px; background:rgba(0,0,0,0.4); border-left:2px solid var(--neon); font-size:11px">
                <b>LAST KNOWN ADDR:</b><br>${data.alamat || 'N/A'}
            </div>

            ${data.status === 'DANGER_SOS' ? '<div style="background:red; color:white; padding:10px; margin-top:15px; text-align:center; font-weight:bold; animation:blink 0.5s infinite">EMERGENCY ALERT ACTIVE</div>' : ''}
        `;
    }

    onValue(ref(db, "live"), snap => {
        const val = snap.val();
        if(val) { allData = val; render(); }
    });

    document.getElementById("search").addEventListener("input", render);
</script>

</body>
</html>
