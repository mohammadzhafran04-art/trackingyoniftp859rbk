<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - CYBER TACTICAL DASHBOARD</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff0055;
            --warning: #ffcc00;
            --bg-dark: #010808;
            --panel-bg: rgba(2, 12, 12, 0.96);
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark);
            color: var(--neon); overflow: hidden; height: 100vh;
        }

        /* CRT Filter */
        .crt-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; z-index: 10000; pointer-events: none;
        }

        .header {
            height: 55px; background: #001010; border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .container {
            display: grid; grid-template-columns: 320px 1fr 320px;
            height: calc(100vh - 57px);
        }

        .panel {
            background: var(--panel-bg); border-right: 1px solid var(--border);
            padding: 15px; overflow-y: auto; position: relative;
        }

        #map {
            height: 100%; background: #000;
            filter: brightness(0.9) contrast(1.1) saturate(0.2) hue-rotate(140deg) invert(0.95);
        }

        /* Tactical HUD Elements */
        .unit-card {
            background: rgba(0, 242, 255, 0.03); border: 1px solid var(--border);
            margin-bottom: 12px; padding: 12px; position: relative; transition: 0.3s;
            clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%);
        }

        .unit-card.active { background: rgba(0, 242, 255, 0.15); border-color: var(--neon); }

        .compass-ring {
            width: 40px; height: 40px; border: 2px dashed var(--border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        .map-controls {
            position: absolute; top: 20px; right: 340px; z-index: 1000;
            display: flex; flex-direction: column; gap: 5px;
        }

        .map-btn {
            background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon);
            padding: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px;
        }

        .map-btn:hover { background: var(--neon); color: black; }

        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .out-of-range { color: var(--danger); animation: pulse-red 0.8s infinite; }

    </style>
</head>
<body>

<div class="crt-effect"></div>

<div class="header">
    <div style="font-family:'Orbitron'; letter-spacing:2px; font-weight:bold">YONIF 859/RBK COMMAND CENTER</div>
    <div style="display:flex; gap:20px; align-items:center">
        <span id="sat-status" style="font-size:12px; color:var(--neon)">🛰 SAT-LINK: ACTIVE</span>
        <span id="clock" style="font-family:'Share Tech Mono'; background:#000; padding:5px 15px; border:1px solid var(--border)">00:00:00</span>
    </div>
</div>

<div class="container">
    <div class="panel">
        <div style="font-family:'Orbitron'; font-size:11px; color:rgba(0,242,255,0.5); margin-bottom:15px">SQUADRON_MANIFEST.v2</div>
        <input type="text" id="search" placeholder="FILTER CALLSIGN..." 
               style="width:100%; background:rgba(0,0,0,0.5); border:1px solid var(--border); padding:10px; color:var(--neon); margin-bottom:15px; font-family:'Share Tech Mono'">
        
        <div id="listAnggota"></div>
    </div>

    <div style="position:relative">
        <div id="map"></div>
        
        <div class="map-controls">
            <button class="map-btn" onclick="setMap('sat')">SATELLITE</button>
            <button class="map-btn" onclick="setMap('tact')">TERRAIN</button>
        </div>

        <div style="position:absolute; bottom:20px; left:20px; z-index:1000; background:rgba(0,0,0,0.8); padding:10px; border:1px solid var(--border); font-family:'Share Tech Mono'; font-size:12px">
            HQ: 2.5489° S, 118.0149° E <br>
            AOR_RADIUS: 5000M <br>
            ENCRYPTION: AES_256_LIVE
        </div>
    </div>

    <div class="panel" style="border-right:none; border-left:1px solid var(--border)">
        <div style="font-family:'Orbitron'; font-size:11px; color:rgba(0,242,255,0.5); margin-bottom:15px">DATA_STREAM_ANALYSIS</div>
        <div id="detailBox">
            <div style="text-align:center; padding-top:100px; opacity:0.3">SELECT TARGET FOR DATA UPLINK</div>
        </div>
        
        <div style="margin-top:auto">
            <div style="font-family:'Orbitron'; font-size:10px; margin-bottom:10px">SYSTEM_LOGS</div>
            <div id="logs" style="font-size:10px; height:150px; overflow:hidden; font-family:monospace; color:rgba(0,242,255,0.5)"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const map = L.map('map', {zoomControl: false}).setView([-2.5489, 118.0149], 13);
    const tiles = {
        sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
        tact: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    };
    tiles.sat.addTo(map);

    window.setMap = (type) => {
        Object.values(tiles).forEach(t => map.removeLayer(t));
        tiles[type].addTo(map);
    };

    const HQ_COORD = [-2.5489, 118.0149];
    L.circle(HQ_COORD, {radius: 5000, color: '#00f2ff', weight: 1, fillOpacity: 0.05}).addTo(map);
    L.marker(HQ_COORD).addTo(map).bindTooltip("COMMAND HQ");

    let markers = {};
    let paths = {}; // Untuk breadcrumbs
    let allData = {};
    let selectedId = null;

    function addLog(msg) {
        const l = document.getElementById('logs');
        l.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * R).toFixed(0);
    }

    function render() {
        const list = document.getElementById("listAnggota");
        const keyword = document.getElementById("search").value.toLowerCase();
        list.innerHTML = "";

        Object.keys(allData).forEach(nama => {
            const data = allData[nama];
            const lat = data.lat || data.latitude;
            const lon = data.lon || data.longitude;
            const waktu = data.waktu || 0;
            if(!lat || !lon) return;

            const isOnline = (Date.now() - waktu) < 40000;
            const dist = calculateDistance(HQ_COORD[0], HQ_COORD[1], lat, lon);
            const isOutOfRange = dist > 5000;

            if(!nama.toLowerCase().includes(keyword)) return;

            // Marker & Path Logic
            if (!markers[nama]) {
                markers[nama] = L.circleMarker([lat, lon], {
                    radius: 10, color: '#fff', weight: 2, fillOpacity: 1,
                    fillColor: data.status === "DANGER_SOS" ? "#ff0055" : "#00f2ff"
                }).addTo(map);
                
                paths[nama] = L.polyline([[lat, lon]], {color: '#00f2ff', weight: 2, opacity: 0.5, dashArray: '5, 10'}).addTo(map);
                addLog(`TARGET_ACQUIRED: ${nama}`);
            } else {
                markers[nama].setLatLng([lat, lon]);
                markers[nama].setStyle({fillColor: data.status === "DANGER_SOS" ? "#ff0055" : (isOnline ? "#00f2ff" : "#444")});
                
                // Add Breadcrumbs (limit to 10 points)
                const currentPath = paths[nama].getLatLngs();
                if(currentPath.length > 10) currentPath.shift();
                currentPath.push([lat, lon]);
                paths[nama].setLatLngs(currentPath);
            }

            // List Item UI
            const item = document.createElement("div");
            item.className = `unit-card ${selectedId === nama ? 'active' : ''}`;
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <b>${nama.toUpperCase()}</b>
                    <span style="font-size:10px">${isOnline ? 'SIGNAL_LOCKED' : 'SIGNAL_LOST'}</span>
                </div>
                <div style="margin-top:8px; font-size:11px; display:flex; justify-content:space-between">
                    <span>SPD: ${data.speed || 0} KM/H</span>
                    <span class="${isOutOfRange ? 'out-of-range' : ''}">DST: ${dist}M</span>
                </div>
            `;

            item.onclick = () => {
                selectedId = nama;
                map.flyTo([lat, lon], 17);
                showDetail(nama, data, isOnline, dist);
                render();
            };
            list.appendChild(item);
        });
    }

    function showDetail(nama, data, isOnline, dist) {
        document.getElementById("detailBox").innerHTML = `
            <div style="border:1px solid var(--neon); padding:15px; background:rgba(0,242,255,0.05); clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);">
                <div style="font-family:Orbitron; font-size:20px">${nama}</div>
                <div style="font-size:10px; opacity:0.6; margin-bottom:10px">OBJECT_ID: ${Date.now()}</div>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:12px">
                    <div style="border:1px solid rgba(0,242,255,0.2); padding:5px">
                        <label style="font-size:8px; display:block; opacity:0.5">LATITUDE</label>
                        ${(data.lat||data.latitude).toFixed(6)}
                    </div>
                    <div style="border:1px solid rgba(0,242,255,0.2); padding:5px">
                        <label style="font-size:8px; display:block; opacity:0.5">LONGITUDE</label>
                        ${(data.lon||data.longitude).toFixed(6)}
                    </div>
                </div>
                
                <div style="margin-top:10px; font-size:12px">
                    <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #111">
                        <span>VELOCITY</span><span>${data.speed || 0} KM/H</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #111">
                        <span>BATTERY</span><span>${data.battery || '--'}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #111">
                        <span>HQ_PROXIMITY</span><span style="${dist > 5000 ? 'color:var(--danger)' : ''}">${dist}M</span>
                    </div>
                </div>
            </div>

            <div style="margin-top:15px; font-size:11px; color:rgba(0,242,255,0.6)">
                ADDRESS_UPLINK:<br>
                <div style="color:white; margin-top:5px; padding:8px; background:rgba(0,242,255,0.05)">${data.alamat || 'NO_GEO_DATA'}</div>
            </div>
        `;
    }

    onValue(ref(db, "live"), snap => {
        const val = snap.val();
        if(val) { allData = val; render(); }
    });

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);
</script>

</body>
</html>
