<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - Secure Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff9c;
            --danger: #ff003c;
            --bg: #020804;
            --panel: rgba(5, 20, 10, 0.9);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* AMBIENT BACKGROUND GRID */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 255, 156, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 156, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg) translateY(-20%);
            animation: gridMove 15s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* TRANSITION OVERLAY (HYPER-JUMP) */
        #warp-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #fff 0%, var(--neon) 50%, #000 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.6s ease-in, transform 0.8s ease-in;
            transform: scale(0.5);
        }

        /* LOGIN CARD */
        .card {
            width: 360px;
            padding: 40px;
            background: var(--panel);
            border: 1px solid var(--neon);
            box-shadow: 0 0 50px rgba(0, 255, 156, 0.2), inset 0 0 20px rgba(0, 255, 156, 0.1);
            backdrop-filter: blur(15px);
            text-align: center;
            z-index: 10;
            position: relative;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon);
        }

        /* BIO-SCANNER ANIMATION */
        .scanner-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 30px;
            border: 1px solid rgba(0, 255, 156, 0.3);
            position: relative;
            padding: 10px;
        }

        .retina-ring {
            width: 100%;
            height: 100%;
            border: 2px dashed var(--neon);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            top: 0;
            left: 0;
            animation: scanning 2.5s ease-in-out infinite;
        }

        @keyframes scanning {
            0%, 100% { top: 0%; opacity: 0; }
            50% { top: 100%; opacity: 1; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* INPUT */
        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 156, 0.3);
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            letter-spacing: 5px;
            outline: none;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(0, 255, 156, 0.3);
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 15px;
            background: var(--neon);
            color: #000;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            letter-spacing: 2px;
        }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 25px var(--neon);
            transform: translateY(-2px);
        }

        /* TERMINAL LOG */
        #terminal {
            margin-top: 25px;
            font-size: 11px;
            height: 45px;
            color: rgba(0, 255, 156, 0.7);
            border-top: 1px solid rgba(0, 255, 156, 0.1);
            padding-top: 15px;
            line-height: 1.5;
        }

        .alert-success { color: var(--neon); font-weight: bold; }
        .alert-error { color: var(--danger); text-shadow: 0 0 5px var(--danger); animation: blink 0.3s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #loader {
            display: none;
            width: 15px;
            height: 15px;
            border: 2px solid var(--bg);
            border-top: 2px solid var(--neon);
            border-radius: 50%;
            margin: 10px auto;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<div id="warp-overlay"></div>
<div class="grid-bg"></div>

<div class="card" id="loginCard">
    <div class="title">UNIT AUTHENTICATION</div>

    <div class="scanner-container">
        <div class="retina-ring"></div>
        <div class="scan-line"></div>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.3;">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
    </div>

    <div class="input-group">
        <input type="password" id="pass" placeholder="SECURITY_CODE" autocomplete="off">
    </div>

    <button onclick="authProcess()">INITIALIZE UPLINK</button>
    
    <div id="loader"></div>
    <div id="terminal">> SYSTEM_READY...<br>> AWAITING CREDENTIALS</div>
</div>

<script>
    const SECRET = "rabekaojokendor2026";
    const term = document.getElementById("terminal");
    const loader = document.getElementById("loader");
    const overlay = document.getElementById("warp-overlay");
    const card = document.getElementById("loginCard");

    function log(msg, type = '') {
        term.innerHTML = `<span class="${type}">> ${msg}</span>`;
    }

    async function authProcess() {
        const input = document.getElementById("pass").value;
        
        // Mulai Proses Login
        log("ESTABLISHING ENCRYPTED LINK...");
        loader.style.display = "block";
        
        // Delay simulasi koneksi
        await new Promise(r => setTimeout(r, 1800));

        if (input === SECRET) {
            log("IDENTITY VERIFIED. ACCESS GRANTED.", "alert-success");
            loader.style.display = "none";
            
            await new Promise(r => setTimeout(r, 600));
            
            // EFEK TRANSISI HYPER-JUMP
            overlay.style.opacity = "1";
            overlay.style.transform = "scale(3)";
            
            card.style.transform = "translateZ(800px) rotateX(20deg)";
            card.style.opacity = "0";

            setTimeout(() => {
                // Simpan status login
                localStorage.setItem("auth_859", "true");
                // Pindah ke index.html (Tracker Anda)
                window.location.href = "index.html"; 
            }, 800);

        } else {
            log("AUTHENTICATION FAILURE. ALERT SENT.", "alert-error");
            loader.style.display = "none";
            
            // Efek Getar jika salah
            card.style.animation = "shake 0.5s cubic-bezier(.36,.07,.19,.97) both";
            setTimeout(() => card.style.animation = "", 500);
            document.getElementById("pass").value = "";
        }
    }

    // Izinkan tekan Enter untuk Login
    document.getElementById("pass").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            authProcess();
        }
    });
</script>

</body>
</html>
