<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - AUTH</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff9c; --bg: #020804; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Share Tech Mono'; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .card { width: 320px; padding: 40px; border: 1px solid var(--neon); background: rgba(5, 20, 10, 0.9); text-align: center; position: relative; clip-path: polygon(0 15px, 15px 0, 100% 0, 100% 85%, 85% 100%, 0 100%); }
        .scan-line { position: absolute; width: 80%; height: 2px; background: var(--neon); left: 10%; top: 20%; animation: scan 3s infinite; box-shadow: 0 0 15px var(--neon); }
        @keyframes scan { 0%, 100% { top: 20%; opacity: 0; } 50% { top: 70%; opacity: 1; } }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--neon); color: var(--neon); text-align: center; margin: 20px 0; font-family: 'Orbitron'; }
        button { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
        .error { color: #ff003c; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="scan-line"></div>
        <div style="font-family:'Orbitron'; letter-spacing:3px;">SYSTEM ACCESS</div>
        <input type="password" id="pass" placeholder="PASSCODE">
        <button onclick="login()">INITIALIZE</button>
        <div id="err" class="error">INVALID CREDENTIALS</div>
    </div>

    <script>
        const SECRET = "rabekaojokendor2026";
        if(localStorage.getItem("auth") === "true") window.location.href = "dashboard.html";

        function login() {
            const p = document.getElementById("pass").value;
            if(p === SECRET) {
                localStorage.setItem("auth", "true");
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("err").style.display = "block";
                setTimeout(() => document.getElementById("err").style.display = "none", 2000);
            }
        }
    </script>
</body>
</html>
