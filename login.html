<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL GATEWAY | 859-RBK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff9c;
            --neon-bg: rgba(0, 255, 156, 0.1);
            --danger: #ff0055;
            --bg: #000805;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: var(--neon); font-family: 'Share Tech Mono', monospace;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; perspective: 1000px;
        }

        /* Ambient Background */
        #particles-js {
            position: absolute; width: 100%; height: 100%; z-index: -1;
        }

        .gateway-container {
            position: relative; width: 380px; padding: 50px 40px;
            background: rgba(0, 15, 10, 0.8);
            border: 1px solid var(--neon);
            backdrop-filter: blur(20px);
            clip-path: polygon(15% 0%, 100% 0, 100% 85%, 85% 100%, 0 100%, 0% 15%);
            box-shadow: 0 0 50px rgba(0, 255, 156, 0.1), inset 0 0 20px rgba(0, 255, 156, 0.05);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-10px) rotateX(-2deg); }
        }

        .header-box { text-align: center; margin-bottom: 40px; }
        .header-box h1 {
            font-family: 'Orbitron'; font-size: 18px; letter-spacing: 5px; margin: 0;
            text-shadow: 0 0 10px var(--neon);
        }
        .header-box p { font-size: 9px; opacity: 0.6; margin-top: 10px; }

        .input-group { position: relative; margin-bottom: 30px; }
        .input-group label {
            font-size: 10px; letter-spacing: 2px; display: block; margin-bottom: 10px;
            color: var(--neon); opacity: 0.8;
        }

        input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--neon-bg);
            padding: 15px; color: white; font-family: 'Orbitron'; font-size: 16px;
            text-align: center; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--neon); box-shadow: 0 0 15px var(--neon-bg);
            background: rgba(0, 255, 156, 0.05);
        }

        .btn-sync {
            width: 100%; padding: 18px; background: transparent;
            border: 1px solid var(--neon); color: var(--neon);
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            position: relative; overflow: hidden; transition: 0.3s;
        }

        .btn-sync:hover {
            background: var(--neon); color: #000;
            box-shadow: 0 0 30px var(--neon);
        }

        .btn-sync::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }

        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }

        .terminal-overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: none; padding: 40px; font-size: 12px; overflow: hidden;
        }

        .error-msg {
            color: var(--danger); font-size: 11px; margin-top: 15px;
            display: none; animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .deco-line {
            position: absolute; width: 40px; height: 1px; background: var(--neon);
        }
        .top-l { top: 10px; left: 10px; }
        .bot-r { bottom: 10px; right: 10px; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="gateway-container" id="loginCard">
        <div class="deco-line top-l"></div>
        <div class="deco-line bot-r"></div>
        
        <div class="header-box">
            <h1>NEURAL LINK</h1>
            <p>BATTALION 859/RBK ENCRYPTION GATEWAY</p>
        </div>

        <div class="input-group">
            <label>ENTER PASSCODE</label>
            <input type="password" id="passcode" placeholder="••••••••" autocomplete="off">
            <div id="errMsg" class="error-msg">!! ACCESS DENIED: INVALID HASH !!</div>
        </div>

        <button class="btn-sync" onclick="validate()">INITIALIZE SYNC</button>

        <div style="margin-top: 30px; font-size: 8px; text-align: center; opacity: 0.4; letter-spacing: 2px;">
            SECURED BY RBK-CYBER DEFENSE 2045
        </div>
    </div>

    <div id="terminal" class="terminal-overlay">
        <div id="termLog"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Background Particles
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#00ff9c" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ff9c", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });

        const SECRET = "rabekaojokendor2026";

        function validate() {
            const input = document.getElementById("passcode").value;
            const err = document.getElementById("errMsg");

            if(input === SECRET) {
                startBootSequence();
            } else {
                err.style.display = "block";
                document.getElementById("passcode").style.borderColor = "var(--danger)";
                setTimeout(() => {
                    err.style.display = "none";
                    document.getElementById("passcode").style.borderColor = "var(--neon-bg)";
                }, 2000);
            }
        }

        function startBootSequence() {
            const term = document.getElementById("terminal");
            const log = document.getElementById("termLog");
            term.style.display = "block";
            
            const messages = [
                "> INITIALIZING NEURAL HANDSHAKE...",
                "> DECRYPTING QUANTUM LAYER...",
                "> BYPASSING BIOMETRIC FIREWALL...",
                "> ACCESSING MIL-SATCOM DATABASE...",
                "> SYNCING COORDINATES WITH 859/RBK HUB...",
                "> CONNECTION ESTABLISHED.",
                "> REDIRECTING TO COMMAND CENTER..."
            ];

            let i = 0;
            const interval = setInterval(() => {
                log.innerHTML += `<div style="margin-bottom:10px">${messages[i]}</div>`;
                i++;
                if(i >= messages.length) {
                    clearInterval(interval);
                    localStorage.setItem("auth", "true");
                    setTimeout(() => {
                        window.location.href = "dashboard.html"; // Pastikan nama file dashboard benar
                    }, 500);
                }
            }, 400);
        }

        // Enter key support
        document.getElementById("passcode").addEventListener("keyup", (e) => {
            if(e.key === "Enter") validate();
        });
    </script>
</body>
</html>
