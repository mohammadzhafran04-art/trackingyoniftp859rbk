<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - Secure Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff9c;
            --danger: #ff003c;
            --bg: #020804;
            --panel: rgba(5, 20, 10, 0.9);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* TACTICAL OVERLAY (Efek Garis TV Jadul) */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 20;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* GRID BACKGROUND */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 255, 156, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 156, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotateX(60deg) translateY(-20%);
            animation: gridMove 12s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        #warp-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.8s ease-in;
        }

        /* LOGIN CARD */
        .card {
            width: 360px;
            padding: 40px;
            background: var(--panel);
            border: 1px solid var(--neon);
            box-shadow: 0 0 40px rgba(0, 255, 156, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
            z-index: 10;
            position: relative;
            clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon);
        }

        /* UPGRADED BIO-SCANNER */
        .scanner-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .retina-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0, 255, 156, 0.1);
            border-radius: 50%;
        }

        /* Lingkaran Loading yang akan berputar & terisi */
        .progress-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top: 3px solid var(--neon);
            border-radius: 50%;
            transition: 0.3s;
            animation: rotate 2s linear infinite;
            display: none; /* muncul saat login */
        }

        .scan-line {
            position: absolute;
            width: 90%;
            height: 2px;
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            top: 0;
            animation: scanning 3s ease-in-out infinite;
        }

        @keyframes scanning {
            0%, 100% { top: 10%; opacity: 0; }
            50% { top: 90%; opacity: 1; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 156, 0.3);
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            letter-spacing: 5px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(0, 255, 156, 0.2);
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 16px;
            background: var(--neon);
            color: #000;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 100%, 0 100%);
        }

        button:active {
            transform: scale(0.96);
        }

        /* TERMINAL */
        #terminal {
            margin-top: 25px;
            font-size: 12px;
            min-height: 20px;
            color: rgba(0, 255, 156, 0.6);
            border-top: 1px solid rgba(0, 255, 156, 0.1);
            padding-top: 15px;
        }

        .alert-error { color: var(--danger); }
        .alert-success { color: #fff; text-shadow: 0 0 10px var(--neon); }

        /* ERROR SHAKE */
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

<div id="warp-overlay"></div>
<div class="grid-bg"></div>

<div class="card" id="loginCard">
    <div class="title">CORE AUTHENTICATION</div>

    <div class="scanner-container">
        <div class="retina-ring"></div>
        <div class="progress-ring" id="ring"></div>
        <div class="scan-line"></div>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.5;">
            <path d="M12 11c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3z"/>
            <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"/>
            <path d="M17 16c0-2.8-2.2-5-5-5s-5 2.2-5 5"/>
        </svg>
    </div>

    <input type="password" id="pass" placeholder="PASSCODE" autocomplete="off" autofocus>

    <button onclick="authProcess()" id="btnMain">INITIALIZE UPLINK</button>
    
    <div id="terminal">> AWAITING_INPUT...</div>
</div>

<script>
    const SECRET = "rabekaojokendor2026";
    const term = document.getElementById("terminal");
    const ring = document.getElementById("ring");
    const card = document.getElementById("loginCard");
    const passInput = document.getElementById("pass");

    function log(msg, type = '') {
        term.innerHTML = `<span class="${type}">> ${msg}</span>`;
    }

    // Suara Beep Sederhana
    function beep(f, d) {
        const a = new (window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator();
        const g = a.createGain();
        o.type = "sine";
        o.frequency.value = f;
        g.gain.value = 0.1;
        o.connect(g);
        g.connect(a.destination);
        o.start();
        o.stop(a.currentTime + d);
    }

    passInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") authProcess();
    });

    async function authProcess() {
        const val = passInput.value;
        if(!val) return;

        // Start Loading UI
        ring.style.display = "block";
        log("SCANNING BIOMETRICS...");
        beep(800, 0.1);

        await new Promise(r => setTimeout(r, 2000));

        if (val === SECRET) {
            log("ACCESS GRANTED. SYNCING...", "alert-success");
            beep(1200, 0.2);
            
            await new Promise(r => setTimeout(r, 800));
            
            // Warp Transition
            document.getElementById("warp-overlay").style.opacity = "1";
            card.style.transform = "scale(2) translateZ(500px)";
            card.style.opacity = "0";
            card.style.transition = "1s ease-in";

            setTimeout(() => {
                localStorage.setItem("auth", "true");
                window.location.href = "dashboard.html";
            }, 1000);

        } else {
            log("CREDENTIAL_ERROR. ACCESS DENIED.", "alert-error");
            beep(200, 0.3);
            ring.style.display = "none";
            card.classList.add("shake");
            setTimeout(() => {
                card.classList.remove("shake");
                passInput.value = "";
            }, 400);
        }
    }
</script>

</body>
</html>
