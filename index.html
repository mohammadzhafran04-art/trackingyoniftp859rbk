<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Edge V5.0 | NEURO-LINK 2065</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.15);
            --danger: #ff003c;
            --bg: #000500;
            --accent: #00e5ff;
            --neural-grid: rgba(0, 255, 65, 0.03);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: var(--neon); font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden; text-transform: uppercase;
        }

        /* 2065 SCANLINE EFFECT */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .background-fx {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(var(--neural-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--neural-grid) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        /* PULSE ANIMATION FOR 2065 SYNC */
        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }
        .sync-pulse { animation: pulse 2s infinite; color: var(--accent); }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
        }

        header {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid var(--neon-dim); padding-bottom: 10px; margin-bottom: 15px;
        }

        .status-panel {
            background: rgba(0, 15, 0, 0.9); border: 1px solid var(--neon);
            flex: 1; display: flex; flex-direction: column; padding: 15px;
            position: relative; backdrop-filter: blur(15px);
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.05);
            clip-path: polygon(0 0, 92% 0, 100% 8%, 100% 100%, 8% 100%, 0 92%);
        }

        .progress-track {
            width: 100%; height: 6px; background: rgba(0, 255, 65, 0.1);
            margin: 20px 0; overflow: hidden; border: 1px solid var(--neon-dim);
        }
        .progress-fill {
            height: 100%; background: var(--neon); width: 0%;
            box-shadow: 0 0 20px var(--neon); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .shutdown-fill { background: var(--danger) !important; box-shadow: 0 0 20px var(--danger) !important; }

        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .hud-item {
            background: rgba(0, 255, 65, 0.03); border-left: 3px solid var(--neon);
            padding: 10px; position: relative;
        }
        .hud-item label { font-size: 8px; color: var(--accent); letter-spacing: 1px; }
        .hud-item span { font-size: 16px; font-family: 'Orbitron'; color: white; display: block; }

        .btn {
            font-family: 'Orbitron'; font-weight: bold; padding: 15px;
            text-transform: uppercase; border: 1px solid var(--neon); cursor: pointer;
            background: rgba(0, 255, 65, 0.05); color: var(--neon);
            transition: all 0.3s;
        }
        .btn:active { transform: scale(0.98); background: var(--neon-dim); }
        .btn-sos { 
            background: rgba(255, 0, 60, 0.15); border-color: var(--danger); color: var(--danger);
            animation: pulse 1s infinite;
        }

        .terminal-log {
            font-size: 10px; color: var(--neon); height: 80px; overflow-y: auto;
            margin-top: 10px; border: 1px solid var(--neon-dim); padding: 10px;
            background: rgba(0,0,0,0.3);
        }

        #commandPopup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; background: var(--danger); color: white; padding: 20px;
            font-family: 'Orbitron'; z-index: 2000; border: 4px double white;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
        }

        .hidden { display: none !important; }

        /* HEART RATE SIMULATOR 2065 */
        .bio-metrics { font-size: 9px; display: flex; gap: 10px; margin-top: 5px; color: var(--accent); }
    </style>
</head>
<body>

<div class="background-fx"></div>

<div id="commandPopup" class="hidden">
    <div style="font-size: 10px; border-bottom: 1px solid white; padding-bottom: 5px; margin-bottom: 10px;">NEURAL OVERRIDE INCOMING</div>
    <div id="commandText" style="font-size: 20px; text-align: center; margin: 15px 0; font-weight: bold;">-- NONE --</div>
    <button onclick="dismissCommand()" style="width: 100%; background:white; border:none; color:black; font-family:'Orbitron'; padding:10px; font-size:12px; font-weight: bold; cursor: pointer;">CONFIRM RECEIPT</button>
</div>

<div class="ui-wrapper">
    <header>
        <div>
            <div style="font-family: 'Orbitron'; font-weight: 700; font-size: 14px; letter-spacing: 2px;">NEURO-LINK <span style="color:white">V5.0</span></div>
            <div id="status-tag" class="sync-pulse" style="font-size: 8px;">QUANTUM_SYNC_ACTIVE</div>
        </div>
        <div style="text-align: right;">
            <div id="clock" style="font-family: 'Orbitron'; font-size: 14px;">00:00:00</div>
            <div style="font-size: 7px; color: var(--accent);">STARDATE 2065.73</div>
        </div>
    </header>

    <div id="loginArea" class="status-panel">
        <div style="text-align: center; margin: 40px 0;">
            <div style="font-size: 12px; letter-spacing: 8px; color: white;">BIO-AUTH</div>
            <div style="font-size: 8px; opacity: 0.5;">WAITING FOR NEURAL HANDSHAKE...</div>
        </div>
        <input type="text" id="idInput" class="btn" style="text-align: center; font-size: 18px; margin-bottom: 20px; border-style: dashed;" placeholder="PILOT_ID" maxlength="12">
        <button class="btn" style="background: var(--neon-dim); border-width: 2px;" onclick="initiateLogin()">SYNC CONSCIOUSNESS</button>
    </div>

    <div id="loadingArea" class="status-panel hidden">
        <div style="text-align: center; margin-top: 30px;">
            <div id="loadMsg" style="font-size: 16px; letter-spacing: 5px; color: white; font-family: 'Orbitron';">SYNCING</div>
            <div class="progress-track">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="subMsg" style="font-size: 9px; color: var(--accent);">MAPPING NEURONS...</div>
            <div class="terminal-log" id="miniLog" style="text-align: left; height: 120px; font-size: 8px; border-color: var(--neon-dim);"></div>
        </div>
    </div>

    <div id="trackingArea" class="status-panel hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 9px;">
            <span id="callsignLabel" style="color: white; border: 1px solid var(--neon); padding: 2px 10px; background: rgba(0,255,65,0.1);">---</span>
            <div class="bio-metrics">
                <span>HR: <b id="heartRate">72</b> BPM</span>
                <span>O2: 98%</span>
            </div>
        </div>
        
        <div class="hud-grid">
            <div class="hud-item"><label>GEO.LAT</label><span id="lat">0.0000</span></div>
            <div class="hud-item"><label>GEO.LON</label><span id="lon">0.0000</span></div>
            <div class="hud-item"><label>VELOCITY</label><span id="spd">0.0</span></div>
            <div class="hud-item"><label>BIO.SIG</label><span style="color: var(--accent);">STABLE</span></div>
            <div class="hud-item" style="grid-column: span 2; background: rgba(0,229,255,0.05); border-left-color: var(--accent);">
                <label>ENVIRONMENTAL DATA</label>
                <span id="alt" style="font-size: 11px;">ALT: 0m | PRE: HIGH_RES</span>
            </div>
        </div>

        <div class="terminal-log" id="logBox">> CORE_LISTENING_ACTIVE...</div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <button class="btn btn-sos" onclick="sendSOS()">SOS</button>
            <button class="btn" style="font-size: 10px;" onclick="initiateTerminate()">LOGOUT</button>
        </div>
    </div>
</div>

    import { getDatabase, ref, set, update, remove, onDisconnect, onValue } from "
