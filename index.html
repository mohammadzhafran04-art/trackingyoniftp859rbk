<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Tracker | YONIF TP 859/RBK</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --army-green: #00ff41;
            --dark-bg: #050a05;
        }

        body {
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--army-green);
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: bold;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 15px var(--army-green);
            top: 0;
            animation: scan 4s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; } 100% { top: 100%; }
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(10, 20, 10, 0.9);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border: 1px solid var(--army-green);
            border-radius: 2px;
            position: relative;
            box-sizing: border-box;
        }

        h2 {
            color: var(--army-green);
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        input {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            background: rgba(0, 40, 0, 0.3);
            border: 1px solid var(--army-green);
            color: var(--army-green);
            font-family: inherit;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--army-green);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 20px var(--army-green);
        }

        #status {
            margin-top: 25px;
            padding: 15px;
            border: 1px dashed var(--army-green);
            text-align: center;
            color: var(--army-green);
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            font-size: 12px;
        }

        .data-box {
            background: rgba(0, 255, 65, 0.1);
            padding: 10px;
            border-left: 3px solid var(--army-green);
        }
    </style>
</head>
<body>

<div class="scan-line"></div>

<div class="header">
    📡 TRANSMITTER LOKASI YONIF TP 859/RBK
</div>

<div class="container">
    <div class="card">
        <h2>UNIT AUTHENTICATION</h2>
        <input type="text" id="nama" placeholder="NAMA / NRP">
        <button id="btnMulai">AKTIFKAN TRACKING</button>
        
        <div id="status">SISTEM SIAP...</div>
        <div id="info"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Fungsi WakeLock agar layar tidak mati
    let wakeLock = null;
    async function requestWakeLock() {
        try {
            wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {
            console.log("WakeLock Gagal");
        }
    }

    // Menjalankan fungsi saat tombol diklik
    document.getElementById('btnMulai').addEventListener('click', () => {
        const nama = document.getElementById("nama").value.trim();
        
        if (!nama) {
            alert("IDENTITAS UNIT WAJIB DIISI!");
            return;
        }

        document.getElementById("status").innerHTML = "MENCARI SINYAL SATELIT...";
        requestWakeLock();

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude, speed, accuracy } = pos.coords;
                const spdKmh = Math.round((speed || 0) * 3.6);

                try {
                    // Kirim ke Firebase
                    await set(ref(db, "live/" + nama), {
                        latitude,
                        longitude,
                        speed: spdKmh,
                        accuracy: Math.round(accuracy),
                        waktu: Date.now(),
                        status: "ONLINE"
                    });

                    document.getElementById("status").innerHTML = "<span style='color:lime'>▣ TRANSMITTING DATA...</span>";
                    document.getElementById("info").innerHTML = `
                        <div class="data-grid">
                            <div class="data-box">LAT: ${latitude.toFixed(5)}</div>
                            <div class="data-box">LON: ${longitude.toFixed(5)}</div>
                            <div class="data-box">SPD: ${spdKmh} KM/H</div>
                            <div class="data-box">ACC: ${Math.round(accuracy)}M</div>
                        </div>
                    `;
                } catch (error) {
                    document.getElementById("status").innerHTML = "<span style='color:red'>FAILED TO UPLOAD DATA</span>";
                    console.error(error);
                }

            }, (err) => {
                document.getElementById("status").innerHTML = "<span style='color:red'>GPS ERROR: " + err.message + "</span>";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        } else {
            alert("GPS Tidak Didukung di HP ini");
        }
    });
</script>
</body>
</html>
