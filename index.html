<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Edge V5.2.2 | 2065 NEURO-LINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --neon-glow: rgba(0, 255, 65, 0.4);
            --neon-dim: rgba(0, 255, 65, 0.1);
            --danger: #ff003c;
            --bg: #000500;
            --accent: #00e5ff;
            --indo-red: #ff003c;
            --panel-bg: rgba(0, 10, 0, 0.9);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: var(--neon); font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden; text-transform: uppercase;
        }

        /* --- BACKGROUND LAYERS --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .indo-map-bg {
            position: fixed; inset: 0; z-index: 0;
            background-image: url('https://raw.githubusercontent.com/mohammadzhafran04-art/trackingyoniftp859rbk/main/IMG_2984%20(1).jpg');
            background-size: cover; background-position: center; opacity: 0.1;
            filter: grayscale(100%) brightness(0.3) sepia(100%) hue-rotate(90deg);
        }

        .scanline {
            width: 100%; height: 100%; z-index: 100; position: fixed; top: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* --- UI WRAPPER (FORCED FRONT) --- */
        .ui-wrapper { 
            position: relative; z-index: 500; /* Pastikan di atas canvas */
            height: 100vh; display: flex; flex-direction: column; 
            padding: 25px; box-sizing: border-box; 
        }

        .status-panel {
            background: var(--panel-bg); border: 1px solid var(--neon);
            flex: 1; display: flex; flex-direction: column; padding: 20px;
            position: relative; backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 92% 0, 100% 8%, 100% 100%, 8% 100%, 0 92%);
            box-shadow: 0 0 20px rgba(0,255,65,0.15);
        }

        /* HUD Frame */
        .hud-corner {
            position: fixed; width: 30px; height: 30px; border: 2px solid var(--neon); z-index: 600;
        }
        .tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
        .br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .hud-item {
            background: rgba(0, 255, 65, 0.05); border-left: 3px solid var(--neon);
            padding: 10px;
        }
        .hud-item label { font-size: 8px; color: var(--accent); display: block; }
        .hud-item span { font-size: 15px; font-weight: bold; font-family: 'Orbitron'; color: #fff; }

        .btn {
            font-family: 'Orbitron'; font-weight: bold; padding: 15px;
            border: 1px solid var(--neon); cursor: pointer;
            background: rgba(0, 255, 65, 0.1); color: var(--neon);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s; width: 100%; margin-top: 10px;
        }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .btn-sos { border-color: var(--danger); color: var(--danger); }

        .terminal-log {
            font-size: 10px; color: var(--neon); height: 80px; overflow-y: auto;
            border-top: 1px solid var(--neon-dim); padding-top: 10px; margin-top: 10px;
        }

        .hidden { display: none !important; }
        
        /* Bar Progress */
        .prog-bar { width: 100%; height: 4px; background: #111; margin: 20px 0; overflow: hidden; }
        #prog-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div class="scanline"></div>
<div class="hud-corner tl"></div><div class="hud-corner tr"></div>
<div class="hud-corner bl"></div><div class="hud-corner br"></div>

<div class="indo-map-bg"></div>
<canvas id="bg-canvas"></canvas>

<div class="ui-wrapper">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div style="border-left: 4px solid var(--indo-red); padding-left: 10px;">
            <div style="font-family: 'Orbitron'; font-size: 18px; font-weight: 700;">
                <span style="color:var(--indo-red)">YONIF</span> 859 RBK
            </div>
            <div style="font-size: 9px; color: var(--accent);">SIGNAL_LINK: <span id="pingVal">STABLE</span></div>
        </div>
        <div style="text-align: right;">
            <div id="clock" style="font-family: 'Orbitron'; color: #fff;">00:00:00</div>
            <div id="batStatus" style="font-size: 8px;">PWR: --%</div>
        </div>
    </header>

    <div id="loginArea" class="status-panel" style="justify-content: center;">
        <div style="text-align: center;">
            <div style="font-size: 10px; letter-spacing: 5px; opacity: 0.6; margin-bottom: 15px;">SECURE ACCESS REQUIRED</div>
            <input type="text" id="idInput" class="btn" style="text-align: center; border-style: dashed;" placeholder="CALLSIGN">
            <button class="btn" onclick="initiateLogin()">INITIALIZE LINK</button>
        </div>
    </div>

    <div id="loadingArea" class="status-panel hidden">
        <div style="text-align: center; margin-top: 40px;">
            <div id="loadMsg" style="font-family: 'Orbitron';">ENCRYPTING...</div>
            <div class="prog-bar"><div id="prog-fill"></div></div>
            <div class="terminal-log" id="miniLog"></div>
        </div>
    </div>

    <div id="trackingArea" class="status-panel hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="callsignLabel" style="background: var(--neon); color: #000; padding: 2px 10px; font-weight: bold;">---</div>
            <div id="heartRate" style="font-family: 'Orbitron'; font-size: 14px;">-- BPM</div>
        </div>

        <div class="hud-grid">
            <div class="hud-item"><label>CORE.LAT</label><span id="lat">0.0000</span></div>
            <div class="hud-item"><label>CORE.LON</label><span id="lon">0.0000</span></div>
            <div class="hud-item"><label>V-VELOCITY</label><span id="spd">0.0 KM/H</span></div>
            <div class="hud-item"><label>HEADING</label><span id="heading">0° N</span></div>
            <div class="hud-item" style="grid-column: span 2;">
                <label>ALTITUDE & ACCURACY</label>
                <span id="alt" style="font-size: 11px;">ALT: 0M | ACC: 0M</span>
            </div>
        </div>

        <div class="terminal-log" id="logBox">> DATASTREAM ACTIVE...</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto;">
            <button class="btn btn-sos" onclick="sendSOS()">S.O.S</button>
            <button class="btn" style="font-size: 10px;" onclick="initiateTerminate()">TERMINATE</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasedatabase.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig), db = getDatabase(app);
    let myCallsign = "", watchId = null;

    // --- CLOCK & BATTERY ---
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        if(myCallsign) document.getElementById('heartRate').innerText = Math.floor(60 + Math.random()*15) + " BPM";
        if(navigator.getBattery) navigator.getBattery().then(b => {
            document.getElementById('batStatus').innerText = `PWR: ${Math.round(b.level*100)}%`;
        });
    }, 1000);

    // --- PANEL SWITCHER ---
    function showPanel(id) {
        ['loginArea', 'loadingArea', 'trackingArea'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    window.initiateLogin = () => {
        const val = document.getElementById('idInput').value.trim().toUpperCase();
        if(!val) return;
        myCallsign = val;
        showPanel('loadingArea');
        runSequence(["BYPASSING_MIL_GATEWAY", "SYNCING_GALILEO_SAT", "LINK_ESTABLISHED"], 60, () => {
            showPanel('trackingArea');
            document.getElementById('callsignLabel').innerText = myCallsign;
            startTracking();
        });
    };

    window.initiateTerminate = () => {
        if(!confirm("DISCONNECT NEURAL LINK?")) return;
        showPanel('loadingArea');
        document.getElementById('loadMsg').innerText = "TERMINATING...";
        runSequence(["WIPING_LOGS", "DISCONNECTING_GPS", "SHUTDOWN"], 40, () => location.reload());
    };

    function runSequence(msgs, speed, cb) {
        let p = 0;
        const fill = document.getElementById('prog-fill'), log = document.getElementById('miniLog');
        log.innerHTML = "";
        const itv = setInterval(() => {
            p += 2; fill.style.width = p + "%";
            let idx = Math.floor((p/100) * msgs.length);
            if(msgs[idx] && !log.innerHTML.includes(msgs[idx])) {
                log.innerHTML += `<div>> ${msgs[idx]}... [OK]</div>`;
            }
            if(p >= 100) { clearInterval(itv); setTimeout(cb, 500); }
        }, speed);
    }

    function startTracking() {
        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude, speed, accuracy, altitude } = p.coords;
                document.getElementById('lat').innerText = latitude.toFixed(4);
                document.getElementById('lon').innerText = longitude.toFixed(4);
                document.getElementById('spd').innerText = (speed ? speed * 3.6 : 0).toFixed(1) + " KM/H";
                document.getElementById('alt').innerText = `ALT: ${Math.round(altitude || 0)}M | ACC: ${Math.round(accuracy)}M`;
                update(ref(db, "live/" + myCallsign), { 
                    lat: latitude, lon: longitude, speed: (speed||0), waktu: serverTimestamp(), sos: false 
                });
            }, null, { enableHighAccuracy: true });
        }
    }

    window.sendSOS = () => {
        update(ref(db, "live/" + myCallsign), { sos: true });
        document.getElementById('logBox').innerHTML += `<br><span style="color:var(--danger)">> SOS_BROADCASTED!</span>`;
    };

    // --- MATRIX BG ---
    const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
    let drops = [];
    function initMatrix() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        drops = Array(Math.floor(canvas.width/20)).fill(1);
    }
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 5, 0, 0.15)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(0, 255, 65, 0.15)"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
            if(y*20 > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
        requestAnimationFrame(drawMatrix);
    }
    initMatrix(); drawMatrix();
    window.addEventListener('resize', initMatrix);
</script>
</body>
</html>
