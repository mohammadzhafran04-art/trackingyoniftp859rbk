<div class="card" id="mainCard">
    <div id="command-display"></div>
    <input type="text" id="nama" placeholder="ENTER CALLSIGN">
    
    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div class="btn-group">
        <button id="btnAktif">ACTIVATE UPLINK</button>
        <button class="sos-btn" id="btnSos">SOS</button>
    </div>
    </div>

<script type="module">
    // ... (Firebase Import tetap sama) ...

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 400 } 
            });
            video.srcObject = stream;
        } catch (err) { console.error("Kamera ditolak/error"); }
    }

    function captureAndUpload(nama) {
        if (video.srcObject) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Img = canvas.toDataURL('image/jpeg', 0.3); // Kompresi agar ringan
            update(ref(db, "live/" + nama), { visual: base64Img });
        }
    }

    // Masukkan startCamera() ke dalam fungsi btnAktif.onclick
    document.getElementById("btnAktif").onclick = async () => {
        const nama = document.getElementById("nama").value;
        if (!nama) return alert("INPUT CALLSIGN!");
        
        await startCamera(); // AKTIFKAN KAMERA SAAT UPLINK DIMULAI

        // Di dalam navigator.geolocation.watchPosition, tambahkan captureAndUpload
        watchId = navigator.geolocation.watchPosition((pos) => {
            // ... (logika update lat/lon yang lama) ...
            
            // TAMBAHKAN INI:
            captureAndUpload(nama); 
        }, ...);
    };
</script>
