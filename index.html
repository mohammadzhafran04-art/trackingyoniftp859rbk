<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker | YONIF 859 RBK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --danger: #ff003c; --bg: #000500; --accent: #00e5ff; --panel-bg: rgba(0, 15, 0, 0.95); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--neon); font-family: 'Share Tech Mono', monospace; height: 100vh; overflow: hidden; text-transform: uppercase; }
        .scanline { width: 100%; height: 100%; z-index: 1000; position: fixed; top: 0; pointer-events: none; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,255,0,0.03)); background-size: 100% 3px, 3px 100%; opacity: 0.5; }
        .ui-wrapper { position: relative; z-index: 1100; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .status-panel { background: var(--panel-bg); border: 1px solid var(--neon); flex: 1; display: flex; flex-direction: column; padding: 20px; backdrop-filter: blur(15px); clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%); box-shadow: inset 0 0 30px rgba(0,255,65,0.1); }
        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .hud-item { background: rgba(0, 255, 65, 0.05); border-left: 3px solid var(--neon); padding: 12px; }
        .hud-item label { font-size: 9px; color: var(--accent); display: block; margin-bottom: 4px; }
        .hud-item span { font-size: 16px; font-weight: bold; font-family: 'Orbitron'; color: #fff; }
        .btn { font-family: 'Orbitron'; padding: 15px; border: 1px solid var(--neon); cursor: pointer; background: rgba(0, 255, 65, 0.1); color: var(--neon); transition: 0.3s; width: 100%; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .btn-sos.active { background: var(--danger); color: #fff; animation: blink 0.5s infinite; }
        .terminal-log { font-size: 10px; height: 100px; overflow-y: auto; border-top: 1px solid rgba(0,255,65,0.2); padding-top: 10px; margin-top: auto; }
        .hidden { display: none !important; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="ui-wrapper">
        <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
            <div style="font-family: 'Orbitron'; font-size: 18px; border-left: 4px solid var(--danger); padding-left: 10px;">YONIF 859 RBK</div>
            <div id="clock" style="font-family: 'Orbitron';">00:00:00</div>
        </header>

        <div id="loginArea" class="status-panel" style="justify-content: center; align-items: center;">
            <input type="text" id="idInput" class="btn" style="text-align: center; margin-bottom: 10px;" placeholder="ENTER CALLSIGN">
            <button class="btn" onclick="initiateLogin()">ESTABLISH LINK</button>
        </div>

        <div id="trackingArea" class="status-panel hidden">
            <div id="callsignLabel" style="background: var(--neon); color: #000; padding: 4px 12px; font-weight: bold; font-family: 'Orbitron'; width: fit-content;">---</div>
            <div class="hud-grid">
                <div class="hud-item"><label>LATITUDE</label><span id="lat">0.0000</span></div>
                <div class="hud-item"><label>LONGITUDE</label><span id="lon">0.0000</span></div>
                <div class="hud-item"><label>SPD (KM/H)</label><span id="spd">0.0</span></div>
                <div class="hud-item"><label>ACCURACY</label><span id="acc">0M</span></div>
            </div>
            <div class="terminal-log" id="logBox">> READY_FOR_UPLINK...</div>
            <button id="sosBtn" class="btn" style="margin-top:10px; border-color:var(--danger); color:var(--danger)" onclick="toggleSOS()">SEND S.O.S</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
            databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "real-time-location-30d91",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myCallsign = "", isSOS = false;

        window.initiateLogin = () => {
            const val = document.getElementById('idInput').value.trim().toUpperCase();
            if(!val) return alert("REQ CALLSIGN");
            myCallsign = val;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('trackingArea').classList.remove('hidden');
            document.getElementById('callsignLabel').innerText = myCallsign;
            startTracking();
        };

        function startTracking() {
            navigator.geolocation.watchPosition(p => {
                const data = {
                    lat: p.coords.latitude, lon: p.coords.longitude,
                    speed: p.coords.speed || 0, waktu: Date.now(),
                    sos: isSOS, accuracy: p.coords.accuracy
                };
                document.getElementById('lat').innerText = data.lat.toFixed(5);
                document.getElementById('lon').innerText = data.lon.toFixed(5);
                document.getElementById('spd').innerText = (data.speed * 3.6).toFixed(1);
                document.getElementById('acc').innerText = Math.round(data.accuracy) + "M";

                update(ref(db, "live/" + myCallsign), data)
                    .then(() => addLog("SYNC_OK"))
                    .catch(e => addLog("ERR_DB"));
            }, e => addLog("GPS_ERR"), { enableHighAccuracy: true });
        }

        window.toggleSOS = () => {
            isSOS = !isSOS;
            document.getElementById('sosBtn').classList.toggle('active', isSOS);
            update(ref(db, "live/" + myCallsign), { sos: isSOS });
        };

        function addLog(m) {
            const b = document.getElementById('logBox');
            b.innerHTML = `<div>> ${m}</div>` + b.innerHTML;
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
