<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Edge V4.0 | NEURAL LINK 2045</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --danger: #ff003c;
            --bg: #000500;
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: var(--neon); font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Message Overlay HUD */
        #msgHUD {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(0, 255, 65, 0.9); color: #000;
            padding: 15px; font-family: 'Orbitron'; font-weight: bold;
            z-index: 2000; display: none; transform: translateY(-100%);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; box-shadow: 0 5px 20px var(--neon);
        }
        #msgHUD.show { display: block; transform: translateY(0); }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
        }

        .status-panel {
            background: rgba(0, 10, 0, 0.9); border: 1px solid var(--neon);
            flex: 1; display: flex; flex-direction: column; padding: 15px;
            backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 92% 0, 100% 8%, 100% 100%, 8% 100%, 0 92%);
        }

        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .hud-item {
            background: rgba(0, 255, 65, 0.05); border-left: 2px solid var(--neon);
            padding: 10px;
        }
        .hud-item label { font-size: 8px; color: var(--accent); display: block; }
        .hud-item span { font-size: 18px; font-family: 'Orbitron'; color: white; }

        .btn-sos {
            background: rgba(255, 0, 60, 0.2); border: 2px solid var(--danger);
            color: var(--danger); font-family: 'Orbitron'; padding: 20px;
            margin-top: auto; font-weight: bold; cursor: pointer;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 60, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 60, 0); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="msgHUD">
    <div style="font-size: 9px;">INCOMING DIRECTIVE</div>
    <div id="msgContent">HOLD POSITION</div>
</div>

<div class="ui-wrapper">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div style="font-family: 'Orbitron'; font-size: 12px;">TACTICAL_EDGE <span id="callsignHeader"></span></div>
        <div id="clock" style="font-size: 14px; color: var(--accent);">00:00</div>
    </header>

    <div id="loginArea" class="status-panel">
        <h2 style="text-align: center; font-family: 'Orbitron';">NEURAL AUTH</h2>
        <input type="text" id="idInput" placeholder="CALLSIGN" style="background:transparent; border:1px solid var(--neon); color:white; padding:15px; text-align:center; font-family:'Orbitron'; font-size:20px; margin-bottom:15px;">
        <button onclick="initiateLogin()" style="background:var(--neon); color:black; border:none; padding:15px; font-family:'Orbitron'; font-weight:bold;">ESTABLISH LINK</button>
    </div>

    <div id="trackingArea" class="status-panel hidden">
        <div class="hud-grid">
            <div class="hud-item"><label>LATITUDE</label><span id="lat">0.0000</span></div>
            <div class="hud-item"><label>LONGITUDE</label><span id="lon">0.0000</span></div>
            <div class="hud-item"><label>SPEED</label><span id="spd">0.0</span> <small>KM/H</small></div>
            <div class="hud-item"><label>HEADING</label><span id="hdg">000°</span></div>
        </div>

        <div id="logBox" style="flex:1; margin-top:15px; font-size:10px; border-top:1px solid var(--neon-dim); padding-top:10px; overflow-y:auto;">
            > ENCRYPTED LINK SECURED...
        </div>

        <button class="btn-sos" onclick="sendSOS()">EMERGENCY SOS</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let myCallsign = "";

    window.initiateLogin = () => {
        myCallsign = document.getElementById('idInput').value.toUpperCase();
        if(!myCallsign) return;
        
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('trackingArea').classList.remove('hidden');
        document.getElementById('callsignHeader').innerText = `[${myCallsign}]`;
        
        startTracking();
        listenForCommands();
    };

    // LISTEN PESAN DARI DASHBOARD
    function listenForCommands() {
        onValue(ref(db, "commands/global"), (snapshot) => {
            const data = snapshot.val();
            if(data && (Date.now() - data.timestamp < 10000)) { // Hanya proses jika pesan baru (10 detik terakhir)
                const hud = document.getElementById('msgHUD');
                const content = document.getElementById('msgContent');
                
                content.innerText = data.text;
                hud.classList.add('show');
                
                if(navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 500]);
                
                setTimeout(() => { hud.classList.remove('show'); }, 7000); // Hilang setelah 7 detik
            }
        });
    }

    function startTracking() {
        navigator.geolocation.watchPosition((p) => {
            const { latitude, longitude, speed, heading } = p.coords;
            
            document.getElementById('lat').innerText = latitude.toFixed(4);
            document.getElementById('lon').innerText = longitude.toFixed(4);
            document.getElementById('spd').innerText = ((speed || 0) * 3.6).toFixed(1);
            document.getElementById('hdg').innerText = (heading || 0).toFixed(0).padStart(3, '0') + "°";

            set(ref(db, "live/" + myCallsign), {
                latitude, longitude, speed: (speed || 0) * 3.6,
                waktu: Date.now(), sos: false
            });
            
            onDisconnect(ref(db, "live/" + myCallsign)).remove();
        }, null, { enableHighAccuracy: true });
    }

    window.sendSOS = () => {
        update(ref(db, "live/" + myCallsign), { sos: true });
        alert("SOS SENT TO COMMAND CENTER!");
    };

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>
</body>
</html>
