<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Edge V3 | YONIF 859/RBK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.2);
            --danger: #ff003c;
            --bg: #010a01;
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: var(--neon); font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden; text-transform: uppercase;
        }

        /* Ambient Background Effects */
        .overlay {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        repeating-linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 100;
        }

        .radar-sweep {
            position: fixed; top: 50%; left: 50%; width: 150vmax; height: 150vmax;
            background: conic-gradient(from 0deg, var(--neon-dim), transparent 40%);
            transform: translate(-50%, -50%); animation: sweep 6s linear infinite;
            z-index: 0; pointer-events: none; opacity: 0.3;
        }
        @keyframes sweep { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* UI Layout */
        .ui-wrapper {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
        }

        header {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-left: 4px solid var(--neon); padding-left: 10px; margin-bottom: 20px;
        }

        .status-panel {
            background: rgba(2, 15, 2, 0.9); border: 1px solid var(--neon);
            flex: 1; display: flex; flex-direction: column; padding: 20px;
            position: relative; clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
            box-shadow: inset 0 0 20px var(--neon-dim);
        }

        /* Login & Biometric Style */
        .bio-scanner {
            width: 80px; height: 80px; border: 2px solid var(--neon);
            margin: 20px auto; position: relative; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
        }
        .bio-scanner::after {
            content: ""; position: absolute; width: 100%; height: 2px;
            background: var(--neon); top: 0; animation: scan 2s ease-in-out infinite;
            box-shadow: 0 0 15px var(--neon);
        }
        @keyframes scan { 0%, 100% { top: 0%; } 50% { top: 100%; } }

        .auth-input {
            background: transparent; border: none; border-bottom: 2px solid var(--neon);
            color: var(--neon); font-family: 'Orbitron'; font-size: 20px;
            text-align: center; width: 100%; padding: 10px; outline: none; margin-bottom: 30px;
        }

        /* HUD Data Grid */
        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .hud-item {
            background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon-dim);
            padding: 10px; position: relative;
        }
        .hud-item label { font-size: 9px; color: var(--accent); display: block; }
        .hud-item span { font-size: 18px; font-family: 'Orbitron'; color: white; }

        /* Buttons */
        .btn {
            font-family: 'Orbitron'; font-weight: bold; padding: 15px;
            text-transform: uppercase; border: 1px solid var(--neon); cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary { background: var(--neon); color: black; }
        .btn-sos { background: var(--danger); color: white; border-color: white; margin-top: 10px; animation: alert 0.5s infinite alternate; }
        @keyframes alert { from { opacity: 1; } to { opacity: 0.5; } }

        .terminal-log {
            font-size: 10px; color: var(--neon); opacity: 0.7;
            height: 80px; overflow-y: auto; margin-top: 15px;
            border-top: 1px solid var(--neon-dim); padding-top: 10px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="overlay"></div>
<div class="radar-sweep"></div>

<div class="ui-wrapper">
    <header>
        <div>
            <div style="font-family: 'Orbitron'; font-weight: bold; font-size: 14px;">TACTICAL EDGE V3</div>
            <div style="font-size: 9px; opacity: 0.8;">ENCRYPTION: AES-256 ACTIVE</div>
        </div>
        <div style="text-align: right;">
            <div id="clock">00:00:00</div>
            <div id="status-tag" style="font-size: 9px; color: var(--accent);">STANDBY</div>
        </div>
    </header>

    <div id="loginArea" class="status-panel">
        <div class="bio-scanner">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 11c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zM12 13c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
        <h3 style="text-align: center; font-family: 'Orbitron'; font-size: 14px;">AUTHORIZATION REQUIRED</h3>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
            <input type="text" id="idInput" class="auth-input" placeholder="CALLSIGN" maxlength="12">
            <button class="btn btn-primary" onclick="connect()">INITIALIZE LINK</button>
        </div>
    </div>

    <div id="trackingArea" class="status-panel hidden">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--neon-dim); padding-bottom: 5px; margin-bottom: 10px;">
            <span id="callsignLabel" style="font-family: 'Orbitron'; color: white;">-</span>
            <span id="battLevel">BAT: --%</span>
        </div>

        <div class="hud-grid">
            <div class="hud-item"><label>LATITUDE</label><span id="lat">0.000</span></div>
            <div class="hud-item"><label>LONGITUDE</label><span id="lon">0.000</span></div>
            <div class="hud-item"><label>HEADING</label><span id="hdg">0°</span></div>
            <div class="hud-item"><label>VELOCITY</label><span id="spd">0</span><small> KM/H</small></div>
        </div>

        <div id="signal-glitch" style="font-size: 10px; margin-bottom: 10px;">SIGNAL: <span style="color:white">STABLE</span></div>

        <div class="terminal-log" id="logBox">> CHANNEL SECURED...<br>> WAITING FOR UPLINK...</div>

        <button class="btn btn-sos" onclick="sendSOS()">PRIORITY SOS</button>
        <button class="btn" style="margin-top: 10px; font-size: 10px; background: transparent; color: gray;" onclick="terminate()">TERMINATE CONNECTION</button>
    </div>

    <div style="text-align: center; font-size: 8px; margin-top: 10px; letter-spacing: 2px;">
        PROPERTY OF YONIF 859/RBK - TACTICAL UNIT
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let watchId = null;
    let myCallsign = "";

    // Utils
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

    navigator.getBattery?.().then(b => {
        const updateB = () => document.getElementById('battLevel').innerText = `BAT: ${Math.round(b.level * 100)}%`;
        updateB(); b.onlevelchange = updateB;
    });

    window.connect = () => {
        const val = document.getElementById('idInput').value.trim().toUpperCase();
        if(!val) return alert("ENTER CALLSIGN!");
        
        myCallsign = val;
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('trackingArea').classList.remove('hidden');
        document.getElementById('callsignLabel').innerText = myCallsign;
        document.getElementById('status-tag').innerText = "ONLINE";
        document.getElementById('status-tag').style.color = "var(--neon)";

        startTracking();
    };

    function startTracking() {
        if ("geolocation" in navigator) {
            watchId = navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude, speed, accuracy, heading } = p.coords;
                const kmh = Math.round((speed || 0) * 3.6);

                document.getElementById('lat').innerText = latitude.toFixed(4);
                document.getElementById('lon').innerText = longitude.toFixed(4);
                document.getElementById('spd').innerText = kmh;
                document.getElementById('hdg').innerText = (heading ? Math.round(heading) : 0) + "°";

                set(ref(db, "live/" + myCallsign), {
                    latitude, longitude, speed: kmh, accuracy: Math.round(accuracy),
                    waktu: Date.now(), sos: false, heading: heading || 0
                });

                onDisconnect(ref(db, "live/" + myCallsign)).remove();
                addLog(`UPLINK SUCCESS: ${latitude.toFixed(3)}, ${longitude.toFixed(3)}`);

            }, (e) => addLog("ERROR: " + e.message), { enableHighAccuracy: true });
        }

        // Add Compass Heading if supported
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientationabsolute', (e) => {
                if(e.alpha) document.getElementById('hdg').innerText = Math.round(360 - e.alpha) + "°";
            });
        }
    }

    window.sendSOS = () => {
        update(ref(db, "live/" + myCallsign), { sos: true });
        addLog("!!! SOS BROADCASTING !!!");
        if(navigator.vibrate) navigator.vibrate([500, 100, 500]);
    };

    window.terminate = () => {
        if(confirm("TERMINATE ALL DATA?")) {
            if(watchId) navigator.geolocation.clearWatch(watchId);
            remove(ref(db, "live/" + myCallsign));
            location.reload();
        }
    };

    function addLog(msg) {
        const box = document.getElementById('logBox');
        box.innerHTML += `<br>> ${msg}`;
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>-
