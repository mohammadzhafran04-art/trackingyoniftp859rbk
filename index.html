<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring Lokasi Satuan</title> 

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background: radial-gradient(circle at top,#0c1a0c,#050805);
color:white;
overflow:hidden;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#0c200c,#132c13);
padding:18px;
text-align:center;
font-size:18px;
letter-spacing:2px;
border-bottom:1px solid #00ff00;
box-shadow:0 0 10px #00ff00;
}

/* CONTAINER */

.container{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */

.card{

background:rgba(15,25,15,0.9);
padding:35px;
width:360px;
border-radius:15px;

border:1px solid #00ff00;

box-shadow:
0 0 15px #00ff00,
0 0 40px rgba(0,255,0,0.2);

backdrop-filter: blur(10px);

animation:fade 1s ease;

}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

h2{
text-align:center;
color:#7CFC00;
margin-bottom:25px;
}

/* INPUT */

input{
width:100%;
padding:14px;
background:#0a120a;
border:1px solid #00ff00;
border-radius:8px;
color:#7CFC00;
font-size:15px;
margin-bottom:18px;
outline:none;
}

input:focus{
box-shadow:0 0 8px #00ff00;
}

/* BUTTON */

button{

width:100%;
padding:14px;
background:linear-gradient(90deg,#0f7a0f,#00ff00);
border:none;
border-radius:8px;

font-weight:bold;
letter-spacing:1px;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 12px #00ff00;

}

/* STATUS */

#status{

margin-top:20px;

text-align:center;

font-size:14px;

color:#7CFC00;

}

/* ONLINE DOT */

.online-dot{

display:inline-block;

width:10px;

height:10px;

background:lime;

border-radius:50%;

margin-left:5px;

box-shadow:0 0 10px lime;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{opacity:1;}

50%{opacity:0.4;}

100%{opacity:1;}

}

/* FOOTER */

.footer{

position:absolute;

bottom:10px;

width:100%;

text-align:center;

font-size:11px;

color:#888;

letter-spacing:1px;

}

</style>

</head>

<body>

<div class="header">

🛰 SISTEM MONITORING LOKASI SATUAN YONIF TP 859/RBK

</div>


<div class="container">

<div class="card">

<h2>TRACKING ANGGOTA</h2>

<input type="text" id="nama" placeholder="Masukkan Nama / Panggilan">

<button onclick="mulaiTracking()">

AKTIFKAN TRACKING

</button>

<div id="status"></div>

</div>

</div>

<div class="footer">

Internal Use Only • Secure Military Tracking System

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",

authDomain: "real-time-location-30d91.firebaseapp.com",

databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "real-time-location-30d91",

storageBucket: "real-time-location-30d91.firebasestorage.app",

messagingSenderId: "1092565406651",

appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


window.mulaiTracking = function(){


const nama = document.getElementById("nama").value;


if(!nama){

alert("Masukkan identitas anggota");

return;

}


document.getElementById("status").innerText="Mengaktifkan GPS...";


navigator.geolocation.watchPosition(


async function(position){


const lat = position.coords.latitude;

const lon = position.coords.longitude;

const speed = position.coords.speed || 0;

const accuracy = position.coords.accuracy;


let alamatLengkap="Lokasi tidak diketahui";


try{


const response = await fetch(

`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`

);


const data = await response.json();

alamatLengkap = data.display_name;


}catch(err){

console.log("Gagal ambil alamat");

}


await set(ref(db,"live/"+nama),{


latitude:lat,

longitude:lon,

alamat:alamatLengkap,


speed:Math.round(speed*3.6),

accuracy:accuracy,

last_update:new Date().toLocaleTimeString(),


waktu:Date.now(),

status:"ONLINE"

});


document.getElementById("status").innerHTML=

"STATUS ONLINE <span class='online-dot'></span>";


},


function(error){

alert("GPS Error: "+error.message);

},


{

enableHighAccuracy:true,

maximumAge:0,

timeout:5000

}


);


};

</script>


</body>
</html>
