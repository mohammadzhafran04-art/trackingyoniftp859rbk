<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracking Yonif TP 859/RBK V5.2.2 | NEURO-LINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.15);
            --danger: #ff003c;
            --bg: #000800; /* Hitam pekat militer */
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: var(--neon); font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden; text-transform: uppercase;
        }

        /* --- LOGO WALLPAPER SYSTEM (FIXED LAYER) --- */
        .wallpaper-engine {
            position: fixed;
            inset: 0;
            z-index: 0; /* Di atas background hitam */
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .logo-main {
            width: 85vw;
            max-width: 450px;
            height: auto;
            opacity: 0.25; /* Transparansi logo */
            filter: drop-shadow(0 0 15px var(--neon-dim)) saturate(1.3);
            animation: corePulse 6s infinite ease-in-out;
        }

        @keyframes corePulse {
            0%, 100% { transform: scale(1); opacity: 0.2; filter: blur(1px); }
            50% { transform: scale(1.05); opacity: 0.35; filter: blur(0px); }
        }

        #bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.5; }

        .scanline {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 65, 0.03) 50%);
            background-size: 100% 4px; z-index: 100; pointer-events: none;
        }

        /* UI WRAPPER HARUS DI ATAS SEMUA (z-index: 10) */
        .ui-wrapper {
            position: relative; 
            z-index: 10; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 25px; 
            box-sizing: border-box;
        }

        header {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid var(--neon-dim); padding-bottom: 10px; margin-bottom: 15px;
            text-shadow: 0 0 10px var(--neon);
        }

        .status-panel {
            background: rgba(0, 15, 0, 0.7); /* Transparan dikit biar logo tembus */
            border: 1px solid var(--neon-dim);
            flex: 1; display: flex; flex-direction: column; padding: 20px;
            position: relative; backdrop-filter: blur(4px);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        .progress-track { width: 100%; height: 4px; background: rgba(0, 255, 65, 0.1); margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 20px var(--neon); }

        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hud-item {
            background: rgba(0, 255, 65, 0.05); border: 1px solid rgba(0, 255, 65, 0.2);
            border-left: 4px solid var(--neon); padding: 12px;
        }
        .hud-item label { font-size: 8px; color: var(--accent); display: block; margin-bottom: 5px; }
        .hud-item span { font-size: 15px; font-family: 'Orbitron'; color: white; }

        .btn {
            font-family: 'Orbitron'; font-weight: bold; padding: 18px;
            text-transform: uppercase; border: 1px solid var(--neon); cursor: pointer;
            background: rgba(0, 255, 65, 0.1); color: var(--neon); transition: all 0.3s;
        }
        .btn:active { transform: scale(0.95); background: var(--neon-dim); }

        .terminal-log {
            font-size: 11px; color: var(--neon); height: 100px; overflow-y: auto;
            margin-top: 15px; border: 1px solid var(--neon-dim); padding: 12px;
            background: rgba(0,0,0,0.5); scrollbar-width: none;
        }

        .hidden { display: none !important; }
        .sync-pulse { animation: pulse 2s infinite; color: var(--accent); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* Corner Accents */
        .corner { position: fixed; width: 30px; height: 30px; border: 2px solid var(--neon); z-index: 100; opacity: 0.5; }
        .top-l { top: 15px; left: 15px; border-right: none; border-bottom: none; }
        .top-r { top: 15px; right: 15px; border-left: none; border-bottom: none; }
        .bot-l { bottom: 15px; left: 15px; border-right: none; border-top: none; }
        .bot-r { bottom: 15px; right: 15px; border-left: none; border-top: none; }
    </style>
</head>
<body>

<div class="wallpaper-engine">
    <img src="https://raw.githubusercontent.com/mohammadzhafran04-art/trackingyoniftp859rbk/main/IMG_2984%20(1).jpg" class="logo-main" alt="RBK LOGO">
</div>

<canvas id="bg-canvas"></canvas>
<div class="scanline"></div>

<div class="corner top-l"></div><div class="corner top-r"></div>
<div class="corner bot-l"></div><div class="corner bot-r"></div>

<div class="ui-wrapper">
    <header>
        <div>
            <div style="font-family: 'Orbitron'; font-weight: 700; font-size: 16px; letter-spacing: 2px;">Yonif TP 859/RBK <span style="color:white; opacity:0.7">TACTICAL</span></div>
            <div id="status-tag" class="sync-pulse" style="font-size: 9px; font-weight: bold;">LINK_STABLE_V5.2.2</div>
        </div>
        <div style="text-align: right;">
            <div id="clock" style="font-family: 'Orbitron'; font-size: 15px; color: white;">00:00:00</div>
            <div style="font-size: 8px; color: var(--accent); letter-spacing: 1px;">OPS_LOCAL_TIME</div>
        </div>
    </header>

    <div id="loginArea" class="status-panel">
        <div style="text-align: center; margin: 60px 0;">
            <div style="font-size: 18px; letter-spacing: 8px; color: white; margin-bottom: 10px; font-family: 'Orbitron';">AUTHENTICATION</div>
            <div style="font-size: 9px; color: var(--accent);">WAITING FOR BIOMETRIC HANDSHAKE...</div>
        </div>
        <input type="text" id="idInput" class="btn" style="text-align: center; font-size: 20px; margin-bottom: 25px; border-style: dashed;" placeholder="ENTER_CALLSIGN" maxlength="12">
        <button class="btn" style="border-width: 2px; font-size: 16px;" onclick="initiateLogin()">ESTABLISH LINK</button>
    </div>

    <div id="loadingArea" class="status-panel hidden">
        <div style="text-align: center; margin-top: 40px;">
            <div id="loadMsg" style="font-size: 18px; letter-spacing: 6px; color: white; font-family: 'Orbitron';">SYNCING...</div>
            <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
            <div class="terminal-log" id="miniLog" style="text-align: left; height: 160px; font-size: 9px; opacity: 0.8;"></div>
        </div>
    </div>

    <div id="trackingArea" class="status-panel hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span id="callsignLabel" style="color: #000; border: 1px solid var(--neon); padding: 5px 15px; background: var(--neon); font-weight: bold; font-family: 'Orbitron'; font-size: 12px;">---</span>
            <div style="display: flex; gap: 15px; color: var(--accent); font-size: 10px; align-items: center;">
                <span>VITAL_HR: <b id="heartRate" style="color:white">--</b></span>
                <span style="border: 1px solid var(--accent); padding: 2px 6px;">WAKE: ON</span>
            </div>
        </div>
        
        <div class="hud-grid">
            <div class="hud-item"><label>LATITUDE</label><span id="lat">0.00000</span></div>
            <div class="hud-item"><label>LONGITUDE</label><span id="lon">0.00000</span></div>
            <div class="hud-item"><label>VELOCITY</label><span id="spd">0.0 KM/H</span></div>
            <div class="hud-item"><label>SIGNAL</label><span id="coreStatus" style="color: var(--neon);">EXCELLENT</span></div>
        </div>

        <div class="terminal-log" id="logBox">> SYSTEM_READY...</div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
            <button class="btn" style="background:rgba(255,0,0,0.1); color:#ff003c; border-color:#ff003c;">MAYDAY</button>
            <button class="btn" style="font-size: 11px; border-color: rgba(255,255,255,0.3); color: white;" onclick="initiateTerminate()">EXIT LINK</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91"
    };

    let app = initializeApp(firebaseConfig);
    let db = getDatabase(app);
    let myCallsign = "";

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); 
        if(myCallsign) document.getElementById('heartRate').innerText = Math.floor(Math.random() * (85 - 65) + 65);
    }, 1000);

    window.initiateLogin = () => {
        myCallsign = document.getElementById('idInput').value.trim().toUpperCase();
        if(!myCallsign) return alert("REQUIRED: CALLSIGN");
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('loadingArea').classList.remove('hidden');
        runSequence(["BOOTING NEURAL KERNEL...", "SYNCHRONIZING GEODATA...", "ACCESS GRANTED."], 40, () => {
            document.getElementById('loadingArea').classList.add('hidden');
            document.getElementById('trackingArea').classList.remove('hidden');
            document.getElementById('callsignLabel').innerText = myCallsign;
            startTracking();
        });
    };

    window.initiateTerminate = () => {
        if(!confirm("TERMINATE CONNECTION?")) return;
        document.getElementById('trackingArea').classList.add('hidden');
        document.getElementById('loadingArea').classList.remove('hidden');
        document.getElementById('loadMsg').innerText = "TERMINATING...";
        runSequence(["DE-ENCRYPTING...", "LINK SEVERED."], 80, () => location.reload());
    };

    function runSequence(msgs, speed, cb) {
        let p = 0;
        let bar = document.getElementById('progressFill');
        let timer = setInterval(() => {
            p++; bar.style.width = p + "%";
            if(p >= 100) { clearInterval(timer); setTimeout(cb, 500); }
        }, speed);
    }

    function startTracking() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude } = p.coords;
                document.getElementById('lat').innerText = latitude.toFixed(6);
                document.getElementById('lon').innerText = longitude.toFixed(6);
                update(ref(db, "live/" + myCallsign), { lat: latitude, lon: longitude, waktu: Date.now() });
            });
        }
    }

    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = Array.from({length: 25}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        s: Math.random() * 2, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3
    }));
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(0,255,65,0.3)";
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
