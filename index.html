<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>859/RBK - UNIT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --danger: #ff003c; --bg: #020802; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Share Tech Mono'; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 15px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 12px; }
        .card { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #map { height: 150px; border: 1px solid var(--neon); filter: invert(1) hue-rotate(80deg); }
        input, button { width: 100%; padding: 15px; background: #000; border: 1px solid var(--neon); color: var(--neon); font-family: 'Orbitron'; font-weight: bold; box-sizing: border-box; }
        button { background: var(--neon); color: #000; margin-top: 5px; }
        .sos { background: none; color: var(--danger); border-color: var(--danger); }
        .alert-bg { animation: alert 0.5s infinite alternate; }
        @keyframes alert { from { background: rgba(150,0,0,0.5); } to { background: #000; } }
    </style>
</head>
<body id="body">
    <div class="header">
        <div>UNIT_859/RBK</div>
        <div id="bat">BAT: --%</div>
    </div>
    <div class="card">
        <div id="map"></div>
        <div id="msg" style="background:#ffaa00; color:#000; padding:10px; display:none; font-weight:bold; text-align:center;"></div>
        <input type="text" id="nama" placeholder="ENTER CALLSIGN">
        <button id="start">ACTIVATE UPLINK</button>
        <button id="sos" class="sos">SOS EMERGENCY</button>
        <div style="font-size:10px; display:flex; justify-content:space-between; margin-top:10px;">
            <span>LAT/LON: <span id="co">0,0</span></span>
            <span>SPD: <span id="sp">0</span> KM/H</span>
        </div>
    </div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let isSOS = false, siren = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3'); siren.loop = true;

    if(navigator.getBattery) navigator.getBattery().then(b => {
        const u = () => document.getElementById('bat').innerText = `BAT: ${Math.round(b.level*100)}%`;
        u(); b.onlevelchange = u;
    });

    document.getElementById('start').onclick = async () => {
        const n = document.getElementById('nama').value;
        if(!n) return alert("Callsign required!");
        
        document.getElementById('start').innerText = "UPLINK ACTIVE";
        document.getElementById('start').disabled = true;

        if('wakeLock' in navigator) await navigator.wakeLock.request('screen');

        onValue(ref(db, `live/${n}/command`), s => {
            const c = s.val();
            if(!c) return;
            if(c === "ALARM_ON") { siren.play(); document.getElementById('body').classList.add('alert-bg'); }
            else if(c === "ALARM_OFF") { siren.pause(); document.getElementById('body').classList.remove('alert-bg'); }
            else { 
                document.getElementById('msg').innerText = "HQ: " + c; 
                document.getElementById('msg').style.display = 'block';
                const ut = new SpeechSynthesisUtterance(c); window.speechSynthesis.speak(ut);
            }
        });

        navigator.geolocation.watchPosition(p => {
            const { latitude, longitude, speed } = p.coords;
            const kmh = Math.round(speed * 3.6 || 0);
            document.getElementById('co').innerText = `${latitude.toFixed(4)},${longitude.toFixed(4)}`;
            document.getElementById('sp').innerText = kmh;

            update(ref(db, `live/${n}`), {
                lat: latitude, lon: longitude, speed: kmh,
                battery: document.getElementById('bat').innerText,
                status: isSOS ? 'DANGER_SOS' : 'ACTIVE', waktu: Date.now()
            });
        }, null, {enableHighAccuracy:true});
    };

    document.getElementById('sos').onclick = () => { isSOS = !isSOS; };
</script>
</body>
</html>
