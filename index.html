<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Edge | YONIF TP 859/RBK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --danger: #ff003c;
            --dark: #020802;
            --panel: rgba(2, 12, 2, 0.9);
        }

        body {
            margin: 0; padding: 0;
            background: var(--dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
            z-index: 999; background-size: 100% 2px, 2px 100%; pointer-events: none;
        }

        .top-nav {
            padding: 15px;
            background: var(--panel);
            border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Orbitron'; font-size: 12px;
        }

        .main-container {
            flex: 1;
            display: flex; flex-direction: column;
            padding: 20px; gap: 15px;
            justify-content: center;
        }

        .status-card {
            background: var(--panel);
            border: 1px solid var(--neon);
            padding: 20px;
            box-shadow: 0 0 20px var(--neon-dim);
            position: relative;
        }

        .auth-group input {
            width: 100%; padding: 15px; margin-bottom: 10px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--neon);
            color: var(--neon); font-family: 'Orbitron';
            text-align: center; box-sizing: border-box;
        }

        .btn {
            width: 100%; padding: 18px;
            font-family: 'Orbitron'; font-weight: bold;
            text-transform: uppercase; border: none; cursor: pointer;
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn-primary { background: var(--neon); color: black; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px; }

        .sos-btn {
            background: transparent; border: 2px solid var(--danger);
            color: var(--danger); padding: 10px; font-family: 'Orbitron';
            animation: blink 1s infinite; margin-top: 20px;
        }

        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.3; background: var(--danger); color: white; } 
        }

        .telemetry-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;
        }

        .tele-item {
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 10px; font-size: 14px; background: rgba(0,0,0,0.5);
        }

        .label { color: var(--neon); font-size: 10px; display: block; margin-bottom: 5px; }

        .hidden { display: none !important; }

        #battery-level { color: var(--neon); }
    </style>
</head>
<body>

<nav class="top-nav">
    <div>SYS: ACTIVE</div>
    <div id="clock">00:00:00</div>
    <div id="battery-status">BAT: <span id="battery-level">--%</span></div>
</nav>

<div class="main-container">
    
    <div id="authArea" class="status-card">
        <h3 style="text-align:center; margin-top:0; color:var(--neon); font-family:'Orbitron'">UNIT AUTHENTICATION</h3>
        <div class="auth-group">
            <input type="text" id="nama" placeholder="CALLSIGN / NRP" maxlength="20">
            <button class="btn btn-primary" id="btnConnect">INITIATE LINK</button>
        </div>
    </div>

    <div id="trackingArea" class="status-card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h3 id="displayNama" style="margin:0; color:var(--neon)">-</h3>
            <div id="signalPulse" style="width:12px; height:12px; background:var(--neon); border-radius:50%"></div>
        </div>
        
        <div class="telemetry-grid">
            <div class="tele-item">
                <span class="label">LATITUDE</span>
                <span id="lat">-</span>
            </div>
            <div class="tele-item">
                <span class="label">LONGITUDE</span>
                <span id="lon">-</span>
            </div>
            <div class="tele-item">
                <span class="label">SPEED</span>
                <span id="spd">0</span> KM/H
            </div>
            <div class="tele-item">
                <span class="label">ACCURACY</span>
                <span id="acc">0</span> M
            </div>
        </div>

        <button class="btn sos-btn" id="btnSOS">SEND EMERGENCY SOS</button>
        <button class="btn btn-danger" id="btnDisconnect">TERMINATE & WIPE DATA</button>
    </div>

    <div style="text-align:center; font-size:10px; opacity:0.5; letter-spacing:2px">
        SECURE ENCRYPTED CHANNEL 859-RBK
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let watchId = null;
    let currentCallsign = "";

    // Clock & Battery
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    navigator.getBattery?.().then(batt => {
        const updateBatt = () => document.getElementById('battery-level').innerText = Math.round(batt.level * 100) + "%";
        updateBatt();
        batt.addEventListener('levelchange', updateBatt);
    });

    // Connect Function
    document.getElementById('btnConnect').onclick = () => {
        const nameInput = document.getElementById('nama').value.trim().toUpperCase();
        if(!nameInput) return alert("INPUT CALLSIGN!");

        currentCallsign = nameInput;
        startTracking();
        
        document.getElementById('authArea').classList.add('hidden');
        document.getElementById('trackingArea').classList.remove('hidden');
        document.getElementById('displayNama').innerText = currentCallsign;
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
    };

    function startTracking() {
        if ("geolocation" in navigator) {
            watchId = navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude, speed, accuracy } = pos.coords;
                
                // Update UI
                document.getElementById('lat').innerText = latitude.toFixed(5);
                document.getElementById('lon').innerText = longitude.toFixed(5);
                document.getElementById('spd').innerText = Math.round((speed || 0) * 3.6);
                document.getElementById('acc').innerText = Math.round(accuracy);

                // Update Firebase
                await set(ref(db, "live/" + currentCallsign), {
                    latitude, longitude, 
                    speed: Math.round((speed || 0) * 3.6),
                    accuracy: Math.round(accuracy),
                    waktu: Date.now(),
                    status: "ONLINE",
                    sos: false
                });

                // Auto-delete on disconnect (tab closed)
                onDisconnect(ref(db, "live/" + currentCallsign)).remove();

            }, (err) => console.error(err), { enableHighAccuracy: true });
        }
    }

    // SOS Button
    document.getElementById('btnSOS').onclick = () => {
        set(ref(db, `live/${currentCallsign}/sos`), true);
        alert("SOS SIGNAL SENT TO HQ!");
        if(navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
    };

    // Disconnect & Wipe (FITUR UTAMA YANG DIMINTA)
    document.getElementById('btnDisconnect').onclick = async () => {
        if(confirm("TERMINATE CONNECTION & WIPE DATA?")) {
            if(watchId) navigator.geolocation.clearWatch(watchId);
            
            // Hapus data dari Firebase sehingga hilang dari dashboard
            await remove(ref(db, "live/" + currentCallsign));
            
            // Reset UI
            document.getElementById('authArea').classList.remove('hidden');
            document.getElementById('trackingArea').classList.add('hidden');
            document.getElementById('nama').value = "";
            
            alert("CONNECTION TERMINATED. DATA WIPED.");
            if(navigator.vibrate) navigator.vibrate(500);
        }
    };
</script>
</body>
</html>
