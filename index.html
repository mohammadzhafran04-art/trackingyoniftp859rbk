<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Tracker | YONIF TP 859/RBK</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --army-green: #00ff41;
            --dark-bg: #050a05;
            --glass: rgba(0, 255, 65, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--army-green);
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 15px var(--army-green);
            top: 0;
            animation: scan 4s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; } 100% { top: 100%; }
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(10, 20, 10, 0.9);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border: 1px solid var(--army-green);
            border-radius: 2px;
            position: relative;
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        .card::before {
            content: "SECURE LINK ACTIVE";
            position: absolute;
            top: 5px;
            right: 20px;
            font-size: 10px;
            color: var(--army-green);
            opacity: 0.5;
        }

        h2 {
            color: var(--army-green);
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        input {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            background: rgba(0, 40, 0, 0.3);
            border: 1px solid var(--army-green);
            color: var(--army-green);
            font-family: inherit;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: inset 0 0 10px var(--army-green);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--army-green);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 20px var(--army-green);
        }

        #status {
            margin-top: 25px;
            padding: 15px;
            border: 1px dashed var(--army-green);
            text-align: center;
            min-height: 50px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            font-size: 12px;
        }

        .data-box {
            background: rgba(0, 255, 65, 0.1);
            padding: 10px;
            border-left: 3px solid var(--army-green);
        }
    </style>
</head>
<body>

<div class="scan-line"></div>

<div class="header">
    📡 TRANSMITTER LOKASI SATUAN YONIF TP 859/RBK
</div>

<div class="container">
    <div class="card">
        <h2>ID AUTHENTICATION</h2>
        <input type="text" id="nama" placeholder="MASUKKAN NAMA / NRP">
        <button onclick="mulaiTracking()">INITIATE LINK</button>
        
        <div id="status">WAITING FOR UPLINK...</div>
        <div id="info"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey:"AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain:"real-time-location-30d91.firebaseapp.com",
        databaseURL:"https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:"real-time-location-30d91",
        storageBucket:"real-time-location-30d91.firebasestorage.app",
        messagingSenderId:"1092565406651",
        appId:"1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.mulaiTracking = function() {
        const nama = document.getElementById("nama").value;
        if(!nama) { alert("IDENTITAS WAJIB DIISI!"); return; }

        document.getElementById("status").innerHTML = "SATELLITE LOCKING...";
        
        navigator.geolocation.watchPosition(async (pos) => {
            const { latitude, longitude, speed, accuracy } = pos.coords;
            const spd = Math.round((speed || 0) * 3.6);

            await set(ref(db, "live/" + nama), {
                latitude, longitude, speed: spd, accuracy,
                waktu: Date.now(), status: "ONLINE"
            });

            document.getElementById("status").innerHTML = "<span style='color:lime'>▣ SIGNAL ACQUIRED - TRANSMITTING</span>";
            document.getElementById("info").innerHTML = `
                <div class="data-grid">
                    <div class="data-box">LAT: ${latitude.toFixed(4)}</div>
                    <div class="data-box">LON: ${longitude.toFixed(4)}</div>
                    <div class="data-box">SPD: ${spd} KM/H</div>
                    <div class="data-box">ACC: ${accuracy.toFixed(0)}M</div>
                </div>
            `;
        }, (err) => alert(err.message), { enableHighAccuracy: true });
    }
</script>
</body>
</html>
