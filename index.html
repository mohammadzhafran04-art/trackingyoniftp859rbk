<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Command - 859/RBK</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --danger: #ff003c;
            --bg: #020802;
            --glass: rgba(0, 30, 0, 0.7);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Scanline Overlay */
        body::before {
            content: "";
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        .header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon);
            background: rgba(0,20,0,0.9);
            z-index: 1100;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            overflow-y: auto;
            z-index: 100;
        }

        /* Card Section */
        .card {
            background: var(--glass);
            border: 1px solid var(--neon);
            padding: 20px;
            backdrop-filter: blur(10px);
            position: relative;
            box-shadow: 0 0 20px rgba(0,255,65,0.1);
        }

        #map {
            width: 100%;
            height: 300px; /* Ukuran peta */
            border: 1px solid var(--neon);
            filter: brightness(0.8) hue-rotate(80deg) invert(1); /* Efek Peta Taktis Gelap */
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon);
            padding: 10px;
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }

        button {
            flex: 2;
            padding: 12px;
            background: var(--neon);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        .sos-btn {
            flex: 1;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        #info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            font-size: 11px;
        }

        .info-box {
            background: rgba(0,255,0,0.05);
            padding: 5px 8px;
            border: 1px solid rgba(0,255,0,0.2);
        }

        .label { color: rgba(0,255,0,0.5); font-size: 9px; display: block; }

        /* SOS Animation */
        .emergency-active {
            animation: dangerAlert 0.5s infinite alternate;
            background: rgba(50, 0, 0, 0.8) !important;
        }
        @keyframes dangerAlert {
            from { border-color: var(--danger); box-shadow: 0 0 5px var(--danger); }
            to { border-color: #fff; box-shadow: 0 0 20px var(--danger); }
        }

        .leaflet-container { background: #000 !important; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-family: 'Orbitron'; font-size: 13px;">COMMAND_CORE: 859/RBK</div>
    <div style="font-size: 11px;">
        <span id="bat-val">BAT: --%</span> | <span id="net-val">NET: ONLINE</span>
    </div>
</div>

<div class="container">
    <div id="map"></div>

    <div class="card" id="mainCard">
        <input type="text" id="nama" placeholder="ENTER CALLSIGN" autocomplete="off">

        <div class="btn-group">
            <button onclick="mulaiTracking()">ACTIVATE UPLINK</button>
            <button class="sos-btn" onclick="sendSOS()">SOS</button>
        </div>

        <div id="info-panel">
            <div class="info-box"><span class="label">COORDINATES</span><span id="coord-val">0, 0</span></div>
            <div class="info-box"><span class="label">SPEED</span><span id="speed-val">0 KM/H</span></div>
            <div class="info-box"><span class="label">ACCURACY</span><span id="acc-val">0 M</span></div>
            <div class="info-box"><span class="label">STATUS</span><span id="status-text">IDLE</span></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Initialize Map
    const map = L.map('map').setView([-2.5489, 118.0149], 5); // Default Indonesia
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let marker = L.circleMarker([0, 0], {
        radius: 10,
        fillColor: "#00ff41",
        color: "#fff",
        weight: 2,
        opacity: 1,
        fillOpacity: 0.8
    }).addTo(map);

    let isSOS = false;
    let userBattery = "N/A";
    let wakeLock = null;

    // Battery API
    if(navigator.getBattery) {
        navigator.getBattery().then(bat => {
            const updateBat = () => {
                userBattery = Math.round(bat.level * 100) + "%";
                document.getElementById('bat-val').innerText = `BAT: ${userBattery}`;
            };
            updateBat();
            bat.addEventListener('levelchange', updateBat);
        });
    }

    // SOS Logic
    window.sendSOS = function() {
        isSOS = !isSOS;
        const nama = document.getElementById("nama").value || "UNKNOWN_UNIT";
        const card = document.getElementById("mainCard");
        
        if(isSOS) {
            card.classList.add('emergency-active');
            marker.setStyle({fillColor: '#ff003c'});
            update(ref(db, "live/" + nama), { status: "DANGER_SOS" });
        } else {
            card.classList.remove('emergency-active');
            marker.setStyle({fillColor: '#00ff41'});
            update(ref(db, "live/" + nama), { status: "ACTIVE" });
        }
    }

    // Tracking Logic
    window.mulaiTracking = async function() {
        const nama = document.getElementById("nama").value;
        if (!nama) return alert("INPUT CALLSIGN!");

        // Request WakeLock
        try {
            if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        } catch (e) {}

        document.getElementById("status-text").innerText = "CONNECTING...";

        navigator.geolocation.watchPosition(
            (pos) => {
                const { latitude, longitude, speed, accuracy } = pos.coords;
                const kmh = Math.round(speed * 3.6 || 0);

                // Update UI
                document.getElementById('coord-val').innerText = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
                document.getElementById('speed-val').innerText = `${kmh} KM/H`;
                document.getElementById('acc-val').innerText = `${Math.round(accuracy)} M`;
                document.getElementById('status-text').innerText = isSOS ? "DANGER" : "ACTIVE";

                // Update Map
                const newPos = [latitude, longitude];
                marker.setLatLng(newPos);
                map.setView(newPos, 16);

                // Update Firebase
                update(ref(db, "live/" + nama), {
                    lat: latitude,
                    lon: longitude,
                    speed: kmh,
                    accuracy: accuracy,
                    battery: userBattery,
                    status: isSOS ? "DANGER_SOS" : "ACTIVE",
                    last_seen: Date.now()
                });
            },
            (err) => alert("GPS Error: " + err.message),
            { enableHighAccuracy: true }
        );
    };

    // Auto-reconnect WakeLock
    document.addEventListener("visibilitychange", async () => {
        if (wakeLock !== null && document.visibilityState === "visible") {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    });
</script>

</body>
</html>
