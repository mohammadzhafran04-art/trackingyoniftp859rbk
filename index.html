<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLINK - 859/RBK</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff41">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2092/2092215.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ff41; --danger: #ff003c; --bg: #010a01; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Share Tech Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid var(--neon); background: rgba(0,15,0,0.9); display: flex; justify-content: space-between; align-items: center; }
        .container { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px; overflow-y: auto; }
        #map { width: 100%; min-height: 180px; border: 1px solid var(--neon); filter: brightness(0.6) hue-rotate(85deg) invert(0.9); }
        .card { background: rgba(0, 40, 0, 0.3); border: 1px solid var(--neon); padding: 15px; backdrop-filter: blur(5px); }
        input { width: 100%; background: #000; border: 1px solid var(--neon); padding: 12px; color: var(--neon); margin-bottom: 10px; box-sizing: border-box; text-align: center; font-family: 'Orbitron'; outline: none; }
        button { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase; margin-bottom: 5px; }
        button:disabled { background: #1a331a; color: #004400; }
        .status-box { font-size: 11px; margin-top: 10px; border-top: 1px solid rgba(0,255,65,0.2); padding-top: 10px; }
        #webcam { width: 100%; border: 1px solid var(--neon); margin-top: 10px; display: none; background: #000; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-family:'Orbitron'; font-size:12px;">UNIT_UPLINK_v3.0</div>
    <div id="bat-val">BAT: --%</div>
</div>

<div class="container">
    <div id="map"></div>
    
    <div class="card">
        <input type="text" id="nama" placeholder="CALLSIGN_ANGGOTA">
        <button id="btnAktif">ESTABLISH PERSISTENT UPLINK</button>
        
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <div class="status-box">
            <div id="stat-text">SYSTEM: <span style="color:red">OFFLINE</span></div>
            <div id="pos-text">COORD: 0.00000, 0.00000</div>
            <div id="wakelock-text" style="color: grey;">WAKE_LOCK: INACTIVE</div>
            <div id="cam-text" style="color: grey;">VISUAL: DISABLED</div>
        </div>
    </div>
</div>

<audio id="silentMode" loop>
    <source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3">
</audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let wakeLock = null;
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');

    async function activateWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('wakelock-text').innerText = "WAKE_LOCK: ACTIVE";
                document.getElementById('wakelock-text').style.color = "var(--neon)";
            } catch (err) { console.log(err); }
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 320 } 
            });
            video.srcObject = stream;
            video.style.display = "block";
            document.getElementById('cam-text').innerText = "VISUAL: STREAMING";
            document.getElementById('cam-text').style.color = "var(--neon)";
        } catch (err) {
            document.getElementById('cam-text').innerText = "VISUAL: ERROR/DENIED";
        }
    }

    function captureAndUpload(nama) {
        if (video.srcObject) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Img = canvas.toDataURL('image/jpeg', 0.4); // Kompresi agar ringan
            update(ref(db, "live/" + nama), { visual: base64Img });
        }
    }

    const map = L.map('map', { zoomControl: false }).setView([0,0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let marker = L.circleMarker([0, 0], {radius: 8, fillColor: "#00ff41", color: "#fff", weight: 2, fillOpacity: 1}).addTo(map);

    document.getElementById("btnAktif").onclick = async () => {
        const nama = document.getElementById("nama").value.trim().toUpperCase();
        if (!nama) return alert("REQUIRED: CALLSIGN");

        document.getElementById('silentMode').play();
        await activateWakeLock();
        await startCamera();

        document.getElementById("btnAktif").disabled = true;
        document.getElementById("btnAktif").innerText = "UPLINK_LIVE";
        document.getElementById("btnAktif").classList.add("blink");

        onValue(ref(db, ".info/connected"), (snap) => {
            document.getElementById('stat-text').innerHTML = snap.val() ? 
                'SYSTEM: <span style="color:var(--neon)">ONLINE</span>' : 
                'SYSTEM: <span style="color:orange">RECONNECTING...</span>';
        });

        navigator.geolocation.watchPosition((pos) => {
            const { latitude, longitude, speed } = pos.coords;
            marker.setLatLng([latitude, longitude]);
            map.setView([latitude, longitude], 16);
            document.getElementById('pos-text').innerText = `COORD: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;

            update(ref(db, "live/" + nama), {
                lat: latitude, lon: longitude, speed: Math.round(speed * 3.6 || 0), waktu: Date.now()
            });

            captureAndUpload(nama); // Kirim foto tiap kali posisi berubah
        }, null, { enableHighAccuracy: true });
    };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
