<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Tactical - 859/RBK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --danger: #ff003c; --bg: #020802; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Share Tech Mono'; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--neon); background: rgba(0,20,0,0.9); }
        .container { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        #map { width: 100%; height: 200px; border: 1px solid var(--neon); filter: invert(1) hue-rotate(80deg); }
        .card { background: rgba(0,30,0,0.7); border: 1px solid var(--neon); padding: 20px; }
        input { width: 100%; background: #000; border: 1px solid var(--neon); padding: 12px; color: var(--neon); font-family: 'Orbitron'; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; margin-bottom: 5px; }
        .sos-btn { background: none; color: var(--danger); border: 1px solid var(--danger); }
        .emergency-active { animation: dangerAlert 0.5s infinite alternate; }
        @keyframes dangerAlert { from { background: rgba(150,0,0,0.5); } to { background: rgba(0,0,0,0.5); } }
    </style>
</head>
<body>
<div class="header">
    <div style="font-family:'Orbitron'; font-size:12px;">859/RBK UNIT</div>
    <div id="bat-val">BAT: --%</div>
</div>
<div class="container" id="mainContainer">
    <div id="map"></div>
    <div class="card">
        <div id="command-display"></div>
        <input type="text" id="nama" placeholder="CALLSIGN">
        <button id="btnAktif">ACTIVATE UPLINK</button>
        <button class="sos-btn" id="btnSos">SOS EMERGENCY</button>
        <div id="stats" style="font-size:10px; margin-top:10px; display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <div>SPD: <span id="speed-val">0</span> KM/H</div>
            <div>ACC: <span id="acc-val">0</span> M</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let isSOS = false, watchId = null, wakeLock = null;
    const siren = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3'); siren.loop = true;

    // Wake Lock: Mencegah Layar Mati
    async function lockScreen() { try { if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }

    if(navigator.getBattery) navigator.getBattery().then(b => {
        const upd = () => document.getElementById('bat-val').innerText = `BAT: ${Math.round(b.level*100)}%`;
        upd(); b.onlevelchange = upd;
    });

    document.getElementById("btnAktif").onclick = async () => {
        const nama = document.getElementById("nama").value;
        if(!nama) return alert("INPUT CALLSIGN!");
        
        await lockScreen();
        document.getElementById("btnAktif").innerText = "UPLINK ACTIVE";
        document.getElementById("btnAktif").disabled = true;

        onValue(ref(db, `live/${nama}/command`), s => {
            const cmd = s.val();
            if(cmd === "ALARM_ON") { siren.play(); document.getElementById("mainContainer").classList.add("emergency-active"); }
            if(cmd === "ALARM_OFF") { siren.pause(); document.getElementById("mainContainer").classList.remove("emergency-active"); }
        });

        watchId = navigator.geolocation.watchPosition(p => {
            const { latitude, longitude, speed, accuracy } = p.coords;
            const kmh = Math.round(speed * 3.6 || 0);
            document.getElementById('speed-val').innerText = kmh;
            document.getElementById('acc-val').innerText = Math.round(accuracy);

            update(ref(db, `live/${nama}`), {
                lat: latitude, lon: longitude, speed: kmh, 
                battery: document.getElementById('bat-val').innerText,
                status: isSOS ? "DANGER_SOS" : "ACTIVE", waktu: Date.now()
            });
        }, null, { enableHighAccuracy: true });
    };

    document.getElementById("btnSos").onclick = () => {
        isSOS = !isSOS;
        document.getElementById("mainContainer").classList.toggle("emergency-active", isSOS);
    };
</script>
</body>
</html>
