<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Command - 859/RBK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --danger: #ff003c;
            --bg: #020802;
            --glass: rgba(0, 40, 0, 0.4);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Overlay Grid & Scanline */
        body::before {
            content: "";
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Animated Background Data */
        .bg-data {
            position: absolute;
            font-size: 10px;
            color: rgba(0, 255, 65, 0.1);
            white-space: nowrap;
            top: 0; left: 0;
            animation: moveData 20s linear infinite;
            z-index: 1;
        }

        @keyframes moveData {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon);
            background: rgba(0,20,0,0.8);
            z-index: 110;
        }

        .status-top { font-size: 12px; display: flex; gap: 15px; }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 105;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            border: 1px solid var(--neon);
            padding: 30px;
            backdrop-filter: blur(15px);
            position: relative;
            box-shadow: 0 0 30px rgba(0,255,65,0.2);
        }

        /* Dekorasi Sudut Modern */
        .card::before, .card::after {
            content: ""; position: absolute; width: 20px; height: 20px;
            border: 2px solid var(--neon);
        }
        .card::before { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .card::after { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon);
            padding: 12px;
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 10px; }

        button {
            flex: 2;
            padding: 15px;
            background: var(--neon);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        .sos-btn {
            flex: 1;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .sos-btn:hover { background: var(--danger); color: white; }

        #info-panel {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 11px;
        }

        .info-box {
            background: rgba(0,255,0,0.05);
            padding: 8px;
            border: 1px solid rgba(0,255,0,0.2);
        }

        .label { color: rgba(0,255,0,0.5); font-size: 9px; display: block; }

        /* SOS Active State */
        .emergency-mode {
            animation: dangerAlert 0.5s infinite alternate;
        }
        @keyframes dangerAlert {
            from { box-shadow: 0 0 10px var(--danger); }
            to { box-shadow: 0 0 30px var(--danger); border-color: #ff0000; }
        }

    </style>
</head>
<body>

<div class="bg-data" id="bgData"></div>

<div class="header">
    <div style="font-family: 'Orbitron'; font-size: 14px;">SYS-MONITOR: 859/RBK</div>
    <div class="status-top">
        <span id="bat-val">BAT: --%</span>
        <span id="net-val">NET: OK</span>
    </div>
</div>

<div class="container">
    <div class="card" id="mainCard">
        <h2 style="text-align:center; font-family:'Orbitron'; letter-spacing:4px;">UPLINK TERMINAL</h2>
        
        <input type="text" id="nama" placeholder="CALLSIGN ANGGOTA" autocomplete="off">

        <div class="btn-group">
            <button onclick="mulaiTracking()">ACTIVATE</button>
            <button class="sos-btn" onclick="sendSOS()">SOS</button>
        </div>

        <div id="info-panel">
            <div class="info-box"><span class="label">LATITUDE</span><span id="lat-val">0.000000</span></div>
            <div class="info-box"><span class="label">LONGITUDE</span><span id="lon-val">0.000000</span></div>
            <div class="info-box"><span class="label">SPEED</span><span id="speed-val">0 KM/H</span></div>
            <div class="info-box"><span class="label">BEARING</span><span id="dir-val">0° N</span></div>
        </div>

        <div id="status-msg" style="margin-top:15px; font-size:10px; text-align:center; opacity:0.7;">
            SYSTEM READY // IDLE_MODE
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Animasi Background Teks (Simulation Data)
    const bgData = document.getElementById('bgData');
    for(let i=0; i<100; i++) {
        bgData.innerHTML += `TRK_0859_SYS_${Math.random().toString(16).slice(2,10)}...OK<br>`;
    }

    let userBattery = "N/A";
    let isSOS = false;

    // Monitor Battery
    navigator.getBattery().then(bat => {
        const updateBat = () => {
            userBattery = (bat.level * 100) + "%";
            document.getElementById('bat-val').innerText = `BAT: ${userBattery}`;
        };
        updateBat();
        bat.addEventListener('levelchange', updateBat);
    });

    window.sendSOS = function() {
        isSOS = !isSOS;
        const nama = document.getElementById("nama").value || "UNKNOWN";
        const card = document.getElementById("mainCard");
        
        if(isSOS) {
            card.classList.add('emergency-mode');
            update(ref(db, "live/" + nama), { status: "DANGER_SOS" });
            alert("EMERGENCY SIGNAL SENT!");
        } else {
            card.classList.remove('emergency-mode');
            update(ref(db, "live/" + nama), { status: "ACTIVE" });
        }
    }

    window.mulaiTracking = function() {
        const nama = document.getElementById("nama").value;
        if (!nama) return alert("INPUT CALLSIGN!");

        document.getElementById("status-msg").innerText = "HANDSHAKING WITH SATELLITE...";

        navigator.geolocation.watchPosition(
            async (pos) => {
                const { latitude, longitude, speed, heading } = pos.coords;
                
                // Update UI
                document.getElementById('lat-val').innerText = latitude.toFixed(6);
                document.getElementById('lon-val').innerText = longitude.toFixed(6);
                document.getElementById('speed-val').innerText = `${Math.round(speed * 3.6 || 0)} KM/H`;
                document.getElementById('dir-val').innerText = `${Math.round(heading || 0)}°`;
                document.getElementById("status-msg").innerText = "UPLINK STABLISHED // DATA_STREAMING";

                // Push to Firebase
                update(ref(db, "live/" + nama), {
                    latitude,
                    longitude,
                    speed: Math.round(speed * 3.6 || 0),
                    battery: userBattery,
                    heading: heading || 0,
                    last_update: new Date().toLocaleTimeString(),
                    status: isSOS ? "DANGER_SOS" : "ACTIVE"
                });
            },
            (err) => { console.error(err) },
            { enableHighAccuracy: true }
        );
    };

    // WakeLock & Screen Keep-alive logic here (sama seperti sebelumnya)
</script>

</body>
</html>
