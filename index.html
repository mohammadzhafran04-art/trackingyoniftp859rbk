<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Edge V5.2.2 | 2065 NEURO-LINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.15);
            --danger: #ff003c;
            --bg: #000500;
            --accent: #00e5ff;
            --indo-red: #ff003c;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: var(--neon); font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden; text-transform: uppercase;
        }

        /* --- BACKGROUND & EFFECTS --- */
        .indo-map-bg {
            position: fixed; inset: 0; z-index: -3;
            background-image: url('https://raw.githubusercontent.com/mohammadzhafran04-art/trackingyoniftp859rbk/main/IMG_2984%20(1).jpg');
            background-size: cover; background-position: center; opacity: 0.15;
            filter: grayscale(100%) brightness(0.6) sepia(100%) hue-rotate(85deg) saturate(4);
            animation: pulseMap 8s infinite ease-in-out;
        }

        .hex-grid {
            position: fixed; inset: 0; z-index: -2;
            background-image: radial-gradient(var(--neon-dim) 1px, transparent 1px);
            background-size: 30px 30px; opacity: 0.2;
        }

        .radar-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 500px; border: 1px solid var(--neon-dim);
            border-radius: 50%; z-index: -4; opacity: 0.3;
        }
        .radar-bg::after {
            content: ""; position: absolute; inset: 0; border: 1px solid var(--neon-dim);
            border-radius: 50%; animation: radarPing 4s linear infinite;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(0.5px); }

        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        @keyframes radarPing { 0% { transform: scale(0.1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes pulseMap { 0%, 100% { transform: scale(1); opacity: 0.15; } 50% { transform: scale(1.03); opacity: 0.22; } }

        .sos-active { animation: glitch 0.2s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); filter: hue-rotate(90deg); }
            40% { transform: translate(-3px, -3px); }
            100% { transform: translate(0); }
        }

        /* --- UI COMPONENTS --- */
        .ui-wrapper { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        
        .status-panel {
            background: rgba(0, 10, 0, 0.8); border: 1px solid var(--neon-dim);
            flex: 1; display: flex; flex-direction: column; padding: 15px;
            position: relative; backdrop-filter: blur(8px);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hud-item {
            background: linear-gradient(90deg, rgba(0,255,65,0.05), transparent);
            border-left: 3px solid var(--neon); padding: 10px; position: relative;
        }
        .hud-item label { font-size: 7px; color: var(--accent); display: block; margin-bottom: 4px; }
        .hud-item span { font-size: 14px; font-family: 'Orbitron'; color: white; }

        .btn {
            font-family: 'Orbitron'; font-weight: bold; padding: 15px;
            text-transform: uppercase; border: 1px solid var(--neon); cursor: pointer;
            background: rgba(0, 255, 65, 0.05); color: var(--neon);
            transition: all 0.2s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }
        .btn-sos { background: rgba(255, 0, 60, 0.15); border-color: var(--danger); color: var(--danger); }

        .terminal-log {
            font-size: 10px; color: var(--neon); height: 90px; overflow-y: auto;
            margin-top: 15px; border-top: 1px solid var(--neon-dim); padding-top: 10px;
            scrollbar-width: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="indo-map-bg"></div>
<div class="hex-grid"></div>
<div class="radar-bg"></div>
<canvas id="bg-canvas"></canvas>

<div class="ui-wrapper">
    <header style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--neon-dim); padding-bottom: 10px; margin-bottom: 15px;">
        <div>
            <div style="font-family: 'Orbitron'; font-weight: 700; font-size: 16px; letter-spacing: 3px;">
                <span style="border-bottom: 2px solid var(--indo-red);">IDN</span>-TACTICAL <span style="color:white; opacity:0.6">2065</span>
            </div>
            <div id="status-tag" style="font-size: 8px; color: var(--accent);">SYSTEM_HEALTH: NOMINAL</div>
        </div>
        <div style="text-align: right;">
            <div id="clock" style="font-family: 'Orbitron'; font-size: 14px; color: white;">00:00:00</div>
            <div id="batStatus" style="font-size: 7px; color: var(--accent);">PWR: --%</div>
        </div>
    </header>

    <div id="loginArea" class="status-panel" style="justify-content: center;">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 14px; letter-spacing: 10px; color: white;">BIO-LINK</div>
            <div style="font-size: 8px; color: var(--accent); opacity: 0.7;">QUANTUM_ENCRYPTION_READY</div>
        </div>
        <input type="text" id="idInput" class="btn" style="text-align: center; font-size: 18px; margin-bottom: 20px; border-style: dashed;" placeholder="PILOT_ID" maxlength="12">
        <button class="btn" onclick="initiateLogin()">SYNC_NEURONS</button>
    </div>

    <div id="loadingArea" class="status-panel hidden">
        <div style="text-align: center; margin-top: 40px;">
            <div id="loadMsg" style="font-size: 16px; letter-spacing: 5px; color: white; font-family: 'Orbitron';">SYNCING</div>
            <div style="width: 100%; height: 2px; background: var(--neon-dim); margin: 20px 0;">
                <div id="progressFill" style="height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 15px var(--neon);"></div>
            </div>
            <div class="terminal-log" id="miniLog" style="text-align: left; height: 140px; font-size: 8px;"></div>
        </div>
    </div>

    <div id="trackingArea" class="status-panel hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 9px; align-items: center;">
            <span id="callsignLabel" style="color: black; background: var(--neon); padding: 3px 12px; font-weight: bold; letter-spacing: 2px;">---</span>
            <div style="display: flex; align-items: center;">
                <span style="margin-right: 10px;">HDG: <b id="heading" style="color:white">0° N</b></span>
                <span>BPM: <b id="heartRate" style="color:white">--</b></span>
            </div>
        </div>
        
        <div class="hud-grid">
            <div class="hud-item"><label>GEO.LATITUDE</label><span id="lat">0.00000</span></div>
            <div class="hud-item"><label>GEO.LONGITUDE</label><span id="lon">0.00000</span></div>
            <div class="hud-item"><label>NODE.VELOCITY</label><span id="spd">0.0 KM/H</span></div>
            <div class="hud-item"><label>SIGNAL.CORE</label><span id="sig">LINKED</span></div>
            <div class="hud-item" style="grid-column: span 2; border-left-color: var(--accent);">
                <label>ENVIRONMENTAL TELEMETRY</label>
                <span id="alt" style="font-size: 11px;">ALT: 0M | ACCURACY: --</span>
            </div>
        </div>

        <div class="terminal-log" id="logBox">> SCANNING TERRAIN...</div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
            <button class="btn btn-sos" onclick="sendSOS()">SIGNAL SOS</button>
            <button class="btn" style="font-size: 10px;" onclick="initiateTerminate()">TERMINATE</button>
        </div>
    </div>
</div>

<div id="commandPopup" class="hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #400; color: white; padding: 20px; font-family: 'Orbitron'; z-index: 2000; border: 2px solid white; box-shadow: 0 0 100px rgba(255,0,0,0.8);">
    <div style="font-size: 10px; border-bottom: 1px solid white; padding-bottom: 5px; margin-bottom: 10px;">!!! CRITICAL OVERRIDE !!!</div>
    <div id="commandText" style="font-size: 18px; text-align: center; margin: 20px 0; font-weight: bold;">-- NONE --</div>
    <button onclick="dismissCommand()" style="width: 100%; background:white; border:none; color:black; font-family:'Orbitron'; padding:12px; font-weight: bold;">ACKNOWLEDGE</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onDisconnect, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91",
        storageBucket: "real-time-location-30d91.firebasestorage.app",
        messagingSenderId: "1092565406651",
        appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
    };

    const app = initializeApp(firebaseConfig), db = getDatabase(app);
    let myCallsign = "", lastCmdTime = 0, watchId = null;

    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        click: () => playSound(800, 'square', 0.1, 0.1),
        success: () => { playSound(600, 'sine', 0.2, 0.1); setTimeout(() => playSound(1200, 'sine', 0.3, 0.1), 100); },
        sos: () => {
            let i = 0;
            const itv = setInterval(() => {
                playSound(400, 'sawtooth', 0.2, 0.05);
                if(++i > 4) clearInterval(itv);
            }, 150);
        },
        error: () => playSound(150, 'sawtooth', 0.5, 0.2)
    };

    // --- TELEMETRY & CLOCK ---
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        if(myCallsign) document.getElementById('heartRate').innerText = Math.floor(Math.random() * (78 - 62) + 62);
        
        if(navigator.getBattery) navigator.getBattery().then(b => {
            document.getElementById('batStatus').innerText = `PWR: ${Math.round(b.level * 100)}%`;
        });
    }, 1000);

    window.addEventListener('deviceorientation', (e) => {
        if(e.alpha) document.getElementById('heading').innerText = `${Math.round(e.alpha)}°`;
    });

    // --- MATRIX BG ---
    const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
    let drops = [];
    function initCanvas() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        drops = Array(Math.floor(canvas.width/16)).fill(1);
    }
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 5, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(0, 255, 65, 0.3)"; ctx.font = "16px monospace";
        drops.forEach((y, i) => {
            const text = "01NKRI2065".charAt(Math.floor(Math.random() * 10));
            ctx.fillText(text, i * 16, y * 16);
            if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
        requestAnimationFrame(drawMatrix);
    }
    initCanvas(); drawMatrix();

    // --- CORE LOGIC ---
    window.initiateLogin = () => {
        sfx.click();
        const val = document.getElementById('idInput').value.trim().toUpperCase();
        if(!val) { sfx.error(); return; }
        myCallsign = val;
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('loadingArea').classList.remove('hidden');
        
        startSequence(["ENCRYPTING_BIO_LINK", "BYPASSING_FIREWALL", "SAT_LINK_ESTABLISHED"], 80, () => {
            sfx.success();
            document.getElementById('loadingArea').classList.add('hidden');
            document.getElementById('trackingArea').classList.remove('hidden');
            document.getElementById('callsignLabel').innerText = myCallsign;
            startTracking();
            listenForCommands();
        });
    };

    function startSequence(messages, speed, callback) {
        let p = 0;
        const bar = document.getElementById('progressFill'), miniLog = document.getElementById('miniLog');
        const loader = setInterval(() => {
            p += 5; bar.style.width = p + "%";
            if(p % 10 === 0) playSound(1500, 'sine', 0.05, 0.02);
            let idx = Math.floor((p/100) * messages.length);
            if(messages[idx] && !miniLog.innerHTML.includes(messages[idx])) {
                miniLog.innerHTML += `<div>> ${messages[idx]}... OK</div>`;
                miniLog.scrollTop = miniLog.scrollHeight;
            }
            if(p >= 100) { clearInterval(loader); setTimeout(callback, 500); }
        }, speed);
    }

    function startTracking() {
        if ("geolocation" in navigator) {
            watchId = navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude, speed, accuracy, altitude } = p.coords;
                document.getElementById('lat').innerText = latitude.toFixed(6);
                document.getElementById('lon').innerText = longitude.toFixed(6);
                document.getElementById('spd').innerText = (speed ? speed * 3.6 : 0).toFixed(1) + " KM/H";
                document.getElementById('alt').innerText = `ALT: ${Math.round(altitude || 0)}M | ACC: ${Math.round(accuracy)}M`;
                
                update(ref(db, "live/" + myCallsign), { 
                    lat: latitude, lon: longitude, speed: (speed||0), waktu: Date.now(), sos: false 
                });
                onDisconnect(ref(db, "live/" + myCallsign)).update({ waktu: Date.now() - 60000 });
            }, null, { enableHighAccuracy: true });
        }
    }

    function listenForCommands() {
        onValue(ref(db, "commands/global"), (snapshot) => {
            const data = snapshot.val();
            if (data && data.timestamp > lastCmdTime) {
                lastCmdTime = data.timestamp;
                sfx.sos();
                document.getElementById('commandText').innerText = data.text;
                document.getElementById('commandPopup').classList.remove('hidden');
                if(navigator.vibrate) navigator.vibrate([300, 100, 300]);
            }
        });
    }

    window.sendSOS = () => {
        sfx.sos();
        document.body.classList.add('sos-active');
        update(ref(db, "live/" + myCallsign), { sos: true });
        document.getElementById('logBox').innerHTML += `<br><span style="color:var(--danger)">> SOS_BROADCAST_ACTIVE</span>`;
        setTimeout(() => document.body.classList.remove('sos-active'), 2000);
    };

    window.dismissCommand = () => { sfx.click(); document.getElementById('commandPopup').classList.add('hidden'); };
    window.initiateTerminate = () => { sfx.click(); if(confirm("TERMINATE LINK?")) location.reload(); };
</script>
</body>
</html>
