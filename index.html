<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracking Yonif TP 859/RBK V5.2.2 | NEURO-LINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.15);
            --danger: #ff003c;
            --bg: #000800; 
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: var(--neon); font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw; overflow: hidden; text-transform: uppercase;
        }

        /* --- LAYER 1: LOGO (DIPAKSA MUNCUL) --- */
        .wallpaper-engine {
            position: fixed;
            inset: 0;
            z-index: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            background-color: var(--bg); /* Dasar hitam pekat */
        }

        .logo-main {
            width: 85vw;
            max-width: 400px;
            height: auto;
            opacity: 0.6 !important; /* Opacity tinggi agar tembus pandang */
            filter: drop-shadow(0 0 20px rgba(0, 255, 65, 0.3));
            animation: corePulse 6s infinite ease-in-out;
            display: block !important;
        }

        @keyframes corePulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.7; }
        }

        /* --- LAYER 2: CANVAS --- */
        #bg-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.3; }

        /* --- LAYER 3: SCANLINE --- */
        .scanline {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 65, 0.05) 50%);
            background-size: 100% 4px; z-index: 5; pointer-events: none;
        }

        /* --- LAYER 4: UI (DIBUAT SANGAT TRANSPARAN) --- */
        .ui-wrapper {
            position: relative; 
            z-index: 10; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box;
        }

        header {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid var(--neon-dim); padding-bottom: 10px; margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
        }

        .status-panel {
            /* KUNCI: Background transparan (0.3) agar logo di belakang kelihatan */
            background: rgba(0, 20, 0, 0.3) !important; 
            border: 1px solid var(--neon-dim);
            flex: 1; display: flex; flex-direction: column; padding: 20px;
            position: relative; backdrop-filter: blur(2px);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        .btn {
            font-family: 'Orbitron'; font-weight: bold; padding: 15px;
            text-transform: uppercase; border: 1px solid var(--neon); cursor: pointer;
            background: rgba(0, 255, 65, 0.1); color: var(--neon); transition: 0.3s;
        }

        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hud-item {
            background: rgba(0, 255, 65, 0.05); border-left: 3px solid var(--neon); padding: 10px;
        }
        .hud-item label { font-size: 8px; color: var(--accent); display: block; }
        .hud-item span { font-size: 14px; font-family: 'Orbitron'; color: white; }

        .terminal-log {
            font-size: 10px; color: var(--neon); height: 80px; overflow-y: auto;
            margin-top: 10px; border: 1px solid var(--neon-dim); padding: 10px;
            background: rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }
        .sync-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="wallpaper-engine">
    <img src="https://raw.githubusercontent.com/mohammadzhafran04-art/trackingyoniftp859rbk/main/IMG_2984%20(1).jpg" 
         class="logo-main" 
         alt="LOGO RBK"
         crossorigin="anonymous">
</div>

<canvas id="bg-canvas"></canvas>
<div class="scanline"></div>

<div class="ui-wrapper">
    <header>
        <div>
            <div style="font-family: 'Orbitron'; font-weight: 700; font-size: 14px;">Yonif TP 859/RBK <span style="color:white; opacity:0.6">TACTICAL</span></div>
            <div id="status-tag" class="sync-pulse" style="font-size: 8px; font-weight: bold; color: var(--accent);">SYSTEM_LINK_STABLE</div>
        </div>
        <div style="text-align: right;">
            <div id="clock" style="font-family: 'Orbitron'; font-size: 14px; color: white;">00:00:00</div>
            <div style="font-size: 7px; color: var(--accent);">OPS_TIME</div>
        </div>
    </header>

    <div id="loginArea" class="status-panel">
        <div style="text-align: center; margin: 50px 0;">
            <div style="font-size: 16px; letter-spacing: 5px; color: white; font-family: 'Orbitron';">AUTHENTICATION</div>
            <div style="font-size: 8px; margin-top: 5px;">SECURE NEURAL HANDSHAKE</div>
        </div>
        <input type="text" id="idInput" class="btn" style="text-align: center; font-size: 18px; margin-bottom: 20px;" placeholder="CALLSIGN" maxlength="12">
        <button class="btn" onclick="initiateLogin()">ESTABLISH LINK</button>
    </div>

    <div id="trackingArea" class="status-panel hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span id="callsignLabel" style="background: var(--neon); color: #000; padding: 2px 10px; font-weight: bold; font-size: 12px;">---</span>
            <span style="font-size: 9px;">BPM: <b id="heartRate" style="color:white">--</b></span>
        </div>
        
        <div class="hud-grid">
            <div class="hud-item"><label>LATITUDE</label><span id="lat">0.00000</span></div>
            <div class="hud-item"><label>LONGITUDE</label><span id="lon">0.00000</span></div>
            <div class="hud-item"><label>SPD</label><span id="spd">0.0 KM/H</span></div>
            <div class="hud-item"><label>STATUS</label><span style="color: var(--neon);">ACTIVE</span></div>
        </div>

        <div class="terminal-log" id="logBox">> SCANNING_SATELLITE...<br>> ENCRYPTING_DATA...</div>
        
        <button class="btn" style="margin-top: 15px; border-color: white; color: white; font-size: 10px;" onclick="location.reload()">TERMINATE</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
        authDomain: "real-time-location-30d91.firebaseapp.com",
        databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "real-time-location-30d91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let myCallsign = "";

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); 
        if(myCallsign) document.getElementById('heartRate').innerText = Math.floor(Math.random() * (90 - 60) + 60);
    }, 1000);

    window.initiateLogin = () => {
        myCallsign = document.getElementById('idInput').value.trim().toUpperCase();
        if(!myCallsign) return alert("CALLSIGN REQUIRED");
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('trackingArea').classList.remove('hidden');
        document.getElementById('callsignLabel').innerText = myCallsign;
        startTracking();
    };

    function startTracking() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude } = p.coords;
                document.getElementById('lat').innerText = latitude.toFixed(6);
                document.getElementById('lon').innerText = longitude.toFixed(6);
                update(ref(db, "live/" + myCallsign), { lat: latitude, lon: longitude, waktu: Date.now() });
            }, (e) => console.error(e), {enableHighAccuracy: true});
        }
    }

    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = Array.from({length: 20}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        s: Math.random() * 2, vx: (Math.random()-0.5)*0.2, vy: (Math.random()-0.5)*0.2
    }));
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(0,255,65,0.2)";
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
